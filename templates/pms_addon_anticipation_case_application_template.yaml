    - claim_weakening_where_needed
    - explicit_unclear_or_missing_markers
    - no_new_layer_creation
  final_anticipation_addon_status:
    status: >-
      <ready_for_addon_output_check | ready_with_limits_for_addon_output_check | requires_revision_before_check
      | suspend_addon_application | unclear>
    selected_addon_confirmed: <true | false | unclear>
    addon_output_summary: <short bounded summary>
    claim_ceiling_effect: <no_change | lowered | exceeded_and_corrected | unclear>
    next_required_step: <anticipation_addon_output_check | revise_addon_output | suspend | unclear>
    final_note: >-
      This status governs whether the ANTICIPATION add-on output is ready to be checked. It is not
      a forecast, not a prediction, not a decision-state execution, and not external release readiness.
