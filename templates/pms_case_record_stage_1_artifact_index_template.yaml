# =============================================================================
#  PMS-DISCIPLINE — CASE RECORD STAGE 1 ARTIFACT INDEX TEMPLATE
#
#  Template version:
#    PMS-DISCIPLINE_CASE_RECORD_STAGE_1_ARTIFACT_INDEX_CLEAN_0.3
#
#  Source profiles:
#    PMS.yaml / schema_version: PMS_1.3
#    PMS-DISCIPLINE workflow templates
#    checked PMS-DISCIPLINE layer outputs
#    selected PMS add-on source and output, if used
#    MIP source and output, if used
#    AHP source and output, if used
#    case material supplied for the run
#
#  METADATA AUTHORITY ORDER:
#    runner manifest > checked upstream artifact > generated downstream artifact
#    > template default / placeholder > model inference
#
#  A template value is never evidence. Exact runner paths, route states, branch
#  states, step states, and file-existence values must be copied without
#  normalization. session.json is not a substitute for a produced output path.
#
#  DISCIPLINE role:
#    Create a run-level artifact index before digest extraction or full record
#    integration. This stage records what artifacts exist, which versions are
#    selected, which artifacts are missing, superseded, rejected, deferred, or
#    not applicable, and which artifacts may be read by Stage 2. It performs no
#    case interpretation, no digest extraction, no claim-boundary decision, no
#    add-on recommendation, no MIP/AHP application, and no decision execution.
# =============================================================================

pms_discipline_case_record_stage_1_artifact_index:
  schema_version: "PMS-DISCIPLINE_CASE_RECORD_STAGE_1_ARTIFACT_INDEX_CLEAN_0.3"
  schema_role: "case_record_stage_1_artifact_index_template"
  stage_number: 1
  stage_name: "artifact_index_and_run_manifest"
  intended_next_stage: "stage_2_layer_digest_extraction"

  status:
    type: "run_manifest_and_artifact_index"
    function:
      - "list_available_artifacts"
      - "select_current_versions"
      - "mark_missing_deferred_rejected_or_not_applicable_artifacts"
      - "prevent_untracked_inputs_from_entering_case_record"
      - "define_stage_2_allowed_inputs"
      - "preserve_checked_output_chain_visibility"
    excludes:
      - "case_analysis"
      - "content_digest"
      - "output_check_result"
      - "claim_boundary_decision"
      - "add_on_recommendation"
      - "MIP_or_AHP_application"
      - "case_record_stage_2_digest"
      - "case_record_stage_3_integration"
      - "decision_execution"

  non_authority_notice: >
    This artifact index supports traceability for a PMS-DISCIPLINE case record.
    It does not certify, authorize, interpret, complete, or decide the case.
    Presence of an artifact means only that it is available for possible later
    extraction. Absence, rejection, deferral, supersession, or non-applicability
    remains visible.

  stage_1_principles:
    no_content_integration: true
    no_reanalysis: true
    no_claim_strengthening: true
    no_unlisted_artifact_use: true
    missing_items_must_be_marked: true
    superseded_versions_must_be_marked: true
    rejected_or_not_applicable_layers_must_remain_visible: true
    earlier_boundaries_must_not_be_overwritten_by_later_artifacts: true
    file_presence_is_not_content_adequacy: true
    template_completion_is_not_output_check: true
    checked_status_must_remain_artifact_status_only: true
    source_reading_status_is_not_application_status: true
    runner_manifest_controls_exact_metadata: true
    checked_upstream_artifact_precedes_generated_downstream_metadata: true
    template_defaults_are_placeholders_not_evidence: true
    model_inference_cannot_override_recorded_metadata: true
    exact_output_paths_must_not_be_replaced_by_session_record_paths: true

  artifact_status_legend:
    allowed_values:
      - "present_selected"
      - "present_not_selected"
      - "missing"
      - "not_applicable"
      - "expected_but_missing"
      - "superseded"
      - "rejected_by_gate"
      - "deferred"
      - "human_review_required"
      - "unknown"
    rule: >
      Every expected or relevant artifact receives exactly one status value.
      Absence is marked with an explicit status rather than an empty field.

