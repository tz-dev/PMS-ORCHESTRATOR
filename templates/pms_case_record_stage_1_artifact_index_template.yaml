    all_selected_artifacts_have_path_or_reference: "unknown"
    all_missing_expected_artifacts_are_visible: "unknown"
    all_superseded_versions_are_visible: "unknown"
    all_rejected_deferred_or_not_applicable_layers_are_visible: "unknown"
    stage_2_allowed_inputs_reviewed: "unknown"
    ready_for_stage_2: "unknown"
    blocker_notes: []

  stage_1_output:
    exports_to_stage_2:
      - "selected_artifact_inventory"
      - "case_material_index"
      - "available_reference_templates"
      - "available_model_reference_files"
      - "available_workflow_outputs"
      - "available_output_checks"
      - "missing_expected_artifacts"
      - "superseded_or_unselected_artifacts"
      - "rejected_deferred_or_not_applicable_layers"
      - "stage_2_allowed_inputs"
    does_not_export:
      - "case_findings"
      - "claim_boundary"
      - "digest_summaries"
      - "case_record_stage_3_integration"
      - "public_output_readiness"
      - "decision_execution"

  next_step:
    name: "stage_2_layer_digest_extraction"
    purpose: >
      Read only selected Stage 1 artifacts and extract short layer digests:
      imported findings, imported limits, non-claims, unresolved risks, and
      items deliberately not imported.
    warning: >
      Stage 1 routes to Stage 2. A direct jump from Stage 1 to the full record
      is allowed only when the run explicitly documents why digest extraction is
      unnecessary.