# ==============================================================================
# PMS-DISCIPLINE — LOGIC ADD-ON CASE APPLICATION TEMPLATE
# Template version: CLEAN_v0.2.1
# Role: selected LOGIC add-on case application after checked Core and checked Add-on Gate
# ==============================================================================
pms_logic_addon_case_application:
  schema_version: PMS-DISCIPLINE_LOGIC_ADDON_CASE_TEMPLATE_CLEAN_v0.2.1
  schema_role: logic_addon_case_application_template
  analysis_mode: selected_logic_addon_case_application_after_checked_core
  template_status: clean_pms_discipline_addon_case_application_template
  discipline_template_name: pms_addon_logic_case_application_template_CLEAN_v0_2_1.yaml
  selected_addon_family: LOGIC
  template_purpose: 'Structure a PMS-DISCIPLINE-compatible PMS-LOGIC overlay for one already completed PMS-Core case. The
    overlay maps pre-moral justification, logical boundary management, post-moral effects, non-closure, closure-drive, responsibility
    as attributability, non-innocence without guilt, effective capacity, reduced-signature use, failure-mode constraints,
    and counter-readings without modifying the completed PMS-Core analysis and without converting logical coherence into final
    authority, moral verdict, blame assignment, action authorization, person ranking, or PMS-Base revision.

    '
  template_boundary: This template applies only the selected LOGIC add-on after checked Pre-Analysis, checked PMS Core, checked
    Add-on Recommendation Gate, and source reading of PMS-LOGIC.yaml. It does not re-run or rewrite Core, does not re-decide
    the gate, does not apply unselected add-ons, does not apply MIP or AHP, does not generate Case Record or Markdown outputs,
    and does not execute any final decision state.
  repository_reference:
    pms_base_reference_file: PMS.yaml
    pms_base_reference_status: already_read_base_reference
    selected_addon_source_file: PMS-LOGIC.yaml
    selected_addon_source_status: read_before_this_application_step
    addon_template_role: selected_logic_addon_case_application_template
    supported_addon_family: LOGIC
    reference_note: PMS.yaml supplies PMS Base grammar. Checked Pre-Analysis, checked Core, checked Add-on Gate, the CASE
      PACKET, and the already-read PMS-LOGIC source constrain this template. This template assumes no unprovided source file,
      no unselected add-on, no MIP output, no AHP output, no Case Record, and no Markdown article.
  source_alignment:
    overlay_source_file: PMS-LOGIC.yaml
    paper_source_file: PMS-LOGIC.md
    base_reference_file: PMS.yaml
    source_status_rule: 'Source files and case materials may support structural mapping only within their marked status. They
      do not by themselves provide evidence, proof, output check, final authority, or permission to intensify claims.

      '
  source_fidelity_notes:
    source_checked_against: PMS-LOGIC.md
    source_profile_note: 'PMS-LOGIC is treated as one structurally disciplined PMS-compatible reconstruction, not as final
      philosophical settlement, not as a universal ontology, and not as a superior substitute for all rival accounts.

      '
    present_reconstruction_caveat: 'Case output should preserve qualifiers such as within this reconstruction, within the
      present frame, structurally attributable, morally readable, and non-normatively underived where claim pressure could
      otherwise over-harden.

      '
    non_performativity_note: 'PMS-LOGIC does not claim to generate better praxis, superior action, optimization, or action
      guidance. It offers structural orientation and boundary discipline only.

      '
    calibration_note: 'Effective capacity, omission, and responsibility-salience remain calibration-sensitive. The LOGIC
      source defines structural form, not every concrete threshold of sufficiency in advance.

      '
    non_capture_note: 'Translation success into PMS-LOGIC terms must not be treated as final superiority over adjacent or
      rival frameworks. Rival accounts remain open where they preserve differentiating force better than the LOGIC overlay.

      '
  source_priority:
    pms_yaml:
      priority: 1
      role: PMS Base reference already read before this step
      may_define:
      - PMS operator inventory
      - PMS operator order
      - PMS dependencies
      - PMS derived structures
      - PMS application guardrails
      must_not_be_overridden_by:
      - LOGIC add-on output
      - PMS-LOGIC source
      - case templates
      - model output
    case_packet:
      priority: 2
      role: bounded case material supplied for this run
      may_supply:
      - case material
      - source status
      - intended use
      must_not_supply:
      - LOGIC authorization
      - truth proof
      - moral verdict
      - guilt assignment
      - action authorization
    checked_pre_analysis_yaml:
      priority: 3
      role: checked boundary, source-status, burden, and claim-ceiling record
      may_supply:
      - source material limits
      - person-nearness/publicness/irreversibility burden
      - claim ceiling
      - rival pressure
      - non-capture
      - correctability and reopening
      must_not_supply:
      - LOGIC result
      - MIP authorization
      - AHP authorization
      - person ranking
      - maturity verdict
    checked_core_case_application_yaml:
      priority: 4
      role: checked PMS Core case basis
      may_supply:
      - case boundary
      - operator assignments
      - dependency status
      - derived structure status
      - claim ceiling
      - source status
      - non-capture zones
      - rival readings
      - falsifier and weakening conditions
      must_not_be_rewritten_by:
      - LOGIC overlay
      - logical coherence vocabulary
      - boundary-management vocabulary
      - non-innocence vocabulary
      - responsibility-readability vocabulary
      - later MIP or AHP outputs
    checked_addon_recommendation_gate_yaml:
      priority: 5
      role: checked add-on family selection or non-use context
      may_supply:
      - selected add-on family
      - LOGIC recommendation or non-use status
      - doubts and non-trigger conditions
      - over-application warnings
      must_not_supply:
      - LOGIC application
      - authorization
      - final decision state
      - action authority
      - case verdict
    selected_logic_source:
      priority: 6
      role: already-read selected PMS-LOGIC add-on source
      may_define:
      - LOGIC constructs
      - tripartition
      - boundary conditions
      - non-operator constructs
      - reduced signatures
      - failure-mode constraints
      - drift catalogue
      - counter-readings
      - LOGIC guardrails
      must_not_define:
      - PMS Base
      - PMS operator inventory
      - Core case findings
      - moral verdict
      - guilt assignment
      - person status
      - action authorization
    this_logic_addon_template:
      priority: 7
      role: LOGIC case add-on application output structure only
      must_not_authorize:
      - Core rewrite
      - PMS Base revision
      - MIP use
      - AHP use
      - publication
      - intervention
      - final decision execution
  workflow_position:
    phase: selected_addon_case_application
    step_id: logic_addon_case_application
    step_role: This step occurs only after checked Pre-Analysis, checked PMS Core, checked Add-on Recommendation Gate, and
      source reading of the selected PMS-LOGIC add-on. It produces a LOGIC add-on case YAML that must be checked before any
      later optional MIP Gate or Case Record stage.
    preceded_by_required_steps:
    - read_pms_yaml
    - checked_pre_analysis_yaml
    - checked_core_case_application_yaml
    - checked_addon_recommendation_gate_yaml
    - read_selected_logic_source
    next_required_step: selected_addon_output_check
    later_possible_steps_after_checked_addon_output:
    - core_or_addon_only_case_record_stage
    - optional_downstream_mip_gate_if_human_route_confirms
    - article_generation_after_case_record_only
    not_permitted_before_this_step:
    - standalone_LOGIC_application_without_checked_core
    - LOGIC_application_from_topic_label_alone
    - MIP_application
    - AHP_application
    - article_generation
    not_permitted_inside_this_step:
    - rewriting_core_case_yaml
    - redefining_PMS_operators_or_dependencies
    - treating_LOGIC_constructs_as_PMS_Base
    - treating_logic_as_truth_validator
    - treating_logical_coherence_as_final_authority
    - treating_non_innocence_as_guilt
    - treating_attributability_as_blame
    - treating_boundary_management_as_action_authority
    - treating_LOGIC_output_as_MIP_or_AHP_authorization
    - setting_final_decision_state_as_executed
    - case_record_generation
    - markdown_article_generation
  template_io_contract:
    required_inputs:
    - PMS.yaml_read_completely
    - case_packet
    - checked_pre_analysis_yaml
    - checked_core_case_application_yaml
    - checked_addon_recommendation_gate_yaml
    - selected_PMS_LOGIC_source_read
    - pms_addon_logic_case_application_template
    optional_inputs_allowed_only_if_marked:
    - prior_human_notes
    - prior_model_output_as_input_not_evidence
    - source_documents_full_or_excerpted
    - statistical_material_or_tables
    - transcripts_or_correspondence
    - reports_or_institutional_records
    - counter_reading_material
    - affected_role_contestation_material
    forbidden_inputs_at_addon_stage:
    - unchecked_core_case_as_anchor
    - LOGIC_vocabulary_as_trigger_without_gate_record
    - MIP_or_AHP_result_as_LOGIC_authority
    - article_draft_as_case_evidence
    - logical_coherence_as_truth_proof
    - non_innocence_language_as_guilt_assignment
    - source_presence_as_proof
    - document_authority_as_action_authorization
    - unselected_addon_source_as_authority
    - MIP_output_as_prior_authority
    - AHP_output_as_prior_authority
    - case_record_as_case_evidence
    - markdown_article_as_case_evidence
    produced_outputs:
    - completed_logic_addon_case_yaml
    - LOGIC_overlay_scope_and_core_anchor_record
    - LOGIC_tripartition_mapping
    - boundary_condition_and_non_closure_record
    - counter_reading_and_failure_mode_record
    - source_and_claim_burden_record
    - logic_addon_synthesis
    - logic_addon_handoff
    not_produced_outputs:
    - PMS_Base_revision
    - Core_case_rewrite
    - truth_certification
    - moral_verdict
    - guilt_assignment
    - diagnostic_verdict
    - legal_or_forensic_conclusion
    - person_ranking
    - sanction_recommendation
    - MIP_authorization
    - AHP_authorization
    - case_record
    - markdown_article
    - final_decision_execution
  non_authority_boundary:
    this_template_is:
    - selected_LOGIC_addon_case_application_template
    - bounded_overlay_application_structure
    - post_checked_core_addon_output_candidate
    this_template_is_not:
    - PMS_Base
    - PMS_Base_revision
    - Core_case_analysis
    - add_on_recommendation_gate
    - truth_validator
    - moral_verdict
    - guilt_assignment
    - action_authority
    - MIP_gate
    - AHP_gate
    - MIP_application
    - AHP_application
    - case_record_generator
    - markdown_generator
    - final_decision_state
    applies_globally: true
  checked_prior_outputs_import:
    checked_pre_analysis_import:
      status: <available | partial | missing | unclear>
      source_status: <imported | missing | unclear>
      claim_ceiling: <imported | missing | unclear>
      person_nearness_publicness_irreversibility_burden: <preserved | weak | missing | unclear>
      rival_and_non_capture_status: <preserved | weak | missing | unclear>
      correctability_and_reopening_status: <preserved | weak | missing | unclear>
    checked_core_import:
      status: <available | partial | missing | unclear>
      core_sufficiency_status: <sufficient | sufficient_with_limits | unstable | insufficient | unclear>
      operator_assignment_status: <preserved | weak | over_assigned | under_assigned | unclear>
      dependency_status: <preserved | weak | violated | unclear>
      claim_ceiling_effect: <preserved | lowered | exceeded | unclear>
      core_handoff_status: <ready | ready_with_limits | incomplete | blocked | unclear>
    checked_addon_gate_import:
      gate_status: <selected_addon_recommended | scan_only | no_addon_recommended | rejected_as_over_application | unclear | other>
      selected_addon: <LOGIC | none | unclear | other>
      recommendation_limits_preserved: <yes | partial | no | unclear>
    import_quality:
      result: <usable | usable_with_limits | insufficient | requires_revision | blocked | unclear>
      required_response: <continue_addon_application | revise_prior_output | suspend_addon_application | refuse_addon_application | redirect_addon_application | unclear>
  checked_addon_gate_import:
    source_record: checked pms_discipline_addon_recommendation_gate_template.yaml output
    source_status: <available | partial | missing | unclear>
    selected_addon_family: <LOGIC | other | none | unclear>
    gate_result_status: <selected_addon_recommended | scan_only | no_addon_recommended | rejected_as_over_application | revise_before_addon | suspend_before_addon | refuse_before_addon | redirect_before_addon | unclear>
    recommendation_strength: <none | weak | moderate | strong | unclear>
    recommendation_basis: <Import operator-load, risk-shape, claim-shape, boundary-management, non-closure, responsibility-readability,
      non-innocence, or logic-specific basis. Do not use logic vocabulary, moral vocabulary, or formal tone alone as trigger.>
    doubts_or_limits:
    - <doubt or none>
    non_trigger_conditions_checked:
    - reasoning_vocabulary_not_LOGIC_trigger
    - formal_tone_not_LOGIC_trigger
    - moral_vocabulary_not_LOGIC_authorization
    - coherence_not_truth_validation
    - non_innocence_not_guilt_assignment
    required_action_before_addon_application: <none | revise_core | downgrade_claim | suspend | refuse | redirect | human_review | unclear>
  selected_logic_source_import:
    source_file: PMS-LOGIC.yaml
    source_read_status: <read_completely | partial | missing | unclear>
    source_family_matches_gate_selection: <true | false | unclear>
    source_role: selected LOGIC add-on reference for this application only
    source_does_not_override:
    - PMS.yaml
    - checked_pre_analysis_yaml
    - checked_core_case_application_yaml
    - checked_addon_recommendation_gate_yaml
    - case_packet_source_status
    - claim_ceiling
  no_gate_redecision_boundary:
    gate_redecision_performed_here: false
    selected_addon_changed_here: false
    unselected_addons_applied_here: false
    MIP_or_AHP_gate_performed_here: false
    note: This step applies the already selected LOGIC add-on only. It does not re-run the Add-on Gate and does not decide
      MIP or AHP.
  logic_not_verdict_boundary:
    LOGIC_result_is_truth_validation: false
    LOGIC_result_is_moral_verdict: false
    LOGIC_result_assigns_guilt: false
    LOGIC_result_authorizes_action: false
    LOGIC_result_authorizes_MIP_or_AHP: false
    note: LOGIC may clarify boundary management, non-closure, attributability, non-innocence, and failure-mode constraints.
      It does not settle truth, morality, guilt, action, or later-layer authority.
  addon_metadata:
    model_name: PMS–LOGIC Application Profile
    model_short: PMS-LOGIC
    status: draft
    last_updated: '2026-04-06'
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
    paper_source:
      title: PMS–LOGIC
      subtitle: Pre-Moral Foundations, Logical Limits, and Post-Moral Effects
      source_file: PMS-LOGIC.md
    description: 'PMS-LOGIC is an application profile / overlay for PMS. It formalizes pre-moral justification, logical boundary
      management, and post-moral effects without redefining PMS operators, dependencies, derived axes, or guardrails.

      '
  addon_relationship_to_core:
    status: subordinate_to_completed_pms_core_case
    core_case_status: already_completed
    core_case_source: <completed PMS Core case YAML>
    rule: 'This LOGIC block is appended to or integrated into an already completed PMS Core v1.3 case artefact. It does not
      rewrite the core pass, redefine PMS operators, alter PMS dependencies, change derived structures, or treat LOGIC constructs
      as PMS Base.

      '
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: 'The LOGIC overlay may add boundary, non-closure, attribution, non-innocence, reduced-signature, and
      failure-mode visibility. It must not modify the already completed PMS Core case except where a direct PMS.yaml inconsistency
      has been separately identified.

      '
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    dependency_hygiene_note: 'Any LOGIC reduced signature is shorthand only. Reduced signatures do not replace PMS dependencies.
      In particular, any use of Χ, Σ, Φ, Θ, Ω, Λ, or Ψ must remain dependency-respecting according to PMS.yaml.

      '
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    rule: 'PMS-LOGIC introduces no amplification overlays beyond reduced signatures, structural failure modes, and paper-specific
      non-operator constructs. It remains an overlay/application profile only.

      '
  validity_gate:
    status: <passed | failed | needs_review>
    gate_type: PMS_application_only
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: <maintained | compromised | needs_review>
        meaning: 'A meta-position and stop-capability are maintained. The LOGIC overlay does not fuse the case into verdict,
          authority, enforcement, certainty, moral demand, or person-level attribution.

          '
      reversibility:
        status: <maintained | compromised | needs_review>
        meaning: 'The LOGIC reading remains scene-bound or case-type-bound, revisable, and configuration-specific. It does
          not generate global person labels or irreversible interpretive claims.

          '
      Dignity_in_Practice_D:
        id: D
        status: <maintained | compromised | needs_review>
        meaning: 'The LOGIC overlay does not shame, rank, humiliate, morally evaluate, or ontologically assess persons or
          groups. It remains restricted to structural attribution and boundary handling.

          '
    gate_result: <valid_as_logic_overlay_application | invalid_as_logic_overlay_application | requires_revision>
  logic_addon_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic.
    - No person-level judgments, no moral evaluation, no sanction logic.
    - Focus on structures of praxis, not right or good morality.
    - 'Audience: analysis of praxis and structure, not action guidance or decision rules.'
    - No optimization claim, no superior-action claim, no better-praxis claim.
    may_add_visibility_to:
    - non-closure
    - closure-drive
    - logical boundary management
    - responsibility as attributability
    - non-innocence without guilt
    - effective capacity
    - moral readability as post-hoc interpretive field
    - failure-mode constraints
    - LOGIC drift risks
    - counter-readings
    must_not_do:
    - derive ought from being
    - introduce norms, values, duties, prescriptions, or moral rules
    - treat morality as a PMS operator
    - convert responsibility into blame
    - convert non-innocence into guilt
    - convert logical coherence into final authority
    - convert Σ into totalization
    - convert Ω into justificatory authority
    - convert Λ into defect, ignorance, nihilism, or metaphysical pointer
    - claim PMS Base output check
  tripartition:
    pre_moral_justification:
      label: Pre-moral level of justification
      applicability: <active | weak | not_applicable | needs_review>
      operators_involved:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      claim: 'This level identifies the structural conditions under which the case becomes praxeologically legible before
        evaluative or normative interpretation appears.

        '
      case_application: '<Explain how the case shows structural differentiation, directional tension, framing, meaningful
        absence, or stabilization before any normative or evaluative layer is introduced.>

        '
      no_normativity_introduced: true
      notes:
      - No norms, values, duties, prescriptions, or moral commands are introduced.
      - Patterns may stabilize without intention, moral assessment, or authority.
    logical_boundary_management:
      label: Logical level of ordering and boundary management
      applicability: <active | weak | not_applicable | needs_review>
      dominant_operators:
      - □
      - Λ
      - Χ
      - Σ
      dependency_note: 'The listed operators are dominant boundary-management operators. Their PMS dependencies remain intact;
        especially Χ and Σ must not be treated as dependency-free shorthand.

        '
      claim: 'Logic functions as an ordering and integration instrument. It may organize coherence within a frame, but it
        does not become final authority or deliver ultimate closure where Λ persists.

        '
      case_application: '<Explain how the case involves closure pressure, boundary management, non-closure, consistency without
        final closure, or integration without totalization.>

        '
      aphorism: Logic is the beginning of everything — not the end.
      boundary_result: '<State where the case reaches a logical boundary, how Λ is carried, and how Χ prevents forced closure
        or authority-smuggling.>

        '
    post_moral_effects:
      label: Post-moral level of effects
      applicability: <active | weak | not_applicable | needs_review>
      operators_involved:
      - Ω
      - Θ
      - Ψ
      - Χ
      claim: 'Effects become morally readable once praxis unfolds under asymmetry and irreversible time, while responsibility
        is reconstructed as attributability rather than as an ought.

        '
      case_application: '<Explain whether the case produces responsibility-readability, consequence-attribution, exposure,
        non-innocence, or post-hoc moral interpretability without deriving a normative demand.>

        '
      core_formula: Pre-moral in justification, logical in boundary management, post-moral in effect.
      no_ought_derived: true
  key_claims:
    C1_non_closure_as_strength:
      status: <active | weak | not_applicable | needs_review>
      claim: 'Non-closure is treated as a structural strength rather than a mere deficiency. Persistent Λ prevents logical
        systems from compensating uncertainty with dogma or substitute narratives.

        '
      case_application: '<State how the case carries non-closure instead of treating it as failure, ignorance, or defect.>

        '
    C2_morality_as_readability_field:
      status: <active | weak | not_applicable | needs_review>
      claim: 'Morality is not reconstructed as an operator, but as a readability field under constellations involving Ω, Θ,
        Λ, and Ψ.

        '
      case_application: '<State whether and how the case becomes morally readable without introducing morality as PMS operator
        or normative system.>

        '
    C3_responsibility_as_attribution_not_prescription:
      status: <active | weak | not_applicable | needs_review>
      claim: 'What everyday language may call obligation is reconstructed as attribution of consequences, not prescriptive
        demand.

        '
      case_application: '<State whether the case involves consequence-attribution without deriving duty, command, blame, or
        sanction.>

        '
    C4_apparent_norms_as_failure_mode_constraints:
      status: <active | weak | not_applicable | needs_review>
      claim: 'Apparent norms can be reconstructed as structural failure-mode constraints stabilized by self-binding, without
        external authority or prescriptive ought.

        '
      case_application: '<State whether the case contains apparent norms that are better read as structural constraints or
        failure-mode boundaries.>

        '
    C5_logic_as_ordering_tool_not_authority:
      status: <active | weak | not_applicable | needs_review>
      claim: 'Logic remains important for consistency and integration, but becomes structurally unstable when it attempts
        final authority or closure beyond what the frame can deliver under persistent Λ.

        '
      case_application: '<State whether the case involves logic as tool, closure drive, or authority-risk.>

        '
  source_boundary_formulas:
    status: <active | weak | not_applicable | needs_review>
    no_norms_yet_no_innocence: 'No norms are derived, yet irreversible praxis under Ω, Θ, Λ, and Ψ may remain structurally
      non-innocent. This is attributability, not guilt or blame.

      '
    no_authority_yet_no_arbitrariness: 'LOGIC is not final authority, but explicit frames, asymmetry, temporality, and
      self-binding prevent arbitrary flattening.

      '
    no_closure_yet_no_collapse: 'Persistent Λ is carried as non-closure without collapsing into nihilism, metaphysical
      compensation, or forced Σ-totalization.

      '
    between_indifference_and_prescription: 'The LOGIC reading may show that a configuration is not irrelevant, but it
      must not turn that readability into prescription.

      '
    case_application: '<State which source-boundary formula, if any, is needed to prevent LOGIC overreach in this case.>

      '
  responsibility_readability_chain:
    status: <active | weak | not_applicable | needs_review>
    source: PMS-LOGIC.yaml:paper_lens.operator_sequences.responsibility_readability_chain
    chain_type: readability_chain_not_dependency_definition
    sequence:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    note: 'This sequence is used as a LOGIC readability chain for responsibility, non-closure, and moral-readability analysis.
      It is not a new PMS dependency definition; PMS.yaml dependencies remain authoritative.

      '
    case_application: '<State whether the full LOGIC readability chain is active in the case, only partially active, or not
      applicable.>

      '
  theses_and_definitions:
    intermediate_thesis:
      label: Boundary point of logic
      quote: Logic does not end in silence, but in a structurally sustainable non-assertion.
      operator_reading: 'Non-event Λ, stabilized by Α within □, may mark a disciplined stopping point for logic rather than
        failure or negation.

        '
      case_application: '<State the disciplined stopping point of logic in this case, if present.>

        '
    central_thesis:
      quote: From effective capacity follows structural responsibility, not obligation.
      operator_reading:
        responsibility_requires:
        - effective capacity within □
        - irreversibility under Θ
        - distribution gradients under Ω
        - attributability continuity via Ψ
      case_application: '<State whether effective capacity is present, absent, weak, or under-specified, and whether responsibility-readability
        follows.>

        '
