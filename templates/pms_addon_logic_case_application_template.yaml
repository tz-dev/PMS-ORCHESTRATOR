  glossary_alignment:
    Attributability:
      definition: Structural assignability of consequences to an agent or trajectory.
      case_relevance: <active | weak | not_applicable | needs_review>
    Closure_Non_Closure_Lambda:
      definition: Closure refers to final explanation or justification; Λ marks the structural impossibility of such finality.
      case_relevance: <active | weak | not_applicable | needs_review>
    Logic_paper_specific:
      definition: Discipline of consistency and derivation operating within frames; tool, not final authority.
      case_relevance: <active | weak | not_applicable | needs_review>
    Moral_Morality:
      definition: Interpretability of praxis once responsibility is structurally attributable under Ω, Θ, and Λ.
      case_relevance: <active | weak | not_applicable | needs_review>
    Norm_Ought:
      definition: A prescriptive demand; no PMS operator generates norms or ought-statements.
      case_relevance: <active | weak | not_applicable | needs_review>
    Non_Innocence:
      definition: Consequences are attributable even without intent or command; distinct from guilt or blame.
      case_relevance: <active | weak | absent | under_specified | not_applicable>
    Potential_Capacity:
      definition: Effective ability to influence outcomes within □ and over Θ; exposure to consequences, not obligation.
      case_relevance: <active | weak | absent | under_specified | not_applicable>
    Responsibility:
      definition: Attribution of consequences to a self-bound trajectory under Ω and Θ; not equivalent to duty.
      case_relevance: <active | weak | not_applicable | needs_review>
    Self_Binding_Psi:
      definition: Commitment to integrated structures over time; accountability without external authority or moral command.
      case_relevance: <active | weak | not_applicable | needs_review>
    Structural_Failure_Mode:
      definition: Operator distortion leading to structural instability; not clinical or moral label.
      case_relevance: <active | risk | not_applicable | needs_review>
  source_and_claim_burden_discipline:
    source_status_required: true
    rule: 'LOGIC application may structure boundary, attribution, non-closure, reduced-signature, and failure-mode relations
      only within the source and claim limits inherited from the pre-analysis and checked Core case. It must not raise source
      status or claim strength merely because the LOGIC overlay is coherent.

      '
    required_checks:
    - id: source_status_preserved
      check: Does the LOGIC overlay preserve the source status imported from the pre-analysis/Core record?
    - id: claim_ceiling_preserved
      check: Does LOGIC avoid strengthening the claim beyond the checked Core claim ceiling?
    - id: logical_coherence_not_truth_proof
      check: Does the overlay avoid treating coherence, consistency, or boundary clarity as factual output check?
    - id: non_innocence_not_guilt
      check: Does the overlay preserve non-innocence as structural readability rather than guilt assignment?
    - id: attributability_not_blame
      check: Does the overlay keep responsibility-readability separate from blame, sanction, or moral verdict?
    - id: counter_readings_preserved
      check: Are rival/counter-readings preserved rather than absorbed into LOGIC closure?
    - id: non_closure_preserved
      check: Is persistent Λ/non-closure marked without being converted into defect, nihilism, or final authority?
    claim_strengthening_requires:
    - new external source support
    - explicit human review where person-near/public/institutional/technical use is intended
    - updated claim boundary in later Case Record
    forbidden_claim_upgrades:
    - LOGIC_applied_therefore_claim_checked
    - logical_boundary_identified_therefore_case_settled
    - non_innocence_identified_therefore_actor_guilty
    - attributability_identified_therefore_person_blameworthy
    - coherence_identified_therefore_truth_confirmed
    - LOGIC_output_authorizes_MIP_or_AHP
