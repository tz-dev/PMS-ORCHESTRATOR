  claim_ceiling: <imported_or_lowered_claim_ceiling>
  person_nearness_level: <none | low | medium | high | severe | unclear>
  publicness_level: <private | limited_internal | public | institutional | technical | automated | article_level | unclear>
  irreversibility_level: <low | medium | high | severe | unclear>
