  description: Formal representation of self-binding as the result of integrated, reflexively modulated, temporally
    extended, asymmetry-aware patterns of praxis being bound into a relatively stable self-relation.
  case_reading: <Explain whether SELF_FIXPOINT is the primary structure of the case, secondary, analytic-only, or
    not applicable.>
