  - PMS_Core_case_application
  - bounded_structural_reading
  - checked_pre_analysis_constrained_output
  - handoff_record_for_later_checked_layers
  this_core_output_is_not:
  - PMS_Base_revision
  - truth_certification
  - empirical_proof
  - diagnostic_assessment
  - legal_or_forensic_conclusion
  - person_ranking
