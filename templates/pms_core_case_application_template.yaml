  use_constraint: 'May be used later only as one actually produced artefact after this Core output has been checked
    or conservatively corrected.'
  fields_to_export:
  - case
  - checked_pre_analysis_import
  - pms_entry_condition
  - application_discipline
  - core_principle_alignment
  - pms_model_reference_application
  - operator_analysis
  - operator_layer_mapping
  - dependency_logic
  - dependency_table_reference
  - derived_structure_discipline
  - derived_axes_projection
  - self_model_analysis
  - asymmetry_drift_patterns
  - example_operator_chains_application
  - computational_representation
  - ai_interface_pms_alignment
  - analysis_quality_control
  - operationalization_requirements
  - guardrails
  - limits
  - case_synthesis
  - core_application_limits
  - core_handoff
  - final_structural_formula
  claims_not_licensed_by_export:
  - truth_certification
  - PMS_Base_validation
  - final_decision_execution
  - person_ranking
  - implementation_validation
  - article_publication_permission
  next_required_step: core_output_check
analysis_quality_control:
  claim_type:
    primary: <model_internal_derivation | conceptual_projection | scene_bound_structural_reading | empirical_claim | implementation_claim>
    secondary: []
    not_claimed:
    - metaphysical_proof
    - phenomenological_account
    - clinical_assessment
    - legal_or_forensic_judgment
    - person_ranking
    - pms_base_validation
  case_type:
    value: <concrete_praxis_scene | conceptual_domain_projection | comparative_theoretical_case | implementation_projection | empirical_application>
    concrete_scene: <true | false>
    implication: <State what this case type permits and does not permit.>
  coherence_risk:
    status: <low | medium | high>
    reason: <Explain whether the PMS reading risks becoming too smooth, over-assimilative, or under-discriminating.>
    mitigation: <State how discrimination tests, rival readings, non-capture, and falsifiers constrain the reading.>
  coverage_vs_discrimination:
    coverage_result: <State what PMS covers well in the case.>
    discrimination_requirement: <State what the PMS reading must distinguish from adjacent cases.>
    discrimination_status: <strong | partial | weak | failed>
  discrimination_tests:
  - id: DT1
    test: <What must PMS distinguish here?>
    expected_pms_distinction: <Operator-level distinction required.>
    current_status: <satisfied | partially_satisfied | failed | not_tested>
  - id: DT2
    test: <What must PMS distinguish here?>
    expected_pms_distinction: <Operator-level distinction required.>
    current_status: <satisfied | partially_satisfied | failed | not_tested>
  calibration_points:
  - operator: Δ
    question: <What calibrates Difference in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: ∇
    question: <What calibrates Impulse in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: □
    question: <What calibrates Frame in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: Λ
    question: <What calibrates Non-Event in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: Α
    question: <What calibrates Attractor in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: Ω
    question: <What calibrates Asymmetry in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: Θ
    question: <What calibrates Temporality in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: Φ
    question: <What calibrates Recontextualization in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: Χ
    question: <What calibrates Distance in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: Σ
    question: <What calibrates Integration in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  - operator: Ψ
    question: <What calibrates Self-Binding in this case?>
    current_calibration: <satisfied | partial | weak | failed>
  possible_non_capture:
    status: kept_open
    zones:
    - <zone of possible non-capture>
    rule: These zones must not be automatically redescribed as PMS drift, calibration residue, incomplete integration,
      structured absence, or failed integration. They may mark genuine limits of the PMS reading.
  rival_reading_placeholder:
    status: required_but_not_resolved
    examples:
    - <rival reading or formalization>
    rule: Rival readings remain epistemically open. PMS translation does not defeat them unless comparison criteria
      are explicitly specified and applied.
  falsifier_conditions:
  - id: F1
    condition: <What would weaken, under-specify, overextend, or invalidate the PMS reading?>
  - id: F2
    condition: <What would show that PMS is under-discriminating?>
  - id: F3
    condition: <What would show over-assimilation or loss of non-capture?>
  final_quality_status:
    result: <usable_with_limits | under_specified | invalid_as_pms_application | requires_reanalysis>
    reason: <State final quality-control judgment.>
    boundary_note: This is Core quality status only. It is not a final decision state.
operationalization_requirements:
  status: <not_fulfilled_in_this_conceptual_projection | fulfilled | partially_fulfilled | not_required>
  purpose: These requirements identify what would be needed before the Core reading could support stronger empirical,
    comparative, computational, institutional, technical, or public claims.
  required_for_empirical_or_applied_use:
    observable_indicators:
      Δ: <indicator requirement>
      ∇: <indicator requirement>
      □: <indicator requirement>
      Λ: <indicator requirement>
      Α: <indicator requirement>
      Ω: <indicator requirement>
      Θ: <indicator requirement>
      Φ: <indicator requirement>
      Χ: <indicator requirement>
      Σ: <indicator requirement>
      Ψ: <indicator requirement>
    negative_cases:
    - <negative case or contrast case>
    comparison_needs:
    - rival_model_comparison
    - explicit_criteria_for_superior_discrimination
    - calibration_thresholds_for_operator_activation
    - case_specific_evidence
    - external_evaluation_where_empirical_claims_are_made
  current_status: <State whether operationalization is fulfilled.>
guardrails:
  general:
  - Do not infer mental states, traits, or diagnoses from PMS descriptions.
  - Keep all findings tied to structures of praxis, not to ontological claims about persons.
  - Treat asymmetry (Ω) as a structural fact, not as moral judgement.
  - Do not use PMS to rank or compare human beings.
  - Do not treat translation into PMS terms as proof of exhaustive capture.
  - Do not treat absence of rival models, or lack of current comparison, as proof of completeness.
  - Do not frame resistance, disagreement, discontinuity, rupture, or non-alignment as imintegration per se.
  - Do not operationalize truth claims without reversibility, Distance (Χ), Dignity-in-Practice (D), and external
    accountability.
  - Preserve intelligibility, revisability, and scene-bounded interpretation.
  case_specific:
    non_psychological: <State case-specific non-psychological boundary.>
    non_metaphysical: <State case-specific non-metaphysical boundary.>
    non_diagnostic: <State case-specific non-diagnostic boundary.>
    non_legal_forensic: <State case-specific non-legal/non-forensic boundary.>
    non_implementation_claim: <State case-specific implementation boundary.>
    non_moral_ranking: <State case-specific non-ranking boundary.>
    non_exhaustive_capture: <State case-specific non-capture boundary.>
    reversibility: <State how reversibility is preserved.>
    dignity_in_practice: <State how Dignity-in-Practice is preserved.>
limits:
  source_limits:
  - <source limit>
  claim_limits:
  - <claim limit>
  operator_limits:
  - <operator limit>
  derived_projection_limits:
  - <derived projection limit>
  person_nearness_limits:
  - <person-nearness limit>
  publicness_limits:
  - <publicness limit>
  irreversibility_limits:
  - <irreversibility limit>
  rival_and_non_capture_limits:
  - <rival/non-capture limit>
  correctability_limits:
  - <correctability limit>
  explicitly_not_claimed:
