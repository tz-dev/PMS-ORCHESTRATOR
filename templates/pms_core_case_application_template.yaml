      description: Frequent recontextualization without sufficient integration leads to unstable trajectories and
        weak coherence of praxis, especially where unstable recontextualization and weak integration unfold under
        asymmetrically loaded praxis conditions.
    generative_mechanism:
    - 'Φ: frames are frequently shifted or updated in ways that destabilize continuity.'
    - 'Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment.'
    case_reading: <Explain whether this drift pattern appears, remains only a risk, or is not applicable.>
