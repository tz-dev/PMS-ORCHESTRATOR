schema_version: PMS_1.3
schema_role: pms_core_case_application_template
analysis_mode: pms_core_case_application_after_checked_pre_analysis
template_status: pms_discipline_clean_pms_core_case_application_template
template_version: PMS-DISCIPLINE_CORE_CASE_APPLICATION_TEMPLATE_CLEAN_v0.3
template_purpose: Template for rendering a PMS_1.3-conformant PMS Core case analysis after checked PMS-DISCIPLINE
  Pre-Analysis. It applies PMS.yaml as the only PMS Base reference and uses the checked Pre-Analysis only to constrain
  boundary, input status, intended use, claim ceiling, rival pressure, non-capture, falsifier conditions, and correctability.
  It preserves detailed Core operator definitions, calibration points, falsifier conditions, derived structures,
  discrimination tests, guardrails, and case-bound synthesis. It does not replace PMS.yaml, redefine PMS Base, introduce
  new PMS operators, treat derived structures as independent primitives, certify truth, close the case, produce
  a Case Record, render Markdown, execute a final decision state, or decide any later specialized layer.
repository_reference:
  model_name: Praxeological Meta-Structure
  model_short: PMS
  reference_file: PMS.yaml
  reference_status: repository_reference
  repository_role: current_base_schema
  reference_last_updated: '2026-04-06'
  base_schema_status: repository_reference_only
  role_of_pms_yaml: 'PMS.yaml supplies the PMS Base operator grammar, derived projections, application guardrails,
    and repository reference constraints for this Core application. This Core template remains subordinate to PMS.yaml.'
source_priority:
  pms_yaml:
    priority: 1
    role: PMS Base reference already read before this step.
    may_supply:
    - PMS operator inventory
    - operator dependency path
    - derived projection status
    - PMS application guardrails
    - PMS non-authority boundaries
    may_not_supply:
    - case facts beyond the CASE PACKET
    - final decision execution
    - later-layer decision
  checked_pre_analysis_yaml:
    priority: 2
    role: Checked pre-Core use-discipline record.
    may_supply:
    - case boundary
    - input status
    - intended use
    - claim ceiling
    - person-nearness, publicness, and irreversibility burden
    - preliminary operator pressure
    - derived-structure pressure
    - rival pressure
    - non-capture zones
    - falsifier and reopening conditions
    - correctability requirements
    may_not_supply:
    - PMS Base revision
    - Core analysis result
    - later-layer selection
    - final decision execution
  case_packet:
    priority: 3
    role: Case material supplied for this run.
    expected_fields:
    - CASE TITLE
    - CASE MATERIAL
    - SOURCE STATUS
    - INTENDED USE
  this_core_template:
    priority: 4
    role: Output structure for this PMS Core case application.
workflow_position:
  phase: core_case_application
  step_id: pms_core_case_application
  step_role: Apply PMS Core to the case under the checked Pre-Analysis boundaries.
  preceded_by_required_steps:
  - read_pms_yaml
  - checked_pre_analysis_yaml
  next_required_step:
  - core_output_check
  later_layers_that_may_use_this_record:
  - later_gate_templates
  - case_record_pipeline
  - markdown_rendering
  route_boundary: 'This step produces a Core case application and handoff record only. Later gate templates decide
    their own use from checked prior artefacts. This Core template must not select, recommend, authorize, or apply
    later layers.'
template_io_contract:
  required_inputs:
  - PMS.yaml_read_completely
  - case_packet
  - checked_pre_analysis_yaml
  - pms_core_case_application_template
  optional_inputs:
  - human_notes_marked_as_context_only
  forbidden_inputs_for_this_step:
  - unprovided_files
  - unverified_case_material
  - later_layer_outputs
  - markdown_article
  - case_record
  produced_outputs:
  - completed_pms_core_case_yaml
  - core_operator_analysis
  - core_dependency_analysis
  - derived_structure_status
  - core_claim_boundary_record
  - non_capture_and_rival_pressure_record
  - falsifier_and_reopening_conditions
  - core_quality_control_record
  - core_handoff
  - case_record_handoff
  not_produced_outputs:
  - PMS_Base_revision
  - truth_certificate
  - empirical_finding
  - person_level_label
  - later_layer_decision
  - case_record
  - markdown_article
  - final_decision_execution
