derived_axes_projection:
  Awareness_A:
    symbol: A
    formula:
    - Θ
    - □
    - Δ
    description: Sustained, framed differentiation across time.
    generative_reasoning:
    - Δ enables distinctions in the field.
    - □ frames distinctions as situationally relevant.
    - Θ maintains these framed distinctions over time.
    notes: Awareness is modeled structurally, not phenomenologically. Within PMS it can be systematically derived
      from this operator sequence, but this does not imply that all notions of awareness are exhausted by it.
    case_reading: <Explain how sustained, framed differentiation across time appears in the case.>
    status: <active | weak | not_applicable | analytic_constraint>
    calibration_points:
    - <Specify what is being differentiated, in what frame, and across what temporal structure.>
    non_capture_note: Structural awareness is not phenomenological consciousness.
  Coherence_C:
    symbol: C
    formula:
    - Θ
    - Λ
    - □
    - ∇
    description: Temporally stabilized structuring of impulse and expectation within a frame.
    generative_reasoning:
    - ∇ introduces directional impulse.
    - □ constrains and structures the impulse.
    - Λ encodes expectations and meaningful non-events.
    - Θ temporalizes the configuration into trajectories.
    notes: Coherence captures narrative stability of action, including meaningful absences and delays, without yet
      requiring full integration or self-binding. Rival theories may formalize coherence differently.
    case_reading: <Explain how impulse, frame, expectation, non-event, and temporality stabilize coherence in the
      case.>
    status: <active | weak | not_applicable | analytic_constraint>
    calibration_points:
    - <Distinguish coherence from truth, validity, forced integration, or narrative smoothing.>
    non_capture_note: Coherence does not prove adequacy.
  Responsibility_R:
    symbol: R
    formula:
    - Ψ
    - Φ
    - Θ
    - Ω
    description: Self-binding orientation toward asymmetry extended across time and recontextualization.
    generative_reasoning:
    - Ω creates structural imbalance in exposure, capacity, or obligation.
    - Θ extends this imbalance into enduring commitments.
    - Φ allows reinterpretation of obligations under changing conditions.
    - Ψ binds the agent to these obligations as part of its self-relation.
    notes: Responsibility is structural rather than moralistic in this specification. It is formally derived within
      PMS, not asserted as the only valid theory of responsibility.
    case_reading: <Explain whether responsibility is active, analytic-only, or not applicable in this case.>
    status: <active | weak | not_applicable | analytic_constraint>
    calibration_points:
    - <Identify asymmetry, temporality, recontextualization, and self-binding before claiming responsibility.>
    non_capture_note: Responsibility_R is not moral blame, diagnosis, or legal liability.
  Action_E:
    symbol: E
    formula:
    - Σ
    - Θ
    - ∇
    description: Integrated realization of directedness across time.
    generative_reasoning:
    - ∇ provides energetic directedness.
    - Θ structures this directedness as a trajectory rather than a momentary reaction.
    - Σ integrates conflicting impulses, constraints, and roles into a coherent enactment.
    notes: Action here is not any behavior; it is integrated and temporally extended. Higher operators such as Ω,
      Φ, and Ψ may enrich it, but are not required for its minimal structural definition within PMS.
    case_reading: <Explain how integrated realization of directedness across time appears, or why action is under-specified.>
    status: <active | weak | under_specified | not_applicable>
    calibration_points:
    - <Distinguish action from mere behavior, thought, claim, or abstract structure.>
    non_capture_note: Without a concrete scene, Action_E may remain under-specified.
  Dignity_in_Practice_D:
    symbol: D
    formula:
    - Ψ
    - Χ
    - Ω
    description: Self-bound reflective restraint and protection in asymmetrical relations.
    generative_reasoning:
    - Ω foregrounds vulnerability and directional power.
    - Χ introduces reflective distance and inhibition of destructive impulses.
    - Ψ binds the agent to norms that protect standing under asymmetry.
    notes: Dignity-in-practice is a structural stance in action. It concerns how asymmetry is handled, not the ranking
      of persons or ontological worth.
    case_reading: <Explain how Dignity-in-Practice constrains the analysis or the scene.>
    status: <active | weak | not_applicable | application_constraint>
    calibration_points:
    - <Check whether asymmetry is handled without ranking, shaming, or irreversible labeling.>
    non_capture_note: D is a praxeological application constraint, not an ontological or moral superiority claim.
