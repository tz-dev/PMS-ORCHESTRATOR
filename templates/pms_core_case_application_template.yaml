case_synthesis:
  primary_pms_reading: <Concise synthesis of the PMS reading of the case.>
  continuity_condition: <If relevant, state continuity condition. Otherwise mark not applicable.>
  change_condition: <If relevant, state change/recontextualization condition. Otherwise mark not applicable.>
  rupture_or_non_fit_condition: <State how rupture, resistance, disagreement, absence, or non-fit is preserved without
    automatic assimilation.>
  responsibility_condition: <If relevant, state responsibility condition. Otherwise mark not applicable.>
  dignity_condition: <State how dignity-in-practice constrains the analysis.>
  rival_reading_condition: <State how rival formalizations remain open.>
final_structural_formula:
  formula_status: <usable_with_limits | under_specified | invalid_as_pms_application | unclear>
  compact_formula: <PMS operator formula or not_applicable>
  formula_explanation: <brief explanation of formula>
  formula_limits:
  - formula is a compressed PMS-internal reading, not a final result
  - formula does not certify truth
  - formula does not validate PMS Base
  - formula does not execute final decision state
  core_formula_status: <usable_with_limits | under_specified | invalid_as_pms_application | unclear>
validation_checks:
  core_template_valid_yaml: <true | false | unchecked>
  pms_yaml_not_redefined: <true | false | unclear>
  no_new_pms_operators: <true | false | unclear>
  checked_pre_analysis_imported: <true | false | unclear>
  input_status_preserved: <true | false | unclear>
  intended_use_preserved: <true | false | unclear>
  claim_ceiling_preserved_or_lowered: <true | false | unclear>
  operator_status_marked_as_case_bound: <true | false | unclear>
  derived_structures_not_reified: <true | false | unclear>
  non_capture_preserved: <true | false | unclear>
  rival_readings_preserved_or_absence_marked: <true | false | unclear>
  falsifier_conditions_included_or_imported: <true | false | unclear>
  correctability_preserved: <true | false | unclear>
  no_empirical_diagnostic_legal_implementation_or_base_validation_overclaim: <true | false | unclear>
  no_later_layer_decision_made: <true | false | unclear>
  case_record_not_produced: <true | false | unclear>
  markdown_not_produced: <true | false | unclear>
  final_decision_not_executed: <true | false | unclear>
conservative_patch_policy:
  patch_role: For later Core output check only. This section does not perform the check.
  patch_when:
  - missing_required_field
  - invalid_yaml
  - placeholder_left_where_case_specific_value_required
  - claim_type_too_strong
  - input_status_laundering
  - operator_assignment_treated_as_final
  - derived_projection_treated_as_person_label
  - non_capture_or_rival_pressure_missing
  - falsifier_conditions_missing
  - correctability_missing
  - overclaim_detected
  - false_file_reference_detected
  - unsupported_layer_reference_detected
  patch_must_not:
  - strengthen_claims
  - invent_case_material
  - invent_files
  - introduce_new_PMS_operators
  - execute_final_decision_state
  - decide_later_layer_use