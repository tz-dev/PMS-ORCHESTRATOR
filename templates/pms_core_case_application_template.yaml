core_principle_alignment:
  P1_praxeological_focus:
    id: P1
    title: Praxeological focus
    base_text: PMS analyzes enactments, roles, and structures of praxis. It does not analyze persons as ontological
      entities or psychological essences.
    status: <satisfied | partial | failed | not_applicable>
    case_application: <Explain how the case is treated as praxis-structure rather than person essence, psychology,
      or ontology.>
    failure_condition: The analysis would fail P1 if it generated global person-labels, psychological essence claims,
      or ontological person rankings.
  P2_proposed_operator_minimality:
    id: P2
    title: Proposed operator minimality
    base_text: The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal generative basis for praxis.
      Whether they are fully complete, optimally minimal, or uniquely ordered remains open to further formalization
      and critique.
    status: <satisfied | partial | failed | not_applicable>
    case_application: <Confirm that only PMS operators Δ–Ψ are used as PMS operators.>
    failure_condition: The analysis would fail P2 if it introduced new PMS operators, axes, or primitives as if
      they belonged to PMS Base.
  P3_generativity:
    id: P3
    title: Generativity
    base_text: 'PMS is generative: a wide range of praxis structures such as awareness, coherence, responsibility,
      action, dignity-in-practice, and asymmetry drift patterns can be systematically derived within PMS from operator
      compositions rather than introduced as independent primitives.'
    status: <satisfied | partial | failed | not_applicable>
    case_application: <Explain which structures are derived rather than assumed.>
    failure_condition: The analysis would fail P3 if derived structures were treated as independent axioms.
  P4_temporal_and_asymmetry_awareness:
    id: P4
    title: Temporal and asymmetry awareness
    base_text: Asymmetry (Ω) and temporality (Θ) are treated as central structural operators. Responsibility, integration,
      and dignity-in-practice are analyzed under temporal and asymmetrical conditions rather than as static attributes.
    status: <satisfied | partial | failed | not_applicable>
    case_application: <Explain the role of Ω and Θ, or why one is weak/not active.>
    failure_condition: The analysis would fail P4 if it ignored relevant asymmetry or temporality or imported them
      without calibration.
  P5_computational_boundedness:
    id: P5
    title: Computational boundedness
    base_text: PMS may be represented computationally, but representation does not by itself imply direct implementation,
      guaranteed interoperability, or explanatory adequacy. Operational use requires calibration, constraints, and
      evaluation.
    status: <satisfied | partial | failed | not_applicable>
    case_application: <State that YAML representation is not implementation or validation.>
    failure_condition: The analysis would fail P5 if it treated YAML form as implemented praxis, empirical adequacy,
      or computational sufficiency.
  P6_rival_openness:
    id: P6
    title: Rival openness
    base_text: PMS is not treated as exempt from rivalry. Comparison with alternative grammars, sharper discriminative
      models, or more empirically grounded formalisms remains methodologically open.
    status: <satisfied | partial | failed | not_applicable>
    case_application: <Identify rival readings or leave a placeholder.>
    failure_condition: The analysis would fail P6 if it treated PMS translation as defeating rival formalisms by
      default.
  P7_non_capture_openness:
    id: P7
    title: Non-capture openness
    base_text: Translation of a phenomenon into PMS terms does not by itself prove exhaustive capture. Some forms
      of praxis may remain only partially legible or may resist assimilation within the current grammar.
    status: <satisfied | partial | failed | not_applicable>
    case_application: <Preserve what may remain outside PMS capture.>
    failure_condition: The analysis would fail P7 if all non-fit were absorbed as drift, incomplete integration,
      or calibration failure.
  P8_non_diagnostic_use:
    id: P8
    title: Non-diagnostic use
    base_text: PMS is not a diagnostic tool and must not be used for individual clinical, therapeutic, forensic,
      or person-ranking decisions.
    status: <satisfied | partial | failed | not_applicable>
    case_application: <State non-diagnostic boundary.>
    failure_condition: The analysis would fail P8 if it inferred pathology, traits, competence, risk, or diagnosis.
  P9_scenic_context_bound_interpretation:
    id: P9
    title: Scenic, context-bound interpretation
    base_text: Any application of PMS must keep findings tied to specific praxeological scenes, roles, and structures.
      Global person-labels and irreversible ontological attributions are out of scope.
    status: <satisfied | partial | failed | not_applicable>
    case_application: <Tie analysis to the specific scene or explicitly mark it as a non-concrete case-type-bound
      projection.>
    failure_condition: The analysis would fail P9 if it generated global, irreversible, decontextualized claims.
pms_model_reference_application:
  operator_order_status: <preserved | partially_used | unclear>
  operator_order_reference:
  - Δ
  - ∇
  - □
  - Λ
  - Α
  - Ω
  - Θ
  - Φ
  - Χ
  - Σ
  - Ψ
  dependency_order_not_hierarchy: true
  local_salience_not_authority: true
  operator_assignment_rule: 'Operators are assigned only where they do structural work in the bounded case. Symbolic
    availability, topic vocabulary, or thematic nearness is not enough.'
operator_analysis:
  Δ:
    id: Δ
    name: Difference
    order: 1
    definition: Minimal structural distinction enabling differentiation.
    depends_on: []
    provides:
    - boundary_formation
    - object_differentiation
    - structural_contrast
    examples:
    - self vs. other
    - inside vs. outside a role
    - allowed vs. forbidden action
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Explain the primary distinction(s) that make the case structurally analyzable.>
    dependency_status: root_operator_available
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Specify exactly what distinction is being made.>
    - <Check whether distinctions are imported, ambiguous, or conflated.>
    falsifier_conditions:
    - <If no stable distinction can be identified, the PMS reading loses its entry point.>
    non_capture_note: Difference does not by itself prove that PMS captures the case.
  ∇:
    id: ∇
    name: Impulse
    order: 2
    definition: Directional tension or drive arising from difference.
    depends_on:
    - Δ
    provides:
    - activation
    - orientation
    - energetic_gradient
    - proto_agency
    examples:
    - desire triggered by perceived lack
    - urge to correct an imbalance
    - movement toward or away from a signal
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Explain the directional tension, orientation, pressure, or activation arising from the relevant
      difference.>
    dependency_status: <satisfied | weak | failed>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Specify whether the tension is practical, argumentative, explanatory, affective, institutional, or structural.>
    - <Do not infer subjective desire unless evidence and scope allow it.>
    falsifier_conditions:
    - <If no directional tension arises from Δ, ∇ is under-specified.>
    non_capture_note: Impulse is structural directedness, not psychological diagnosis.
  □:
    id: □
    name: Frame
    order: 3
    definition: Contextual structure that constrains and shapes impulses.
    depends_on:
    - Δ
    - ∇
    provides:
    - context
    - boundary_conditions
    - relevance_structuring
    - role_space
    examples:
    - institutional rules
    - family role expectations
    - conversation context
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Identify the frame(s) that make the case intelligible and constrain relevance.>
    dependency_status: <satisfied | weak | failed>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Name the active frame.>
    - <Check whether frame shifts occur and whether they are marked.>
    falsifier_conditions:
    - <If no frame is specified, the analysis becomes too abstract to discriminate.>
    non_capture_note: A frame can clarify a case without exhausting it.
  Λ:
    id: Λ
    name: Non-Event
    order: 4
    definition: 'Structured absence: meaningful failure or delay of an expected occurrence within a frame.'
    depends_on:
    - □
    provides:
    - expectation
    - counterfactual_structure
    - tension_through_absence
    examples:
    - a promised reply that never arrives
    - silence where a response is expected
    - postponed decision that reshapes the situation
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Identify meaningful absence, delay, omission, failure, silence, missing evidence, unresolved
      expectation, or counterfactual structure.>
    dependency_status: <satisfied | weak | failed | not_active>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Specify the expected occurrence and the frame within which its absence matters.>
    - <Preserve the possibility that absence marks PMS non-capture rather than case defect.>
    falsifier_conditions:
    - <If no structured expectation exists, Λ should not be asserted.>
    non_capture_note: Absence must not be automatically translated into incomplete integration.
  Α:
    id: Α
    name: Attractor
    order: 5
    definition: Recurrent pattern or stabilization emerging from repeated structural interaction.
    depends_on:
    - Δ
    - ∇
    - □
    - Λ
    provides:
    - pattern_formation
    - stability
    - path_dependence
    - role_script_emergence
    examples:
    - repeated avoidance of conflict
    - reliable punctuality
    - stable institutional routine
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Identify recurrence, stabilization, path dependence, routine, repeated pattern, or role-script
      emergence.>
    dependency_status: <satisfied | weak | failed | not_active>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Show recurrence or stabilization rather than merely naming repetition.>
    - <Distinguish stable attractor from accidental aggregation.>
    falsifier_conditions:
    - <If recurrence is not shown, Α is over-read.>
    non_capture_note: Pattern formation is not proof of explanatory sufficiency.
  Ω:
    id: Ω
    name: Asymmetry
    order: 6
    definition: Structural imbalance establishing directionality of power, exposure, capacity, or obligation.
    depends_on:
    - Α
    provides:
    - role_differentiation
    - responsibility_gradients
    - vulnerability_structures
    examples:
    - parent-child relation
    - mentor-apprentice dynamics
    - leader-follower position
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Identify asymmetry of power, exposure, vulnerability, capacity, obligation, responsibility, or
      role differentiation.>
    dependency_status: <satisfied | weak | failed | not_active>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Specify the direction and kind of asymmetry.>
    - <Do not moralize asymmetry by default.>
    - <Allow Ω to be weak or absent where the case does not support it.>
    falsifier_conditions:
    - <If no directional imbalance is identifiable, Ω claims must be removed or marked weak.>
    non_capture_note: Asymmetry is structural, not a moral verdict.
  Θ:
    id: Θ
    name: Temporality
    order: 7
    definition: Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation.
    depends_on:
    - Ω
    - Α
    provides:
    - sequence_and_trajectory
    - persistence
    - anticipation_and_delay
    - developmental_arcs
    examples:
    - long-term responsibility
    - accumulating consequences
    - ongoing development of a role
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Identify sequence, trajectory, persistence, anticipation, delay, development, or temporally extended
      commitment.>
    dependency_status: <satisfied | weak | failed | not_active>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Distinguish diachronic trajectory from static comparison.>
    - <Check whether temporality is essential or merely incidental.>
    falsifier_conditions:
    - <If temporal extension is not required, Θ is overextended.>
    non_capture_note: Temporality in PMS does not by itself settle metaphysical or empirical continuity.
  Φ:
    id: Φ
    name: Recontextualization
    order: 8
    definition: Transformation through placing an existing structure into a new frame.
    depends_on:
    - Θ
    - Ω
    - □
    provides:
    - adaptation
    - reinterpretation
    - developmental_change
    - pattern_shift
    examples:
    - reframing conflict as misunderstanding
    - seeing a failure as a learning step
    - renegotiating role expectations
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Identify how the case changes when an existing structure is placed into a new frame.>
    dependency_status: <satisfied | weak | failed | not_active>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Name source frame and target frame.>
    - <Check whether recontextualization clarifies or merely absorbs non-fit.>
    falsifier_conditions:
    - <If every rupture or resistance is absorbed as Φ, the reading is over-assimilative.>
    non_capture_note: Recontextualization must preserve possible non-capture.
  Χ:
    id: Χ
    name: Distance
    order: 9
    definition: Reflective withdrawal that attenuates immediate impulses and patterns.
    depends_on:
    - Φ
    - Θ
    - □
    provides:
    - regulation
    - inhibition
    - reflection_and_meta_position
    examples:
    - pausing before reacting
    - stepping out of a role to reflect
    - deliberately suspending a habitual script
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Identify reflective distance, inhibition, suspension, meta-position, or restraint.>
    dependency_status: <satisfied | weak | failed | not_active>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Check whether the analysis suspends verdict and preserves reversibility.>
    - <Distinguish distance from avoidance, denial, or empty neutrality.>
    falsifier_conditions:
    - <If Χ is suspended to force a verdict, the PMS application is invalid.>
    non_capture_note: Distance protects against overclaiming and preintegrated closure.
  Σ:
    id: Σ
    name: Integration
    order: 10
    definition: Synthesis of disparate or conflicting elements into a more coherent whole.
    depends_on:
    - Χ
    - Φ
    provides:
    - coherence
    - resolution_of_contradiction
    - multi_level_coordination
    - integrated_praxis
    examples:
    - aligning motives and roles
    - integrating emotional impulse and norm
    - forming a coherent action plan
    status_within_pms: treated_as_structurally_basic
    role_in_case: <Identify synthesis, coordination, coherence, or integration of tensions.>
    dependency_status: <satisfied | weak | failed | not_active>
    analytic_weight: <major | moderate | minor | not_active>
    calibration_points:
    - <Test whether integration discriminates rather than smooths over conflict.>
    - <Distinguish integration from forced coherence.>
    falsifier_conditions:
    - <If coherence is treated as proof of adequacy, Σ is overclaimed.>
    non_capture_note: PMS coherence is insufficient by itself.
  Ψ:
    id: Ψ
    name: Self-Binding
    order: 11
    definition: Formation of self-relation through commitment to integrated structures across time.
    depends_on:
    - Σ
    - Θ
    - Χ
    provides:
