pms_entry_condition:
  distance_status: <preserved | weak | missing | unclear>
  reversibility_status: <preserved | weak | missing | unclear>
  dignity_in_practice_status: <preserved | weak | missing | unclear>
  application_validity_status: <valid_as_bounded_pms_application | valid_with_limits | unstable | invalid | unclear>
  note: 'PMS Core application presupposes distance, reversibility, and dignity-in-practice as application conditions.
    The Core output must remain scene-bound, revisable, non-diagnostic, and non-person-ranking.'
application_discipline:
  core_only_sufficiency_rule:
    status: <active | weak | failed | not_applicable>
    statement: 'Core-only may be a complete disciplined Core result where the case can be responsibly read within
      PMS Core under the checked Pre-Analysis limits.'
  later_layer_boundary:
    status: <active | weak | failed | not_applicable>
    statement: 'This Core output may preserve preliminary pressure markers for later review, but it does not select,
      recommend, authorize, or apply later layers.'
  final_decision_state_boundary:
    status: <deferred | prematurely_set | not_applicable | unclear>
    statement: 'This Core output may mark pressure toward proceed, revise, downgrade, suspend, refuse, or redirect,
      but it does not execute the final decision state.'
  claim_restraint_rule:
    status: <active | weak | failed | not_applicable>
    statement: 'The Core reading must remain within or below the checked Pre-Analysis claim ceiling. Where uncertainty,
      person-nearness, publicness, irreversibility, rival pressure, or source weakness raises burden, the claim
      must be weakened or marked as unresolved.'
case:
  title: <case title>
  case_material_summary: <bounded summary of case material>
  interpretation_type: <orientation | structural_sketch | hypothesis | bounded_reconstruction | evaluation | other | unclear>
  case_type: <synthetic_example | source_based_case | mixed_material | model_assisted_material | other | unclear>
  claim_status: <bounded | exploratory | unsupported | contested | unclear>
  source_status: <preserved from CASE PACKET and checked Pre-Analysis>
  intended_use: <preserved from CASE PACKET and checked Pre-Analysis>
  scope: <what this Core reading may cover>
  non_scope:
