  status: "<usable_for_core | usable_for_core_with_limits | usable_for_core_on_permitted_target | requires_revision_before_core | suspend_before_core | refuse_before_core | redirect_before_core | stop_before_core | unclear>"
  reason: "<short reason>"
  next_allowed_step: "<core_case_application | core_case_application_on_permitted_target | revise_pre_analysis | suspend | refuse | redirect | stop | unclear>"
  status_aggregation_rule: >
    The aggregate status describes pipeline readiness only. It must not weaken
    or reverse the requested-output disposition recorded above.
  final_note: >
    This status governs whether the material is ready to move into PMS Core
    application and, where applicable, only on the permitted analysis target.
    It is not a final case decision, not a verdict, and not a claim that later
    layers are authorized.