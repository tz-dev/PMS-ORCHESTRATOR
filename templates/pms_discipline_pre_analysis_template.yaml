  suspend_pressure_reason: "<reason or none>"
  refuse_pressure_reason: "<reason or none>"
  redirect_pressure_reason: "<reason or none>"
  pressure_hierarchy_note: >
    Pressure markers are descriptive and subordinate to the binding scope and
    pipeline disposition. A mixed pressure value cannot override a triggered
    hard gate or authorize a prohibited requested output.
  final_decision_warning: >
