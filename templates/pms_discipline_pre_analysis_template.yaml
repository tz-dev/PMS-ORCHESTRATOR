conservative_patch_policy_for_pre_analysis:
  patch_policy_status: "active_for_pre_analysis_check_only"
  patch_when:
    - "missing_required_field"
    - "invalid_yaml"
    - "placeholder_left_where_case_specific_value_required"
    - "claim_type_too_strong"
    - "input_status_laundering"
    - "operator_assignment_treated_as_final"
    - "add_on_candidate_treated_as_authorized"
    - "non_capture_or_rival_pressure_missing"
    - "falsifier_conditions_missing"
    - "correctability_or_reopening_missing"
    - "overclaim_detected"
    - "false_file_reference_detected"
    - "unsupported_layer_reference_detected"
    - "later_output_generated_inside_pre_analysis"
  do_not_patch_by:
    - "adding_unavailable_source_files"
    - "inventing_missing_evidence"
    - "raising_claim_ceiling"
    - "applying_Core_inside_pre_analysis"
    - "applying_addons_inside_pre_analysis"
    - "creating_article_output"
    - "executing_final_decision_state"
  preferred_patch_style:
    - "conservative"
    - "bounded"
    - "claim_weakening_where_needed"
    - "explicit_missing_or_unclear_markers"
    - "no_new_layer_creation"

final_pre_analysis_status:
  status: "<usable_for_core | usable_for_core_with_limits | requires_revision_before_core | suspend_before_core | refuse_before_core | redirect_before_core | unclear>"
  reason: "<short reason>"
  next_allowed_step: "<core_case_application | revise_pre_analysis | suspend | refuse | redirect | unclear>"
  final_note: >
    This status governs whether the material is ready to move into PMS Core
    application. It is not a final case decision, not a verdict, and not a
    claim that later layers are authorized.