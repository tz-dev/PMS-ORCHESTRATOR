      - "operator_salience_summary"
      - "operator_over_assignment_or_omission_warnings"
      - "core_limits"
      - "core_non_claims"
      - "source_status_constraints_preserved_by_core"
      - "later_layer_review_seed"
    from_output_checks_or_patch_notes:
      - "check_failures_or_warnings"
      - "patches_applied"
      - "remaining_unpatched_issues"
      - "claim_weakening_or_downgrade_pressure"
    from_add_on_gate_or_add_on_outputs:
