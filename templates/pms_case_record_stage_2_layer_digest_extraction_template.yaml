      - "digest_not_needed"
      - "not_applicable"
      - "source_missing"
      - "source_rejected_by_gate"
      - "source_deferred"
      - "source_superseded"
      - "source_unreadable"
      - "human_review_required"
      - "blocked"
      - "unknown"
    rule: >
      Every expected digest slot receives exactly one status. Missing,
      rejected, deferred, or not-applicable layers remain visible through an
      explicit status value.

  generic_layer_digest_shape:
    instruction: >
      Use this shape for artifact-specific digests unless a specialized shape
      below is provided. Extract only short, relevant, integration-ready
      material. Whole-artifact summaries remain outside Stage 2.
    fields:
      digest_id: "TODO"
      source_artifact_id: "TODO"
      source_artifact_type: "TODO"
      source_path_or_reference: "TODO"
      source_stage_1_status: "unknown"
      digest_status: "unknown"
      extraction_scope: "TODO"
      imported_findings: []
      imported_limits: []
      imported_non_claims: []
      unresolved_risks: []
      rival_or_non_capture_items: []
      source_or_input_constraints: []
      human_review_flags: []
      items_not_imported:
        - item: "TODO"
          reason: "TODO"
      conflicts_or_tensions_with_other_artifacts:
        - related_artifact_id: "TODO"
          tension: "TODO"
          stage_2_handling: "mark_for_stage_3_or_human_review"
      stage_3_export:
        export_allowed: "unknown"
        export_priority: "normal"
        export_items: []
        export_limits: []
        excluded_export_uses: []
      digest_notes: []

  extraction_burden_rules:
    imported_findings:
      rule: >
        Import only findings explicitly present in the source artifact, relevant
        to the integrated record, and still compatible with earlier case
        boundaries and claim ceilings.
      excluded_content:
        - "new_interpretation_added_by_stage_2"
        - "stronger_claim_than_source_artifact_supports"
        - "finding_from_unselected_or_unlisted_artifact"
    imported_limits:
      rule: >
        Limits have equal or higher priority than findings. If a source artifact
        contains a limit, uncertainty, caveat, non-use condition, downgrade
        pressure, refusal pressure, redirect pressure, or reopening condition
        relevant to Stage 3, preserve it.
    imported_non_claims:
      rule: >
        Non-claims identify what the artifact explicitly does not license. These
        remain visible when moving into the integrated record.
    unresolved_risks:
      rule: >
        Risks are not solved by inclusion in a digest. Stage 2 marks them for
        Stage 3 integration, downgrade, suspension, refusal, redirection, or
        human review.
    items_not_imported:
      rule: >
        Every relevant source item deliberately not imported receives a reason:
        superseded, irrelevant to integrated record, rejected by gate, not
        applicable, unsupported, duplicative, too speculative, or requires human
        review.

  required_carryover_watchlist:
    instruction: >
      These items often fall off the table. Stage 2 either imports them, marks
      them as not applicable, or flags them as missing or unresolved.
    from_pre_analysis_or_equivalent:
      - "case_boundary"
      - "input_or_source_status"
      - "intended_use"
      - "claim_ceiling"
      - "person_nearness"
      - "publicness"
      - "irreversibility_or_follow_up_cost"
      - "source_material_limitations"
      - "non_capture_zones"
      - "rival_pressure"
      - "falsifier_or_reopening_conditions"
      - "preliminary_add_on_pressure_if_later_relevant"
    from_core_case_or_equivalent:
