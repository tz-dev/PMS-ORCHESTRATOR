# =============================================================================
#  PMS-DISCIPLINE — CASE RECORD STAGE 2 LAYER DIGEST EXTRACTION TEMPLATE
#
#  Template version:
#    PMS-DISCIPLINE_CASE_RECORD_STAGE_2_LAYER_DIGEST_EXTRACTION_CLEAN_0.3
#
#  Source profiles:
#    Stage 1 artifact index / run manifest
#    checked PMS-DISCIPLINE layer outputs selected in Stage 1
#    selected PMS add-on case output, if used
#    MIP gate, MIP source-read status, MIP output, and MIP output check, if used
#    AHP gate, AHP source-read status, AHP output, and AHP output check, if used
#
#  AUTHORITY ORDER:
#    exact metadata / provenance:
#      runner case-record manifest > checked Stage 1 > checked layer artifact
#      > template default / placeholder > model inference
#    substantive digest content:
#      corresponding checked layer artifact > Stage 1 selection metadata
#      > template structure > bounded model marker
#
#  Exact paths must be copied without normalization. session.json is not a
#  substitute for a selected layer output unless the authoritative manifest or
#  checked Stage 1 explicitly assigns it. Substantive contradictions remain
#  contradictions; template hierarchy does not resolve them.
#
#  DISCIPLINE role:
#    Read only artifacts selected by Stage 1 and extract short, bounded layer
#    digests for Stage 3 integration. Stage 2 performs no case interpretation,
#    no source reinterpretation, no output checking, no conservative patching,
#    no claim strengthening, no conflict resolution between artifacts, no
#    MIP/AHP application, and no decision execution. It preserves findings,
#    limits, non-claims, unresolved risks, exclusions, non-use, and export
#    constraints so later integration has less room for drift.
# =============================================================================

pms_discipline_case_record_stage_2_layer_digest_extraction:
  schema_version: "PMS-DISCIPLINE_CASE_RECORD_STAGE_2_LAYER_DIGEST_EXTRACTION_CLEAN_0.3"
  schema_role: "case_record_stage_2_layer_digest_extraction_template"
  stage_number: 2
  stage_name: "layer_digest_extraction"
  required_previous_stage: "stage_1_artifact_index_and_run_manifest"
  intended_next_stage: "stage_3_full_case_record_integration"

  status:
    type: "digest_extraction_template"
    function:
      - "read_only_stage_1_selected_artifacts"
      - "extract_relevant_layer_digests"
      - "preserve_claim_limits_and_non_claims"
      - "preserve_non_use_rejections_and_not_applicable_layers"
      - "surface_unresolved_conflicts_or_gaps"
      - "prepare_stage_3_integration_inputs"
    excludes:
      - "case_reanalysis"
      - "full_yaml_copying"
      - "source_material_reinterpretation"
      - "output_checking"
      - "conservative_patch_step"
      - "claim_strengthening"
      - "conflict_resolution_between_artifacts"
      - "add_on_recommendation"
      - "MIP_or_AHP_application"
      - "stage_3_integration"
      - "public_text_synthesis"
      - "decision_execution"

  non_authority_notice: >
    Stage 2 supports controlled extraction from existing workflow artifacts. It
    does not certify, authorize, interpret beyond selected artifacts, complete,
    or decide the case. A digest imports only what is explicitly supported by
    the selected source artifact and must preserve limits, non-claims,
    unresolved risks, rejected routes, omitted items, and reopening conditions.

  stage_2_principles:
    read_only_selected_artifacts: true
    no_untracked_input_use: true
    no_full_artifact_copying: true
    no_new_case_analysis: true
    no_claim_strengthening: true
    no_boundary_overwrite_by_later_layer: true
    no_rejected_layer_revival: true
    no_not_applicable_layer_silent_removal: true
    pre_analysis_is_boundary_source_not_full_import: true
    output_check_notes_are_checks_not_truth_certificates: true
    patch_notes_are_correction_records_not_new_claim_sources: true
    add_on_outputs_are_overlays_not_core_rewrites: true
    mip_and_ahp_outputs_remain_their_own_artifacts: true
    ahp_remains_second_order_analysis_quality_overlay: true
    missing_or_conflicting_content_must_be_marked: true
    digest_completion_is_not_case_completion: true
    runner_manifest_controls_exact_metadata: true
    stage_1_controls_artifact_selection_and_provenance: true
    checked_layer_artifact_controls_digest_substance: true
    template_defaults_are_placeholders_not_evidence: true
    exact_output_paths_must_not_be_replaced_by_session_record_paths: true
    workflow_metadata_drift_is_not_case_substance: true

  stage_1_import:
    artifact_index_source:
      stage_1_artifact_index_path_or_reference: "TODO"
      stage_1_schema_version_observed: "TODO"
      stage_1_ready_for_stage_2: "unknown"
      stage_1_blocker_notes_imported: []
    allowed_artifact_ids_from_stage_1:
      - "TODO"
    selected_artifacts_to_read:
      - artifact_id: "TODO"
        artifact_type: "TODO"
        path_or_reference: "TODO"
        stage_1_status: "unknown"
        read_for_stage_2: "unknown"
