      reopening_conditions:
        new_relevant_evidence: "<reopens | does_not_reopen | unclear>"
        changed_scope_or_intended_use: "<reopens | does_not_reopen | unclear>"
        demonstrated_error_in_prior_checked_output: "<reopens | does_not_reopen | unclear>"
        stronger_rival_account: "<reopens | does_not_reopen | unclear>"
        affected_person_contestation_where_relevant: "<reopens | does_not_reopen | unclear | not_applicable>"
      non_reopening_conditions:
        repetition_without_new_support: "does_not_reopen"
        desire_for_stronger_claim: "does_not_reopen"
        workflow_completion_pressure: "does_not_reopen"
        model_fluency: "does_not_reopen"
      correction_boundary_note: "<how corrections must remain proportionate, scene-bound, and dignity-preserving>"

    human_confirmation_summary:
      human_confirmation_required: "<yes | no | unclear>"
      reason_required: "<person_nearness | publicness | irreversibility | automation | institutional_uptake | technical_mediation | high_claim_burden | none | unclear>"
      human_confirmation_present: "<yes | no | not_applicable | unclear>"
      confirmation_scope: "<what was confirmed, or not_applicable>"
      missing_confirmation_effect: "<restrict_next_steps | suspend | human_review_required | no_effect | unclear>"
      human_responsibility_note: >-
        Human confirmation, where required, is a responsibility marker rather
        than a truth certificate.

    permitted_next_steps_summary:
      decision_state_recorded: "<proceed | revise | downgrade | suspend | refuse | redirect | unclear>"
      decision_state_source: "<Stage 2 digest, checked prior output, human confirmation, or unclear>"
      permitted_next_steps:
        - "<next step or none>"
      restricted_next_steps:
        - "<restricted step or none>"
      required_before_any_stronger_use:
        - "<requirement or none>"
      stop_conditions:
        - "<condition or none>"
      handoff_to_stage_3_output_check: "required"

    integrated_record_summary:
      compact_summary: >-
        <concise integrated summary of the checked stack, bounded by Stage 2
        digests and claim ceiling>
      primary_record_limits:
        - "<limit or none>"
      primary_record_risks:
        - "<risk or none>"
      primary_record_non_use:
        - "<non-use item or none>"
      primary_record_reopening_conditions:
        - "<condition or none>"
      final_stage_3_boundary: >-
        This full record integrates the checked pipeline stack for inspection
        and later bounded use. It remains non-authoritative, correctable, and
        limited by the source status, intended use, claim ceiling, and checked
        prior outputs.

  stage_3_quality_checks:
    yaml_integrity_check:
      status: "<pass | fail | unclear>"
      check_items:
        - "single root pms_discipline_case_record_stage_3_full_case_record_integration present"
        - "all required Stage 3 sections present"
        - "no unresolved template markers left where the field requires a case value"
        - "field values use bounded markers where input is missing"
    predecessor_check:
      status: "<pass | fail | unclear>"
      check_items:
        - "checked Stage 1 output present"
        - "checked Stage 2 output present"
        - "Stage 3 output uses Stage 2 digests as primary integration material"
        - "missing predecessor items are marked rather than inferred"
    non_reanalysis_check:
      status: "<pass | fail | unclear>"
      check_items:
        - "no new Core analysis introduced"
        - "no new add-on selection introduced"
        - "no new MIP result introduced"
        - "no new AHP overlay introduced"
        - "no prior checked artifact patched inside Stage 3"
    claim_ceiling_check:
      status: "<pass | fail | unclear>"
      check_items:
        - "lowest active claim ceiling preserved"
        - "source status not upgraded"
        - "intended use not expanded"
        - "unlicensed claims listed or marked none"
    path_selection_check:
      status: "<pass | fail | unclear>"
      check_items:
        - "used paths visible"
        - "unused paths visible"
        - "refused, suspended, or redirected paths visible where present"
        - "Core-only or no-add-on path preserved where applicable"
    MIP_AHP_non_interference_check:
      status: "<pass | fail | not_applicable | unclear>"
      check_items:
        - "MIP results not rescored"
        - "AHP overlay not converted into MIP correction"
        - "Attack Points not treated as proven defects"
        - "Hardening Backlog not treated as mandate"
        - "Precision Heuristic not treated as authority"
    person_and_dignity_check:
      status: "<pass | fail | unclear>"
      check_items:
        - "no person ranking"
        - "no maturity verdict"
        - "no dignity scoring"
        - "person, idea, effect, and model status remain distinct where relevant"
    correctability_check:
      status: "<pass | fail | unclear>"
      check_items:
        - "reopening conditions preserved"
        - "correction can affect the record where allowed"
        - "human confirmation status recorded where required"
        - "stop conditions visible"
    non_authority_check:
      status: "<pass | fail | unclear>"
      check_items:
        - "record completion not treated as proof"
        - "decision state recorded but not executed"
        - "no release permission generated"
        - "no automated decision generated"

  conservative_patch_policy_for_stage_3_output_check:
    patch_scope: "Stage 3 output only"
    patch_triggers:
      - trigger: "invalid_yaml"
        response: "repair YAML while preserving Stage 3 structure and field order as far as possible"
      - trigger: "missing_required_stage_3_section"
        response: "restore missing section with bounded markers rather than invented content"
      - trigger: "predecessor_status_ignored"
        response: "reinsert checked Stage 1 or Stage 2 status from available record"
      - trigger: "new_analysis_inserted"
        response: "remove or weaken to digest-supported integration statement"
      - trigger: "claim_ceiling_overreach"
        response: "weaken to lowest active ceiling and mark unsupported stronger claim"
      - trigger: "source_status_upgrade"
        response: "restore original source status and lower affected claims"
      - trigger: "unselected_path_erased"
        response: "restore explicit non-use, refusal, suspension, or redirect record"
      - trigger: "MIP_or_AHP_interference"
        response: "restore non-interference and remove rescoring, mandate, or authority drift"
      - trigger: "person_capture_or_ranking"
        response: "weaken to scene-bound risk note or refuse the unsupported person-level claim"
      - trigger: "missing_correctability_or_reopening"
        response: "restore correction and reopening fields from Stage 2 digest or mark unclear"
      - trigger: "human_confirmation_required_but_erased"
        response: "restore requirement and restrict next steps until confirmation is present"
      - trigger: "release_or_decision_execution_language"
        response: "replace with permitted-next-step or decision-state-record language"
    patch_limits:
      - "no new source material"
      - "no new prior-layer analysis"
      - "no prior checked artifact modification"
      - "no MIP rescoring"
      - "no AHP reclassification"
      - "no release authorization"
      - "no person ranking"
      - "no dignity scoring"
      - "no maturity verdict"
    escalation_conditions:
      - condition: "Stage 1 artifact index missing or unusable"
        next_step: "return_to_stage_1_output_check"
      - condition: "Stage 2 layer digest missing or unusable"
        next_step: "return_to_stage_2_output_check"
      - condition: "checked stack contradiction cannot be resolved conservatively"
        next_step: "human_review_or_return_to_relevant_prior_output_check"
      - condition: "source status or intended use changed after Stage 2"
        next_step: "rerun_affected_prior_stage_or_suspend"
      - condition: "human confirmation required and absent"
        next_step: "human_confirmation_before_stronger_use"

  stage_3_output_contract:
    required_output_format: "YAML"
    required_root: "pms_discipline_case_record_stage_3_full_case_record_integration"
    required_sections:
      - "schema_version"
      - "schema_role"
      - "workflow_position"
      - "stage_3_io_contract"
      - "full_record_template"
      - "stage_3_quality_checks"
      - "conservative_patch_policy_for_stage_3_output_check"
      - "final_stage_3_status"
    output_modes:
      normal_completion:
        status: "stage_3_full_record_ready_for_output_check"
        required_content:
          - "complete filled Stage 3 YAML"
          - "bounded markers for missing or unresolved fields"
          - "handoff to Stage 3 output check"
      not_ready_completion:
        status: "stage_3_not_ready"
        required_content:
          - "blocking issue"
          - "affected predecessor"
          - "next allowed correction step"
      correction_needed_after_check:
        status: "stage_3_corrected_by_output_check"
        required_content:
          - "concise correction list"
          - "complete corrected Stage 3 YAML"
    prohibited_output_modes:
      - "freeform essay"
      - "public-facing prose artifact"
      - "new layer analysis"
      - "release authorization"
      - "decision execution"

  compact_instruction_for_user_or_model: >-
    Build one integrated full record from the checked Stage 1 artifact index and
    the checked Stage 2 layer digests. Preserve artifact status, path selection,
    claim ceiling, non-use, rival pressure, risk burden, correctability,
    reopening conditions, human confirmation requirements, and permitted next
    steps. Use bounded markers where information is missing or unclear. Keep the
    output as Stage 3 integration only.

  final_stage_3_status:
    completion_state: "<stage_3_full_record_ready_for_output_check | stage_3_not_ready | unclear>"
    readiness_for_stage_3_output_check: "<ready | not_ready | unclear>"
    blocking_issues:
      - "<issue or none>"
    next_allowed_step: "<stage_3_output_check | return_to_stage_2_output_check | return_to_stage_1_output_check | human_review | suspend | unclear>"
    final_boundary_statement: >-
      Stage 3 produces a bounded full integration record only. It preserves the
      checked pipeline state and its limits; it does not perform prior-layer
      analysis, output checking, source reading, release authorization, or
      decision execution.