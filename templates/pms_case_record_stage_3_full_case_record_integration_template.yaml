      publicness:
        status: "<low | moderate | high | unclear | not_applicable>"
        burden_effect: "<claim weakening, human review, or none>"
      irreversibility:
        status: "<low | moderate | high | unclear | not_applicable>"
        burden_effect: "<reopening requirement, stop pressure, or none>"
      automation_or_technical_mediation:
        status: "<low | moderate | high | unclear | not_applicable>"
        burden_effect: "<human confirmation, use restriction, or none>"
      institutional_uptake:
        status: "<low | moderate | high | unclear | not_applicable>"
        burden_effect: "<use restriction, human review, or none>"
      template_or_model_mediation:
        status: "<present | absent | unclear>"
        burden_effect: "<mark model/template status, or none>"
      score_language_risk:
        status: "<present | absent | unclear | not_applicable>"
        burden_effect: "<score hygiene note, claim weakening, or none>"
      D_language_risk:
        status: "<present | absent | unclear | not_applicable>"
        burden_effect: "<dignity-in-practice caution, or none>"
      transmission_or_reuse_risk:
        status: "<low | moderate | high | unclear | not_applicable>"
        burden_effect: "<reuse restriction, AHP relevance, human review, or none>"
      unresolved_risks:
