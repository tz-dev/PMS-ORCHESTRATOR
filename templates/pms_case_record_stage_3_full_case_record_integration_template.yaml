# =============================================================================
# PMS-DISCIPLINE — CASE RECORD STAGE 3 FULL RECORD INTEGRATION TEMPLATE
# Template version: PMS_DISCIPLINE_CASE_RECORD_STAGE_3_FULL_RECORD_INTEGRATION_CLEAN_0.3
# Role: integrate checked Stage 1 manifest and checked Stage 2 layer digests
#       into one bounded, inspectable, correctable full record.
#
# AUTHORITY ORDER:
#   exact metadata / provenance:
#     runner case-record manifest > checked Stage 1 > checked Stage 2
#     > template default / placeholder > model inference
#   substantive integrated content:
#     checked Stage 2 > checked Stage 1 metadata > explicitly referenced checked
#     layer artifact > template structure > bounded model marker
#
# Internal path discrepancies, template-status drift, attachment-name drift,
# and workflow QA notes are record metadata, not substantive case findings.
# =============================================================================

pms_discipline_case_record_stage_3_full_case_record_integration:
  schema_version: "PMS_DISCIPLINE_CASE_RECORD_STAGE_3_FULL_RECORD_INTEGRATION_CLEAN_0.3"
  schema_role: "stage_3_full_record_integration_template"
  stage_number: 3
  stage_name: "full_record_integration"
  template_status: "clean_pipeline_template"
  analysis_mode: "integrate_checked_stage_1_and_stage_2_outputs"

  template_purpose: >-
    Integrate the checked Stage 1 artifact index and the checked Stage 2 layer
    digests into a single bounded full record of the PMS-DISCIPLINE run. This
    stage preserves what was used, what was withheld, what each checked layer
    contributed, which risks remain, what claim ceiling applies, what paths are
    permitted next, and what reopening conditions remain available. It is an
    integration and accountability stage, not a reanalysis stage, not an output
    check stage, not a source-reading stage, not an application stage, and not
    a release-authorization stage.

  source_reference:
    pms_base_reference_file: "PMS.yaml"
    stage_1_template_reference: "pms_case_record_stage_1_artifact_index_template.yaml"
    stage_2_template_reference: "pms_case_record_stage_2_layer_digest_extraction_template.yaml"
    stage_3_template_reference: "this_template"
    reference_note: >-
      PMS.yaml remains the PMS Base reference. Stage 3 may integrate only the
      checked Stage 1 output, the checked Stage 2 output, and bounded metadata
      supplied inside the current run. It may preserve references to prior
      checked artifacts, but it may not strengthen, correct, or re-run them.

  source_priority:
    priority_order:
      - rank: 1
        source: "runner_case_record_manifest"
        role: "authoritative exact run metadata and provenance contract supplied inline by the runner"
        may_supply:
          - "exact case-relative output paths"
          - "file-existence status"
          - "route and branch status"
          - "step status"
          - "expected Stage 1, Stage 2, and Stage 3 output references"
        may_not_supply:
          - "case findings"
          - "operator assignments"
          - "layer conclusions"
          - "claim strengthening"
      - rank: 2
        source: "checked_stage_1_artifact_index_yaml"
        role: "selected artifact, provenance, source-status, route, branch, and non-use metadata"
        may_supply:
          - "artifact inventory"
          - "source status"
          - "pipeline step presence"
          - "checked-output availability"
          - "missing, skipped, deferred, rejected, or unused artifacts"
        may_not_supply:
          - "layer digest substance beyond indexed metadata"
          - "new analysis"
          - "claim strengthening"
      - rank: 3
        source: "checked_stage_2_layer_digest_extraction_yaml"
        role: "controlling bounded substantive digest source for integration"
        may_supply:
          - "layer digests"
          - "claim ceilings"
          - "risk summaries"
          - "non-use summaries"
          - "handoff summaries"
          - "unresolved issue summaries"
        may_not_supply:
          - "exact metadata that conflicts with the runner manifest or checked Stage 1"
          - "full replacement of original checked artifacts"
          - "new layer analysis"
          - "unrecorded claims"
      - rank: 4
        source: "PMS.yaml"
        role: "base grammar reference already read earlier"
        may_supply:
          - "operator names and dependency discipline"
          - "PMS application guardrails already active in prior checked outputs"
        may_not_supply:
          - "new case facts"
          - "new layer conclusions"
          - "run metadata"
          - "release authorization"
      - rank: 5
        source: "checked_prior_layer_outputs_as_referenced_by_stage_1_and_stage_2"
        role: "background references only when Stage 1 or Stage 2 flags a gap requiring exact checking"
        may_supply:
          - "exact wording for a referenced checked output where the digest is insufficient"
          - "confirmation of artifact identity"
        may_not_supply:
          - "new interpretation beyond the checked output"
          - "new output checks"
          - "unlisted artifact insertion"
      - rank: 6
        source: "case_packet_metadata"
        role: "case title, source status, intended use, and bounded material reference"
        may_supply:
          - "case title"
          - "source status"
          - "intended use"
          - "material boundary"
        may_not_supply:
          - "new facts not already used in checked outputs"
          - "fresh reinterpretation"
      - rank: 7
        source: "this_stage_3_template"
        role: "integration structure and output contract"
        may_supply:
          - "required Stage 3 fields"
          - "integration order"
          - "quality checks"
          - "output boundaries"
        may_not_supply:
          - "case conclusions"
          - "operator assignments"
          - "add-on recommendations"
          - "MIP or AHP results"
          - "metadata overrides"

  workflow_position:
    pipeline_phase: "after_checked_stage_2_layer_digest_extraction"
    required_predecessors:
      - step: "stage_1_applied"
        required_status: "present"
      - step: "stage_1_output_checked"
        required_status: "checked_or_conservatively_corrected"
      - step: "stage_2_applied"
        required_status: "present"
      - step: "stage_2_output_checked"
        required_status: "checked_or_conservatively_corrected"
    permitted_inputs:
      - "runner_case_record_manifest"
      - "checked_stage_1_artifact_index_yaml"
      - "checked_stage_2_layer_digest_extraction_yaml"
      - "case_packet_metadata"
      - "human_confirmation_record_if_supplied"
      - "prior_checked_artifact_exact_text_only_when_needed_to_resolve_an_index_or_digest_gap"
    produced_output: "stage_3_full_record_integration_yaml"
    possible_next_steps:
      - "stage_3_output_check"
      - "revise_stage_3_output_if_check_finds_patchable_defect"
      - "return_to_stage_2_if_digest_gap_blocks_integration"
      - "return_to_stage_1_if_artifact_index_gap_blocks_integration"
      - "human_review_if_required_by_person_nearness_publicness_or_irreversibility"
      - "stop_if_full_record_boundary_cannot_be_preserved"
    excluded_operations:
      - "source_reading"
      - "Pre_Analysis_application"
      - "Core_application"
      - "Add_on_Gate_application"
      - "selected_add_on_application"
      - "MIP_Gate_application"
      - "MIP_application"
      - "AHP_Gate_application"
      - "AHP_application"
      - "output_checking_of_prior_layers"
      - "patching_prior_checked_layers"
      - "new_claim_generation"
      - "public_release_authorization"
      - "automated_decision_execution"
      - "person_ranking"
      - "dignity_scoring"
      - "maturity_verdict"

  stage_3_non_authority:
    function: "bounded_integration_record"
    authority_status: "non_authority"
    permitted_force: >-
      Stage 3 may integrate, preserve, index, summarize, and bound the checked
      record. It may name the decision state already licensed by checked prior
      outputs and Stage 2 digests, but it may not execute the decision state or
      authorize release, institutional uptake, automated use, person-facing use,
      or stronger claims.
    non_authority_clauses:
      - "Integration is not proof."
      - "Record completion is not adequacy."
      - "A checked full record is not a verdict."
      - "Layer coherence is not source upgrade."
      - "A visible decision state is not decision execution."
      - "Human confirmation, where required, remains external to this template."
      - "Workflow metadata drift is not a substantive case finding."
      - "Template defaults cannot override checked upstream values."
    person_protection_clause: >-
      The integrated record remains scene-bound. It may preserve person-nearness
      risk from prior checked outputs but may not turn that risk into person
      ranking, motive attribution, maturity judgment, dignity measure, blame
      verdict, or global identity claim.

  stage_3_io_contract:
    required_inputs:
      runner_case_record_manifest:
        required: true
        purpose: "exact run metadata, route state, step state, file existence, and output paths"
        missing_behavior: "use no inferred substitute; mark metadata unresolved and return for runner review"
      checked_stage_1_artifact_index_yaml:
        required: true
        purpose: "artifact inventory and run manifest"
        missing_behavior: "stage_3_not_ready_return_to_stage_1"
      checked_stage_2_layer_digest_extraction_yaml:
        required: true
        purpose: "bounded layer digests for integration"
        missing_behavior: "stage_3_not_ready_return_to_stage_2"
      case_packet_metadata:
        required: true
        purpose: "case title, source status, intended use, material boundary"
        missing_behavior: "use bounded missing marker and flag human review if the gap changes use risk"
      human_confirmation_record_if_required:
        required: false
        purpose: "record whether a responsible human confirmed a risky decision state or use boundary"
        missing_behavior: "mark missing and preserve next-step restriction if required"
    optional_inputs:
      exact_prior_checked_output_excerpt:
        allowed_when: "Stage 1 or Stage 2 identifies a gap that cannot be resolved from the digest alone"
        use_limit: "identity and exact-boundary clarification only"
      user_supplied_record_note:
        allowed_when: "note concerns intended use, source status, human confirmation, or record boundary"
        use_limit: "record as note, not as source upgrade"
    forbidden_inputs:
      - "new case source material"
      - "unindexed artifact"
      - "unchecked layer output"
      - "model output presented as evidence"
      - "human preference presented as claim support"
      - "request for stronger conclusion as evidence"
      - "external facts absent from checked prior outputs"
    produced_outputs:
      - "integrated_record_metadata"
      - "artifact_stack_summary"
      - "layer_digest_integration"
      - "path_selection_summary"
      - "claim_ceiling_summary"
      - "risk_and_burden_summary"
      - "non_use_and_exclusion_summary"
      - "rival_and_non_capture_summary"
      - "correctability_and_reopening_summary"
      - "human_confirmation_summary"
      - "permitted_next_steps_summary"
      - "stage_3_quality_checks"
      - "final_stage_3_status"
    forbidden_outputs:
      - "new Core reading"
      - "new add-on selection"
      - "new MIP result"
      - "new AHP overlay"
      - "new operator assignment"
      - "new source-status upgrade"
      - "person ranking"
      - "maturity verdict"
      - "dignity score"
      - "release permission"
      - "automated decision"
      - "public-facing prose artifact"

  integration_status_legend:
    field_value_rules:
      present: "artifact, digest, or record component is present and usable for Stage 3 integration"
      checked: "component is marked as checked by the relevant prior output-check step"
      corrected: "component was conservatively corrected in a prior output-check step"
      missing: "component is absent from the available checked stack"
      not_applicable: "component is structurally irrelevant on this path"
      not_used: "component was available or scannable but not used by disciplined choice"
      refused: "component or use was refused under a checked boundary"
      suspended: "component or claim remains unresolved and cannot be integrated as settled"
      redirected: "component or path was redirected to another frame or review"
      unclear: "available information is insufficient to classify confidently"
      under_specified: "the component exists but lacks enough detail for stronger integration"
      insufficient: "the component fails a required burden for the intended use"
      bounded: "usable only within an explicit claim or use limit"
    marker_policy: >-
      Stage 3 must prefer bounded markers over invented completion. Missing,
      unclear, unresolved, and under-specified items remain visible in the full
      record rather than being smoothed into coherence.

  decision_state_policy:
    canonical_states:
      - "proceed"
      - "revise"
      - "downgrade"
      - "suspend"
      - "refuse"
      - "redirect"
      - "unclear"
    state_meanings:
      proceed: >-
        The checked stack permits continuation within declared limits. This is
        not truth, release permission, person judgment, or stronger use license.
      revise: >-
        The record may continue only after a correctable defect is addressed in
        the named prior step or in Stage 3 itself.
      downgrade: >-
        The claim or use must remain weaker than the intended or tempting form.
      suspend: >-
        A required threshold is unresolved and the output may not treat the item
        as settled.
      refuse: >-
        A requested use or path violates a boundary preserved by the checked
        stack.
      redirect: >-
        Another frame, rival account, domain review, or human review currently
        carries the burden better.
      unclear: >-
        The checked stack does not license a stronger state.
    weaken_policy: >-
      Weakening is recorded as a correction within revise or downgrade rather
      than as an additional canonical state.
    execution_policy: >-
      Stage 3 records the decision state and permitted next steps. It does not
      execute the decision state.

  integration_burden_rules:
    core_rule: >-
      Stage 3 integrates only checked and digest-supported content. Where the
      checked stack conflicts, the weaker, more bounded, or more restrictive
      reading controls unless Stage 2 already resolves the conflict.
    source_status_rule: >-
      Source status from the case packet and checked prior outputs must remain
      visible. Stage 3 may not upgrade reports, interpretations, memories,
      model outputs, synthetic material, or mixed material into evidence.
    claim_ceiling_rule: >-
      The integrated record must preserve the lowest active claim ceiling from
      checked prior layers and from the Stage 2 digest. Stronger phrasing must
      be weakened or marked as unsupported.
    non_capture_rule: >-
      A scene-bound record may not become a person-bound verdict. Person,
      idea, effect, and model status remain distinct.
    add_on_non_use_rule: >-
      Unused, refused, not recommended, or not applicable add-ons remain visible
      as path-selection facts. Their absence may be disciplined and must not be
      treated as incompleteness.
    MIP_rule: >-
      If MIP was applied, Stage 3 may integrate its checked digest and named
      constraints. It may not rescore A-score, M-score, IA-box, D-module, red
      zones, source status, or MIP synthesis.
    AHP_rule: >-
      If AHP was applied, Stage 3 may integrate its checked digest as an
      optional second-order analysis-quality overlay. It may not convert Attack
      Points into proven defects, Hardening Backlog items into mandates, or
      Precision Heuristic into authority.
    rival_pressure_rule: >-
      Rival accounts and non-capture limits must remain visible, especially
      where they downgrade, suspend, refuse, or redirect the application path.
    correctability_rule: >-
      The full record must preserve what would reopen, revise, downgrade,
      suspend, refuse, or redirect the application. Correction must remain able
      to affect the record where the checked stack allows it.
    human_confirmation_rule: >-
      Where checked prior outputs require human confirmation for person-near,
      public, institutional, technical, automated, or high-irreversibility use,
      Stage 3 records whether confirmation is present, missing, or not
      applicable. Missing confirmation restricts permitted next steps.

  full_record_template:
    record_identity:
      case_title: "<case title from case packet or checked Stage 1>"
      record_id: "<optional run id or missing>"
      record_version: "stage_3_full_record_v0_2"
      generated_from:
        stage_1_output: "<checked Stage 1 artifact index reference>"
        stage_2_output: "<checked Stage 2 digest extraction reference>"
        template: "pms_case_record_stage_3_full_case_record_integration_template_CLEAN_v0_2"
      source_status: "<source status preserved from case packet and checked prior outputs>"
      intended_use: "<intended use preserved from case packet and checked prior outputs>"
      material_boundary: "<bounded case material description, not re-summarized beyond checked prior outputs>"
      integration_timestamp_or_run_marker: "<if provided, otherwise missing>"
      record_status: "<draft | checked_ready_for_stage_3_output_check | not_ready | unclear>"

    artifact_stack_summary:
      PMS_base:
        artifact_present: "<present | missing | unclear>"
        read_status: "<read_completely | missing | unclear>"
        role_in_record: "base grammar reference only"
        restrictions: "no new case facts or stronger claims supplied at Stage 3"
      pre_analysis:
        artifact_present: "<present | missing | not_applicable | unclear>"
        output_check_status: "<checked | corrected | missing | unclear>"
        digest_available_from_stage_2: "<present | missing | unclear>"
        integrated_role: "case boundary and handoff context"
      core_case_application:
        artifact_present: "<present | missing | unclear>"
        output_check_status: "<checked | corrected | missing | unclear>"
        digest_available_from_stage_2: "<present | missing | unclear>"
        integrated_role: "Core reading, operators, claim ceiling, sufficiency status"
      addon_recommendation_gate:
        artifact_present: "<present | missing | unclear>"
        output_check_status: "<checked | corrected | missing | unclear>"
        selected_addon_family: "<ANTICIPATION | CRITIQUE | CONFLICT | LOGIC | EDEN | SEX | none | unclear>"
        integrated_role: "add-on path selection and non-use record"
      selected_addon_source:
        artifact_present: "<present | missing | not_applicable | unclear>"
        read_status: "<read_completely | not_applicable | missing | unclear>"
        selected_family: "<family or not_applicable>"
        integrated_role: "source availability for selected add-on only"
      selected_addon_case_application:
        artifact_present: "<present | missing | not_applicable | unclear>"
        output_check_status: "<checked | corrected | not_applicable | missing | unclear>"
        digest_available_from_stage_2: "<present | not_applicable | missing | unclear>"
        integrated_role: "selected add-on contribution if used"
      mip_gate:
        artifact_present: "<present | missing | not_applicable | unclear>"
        output_check_status: "<checked | corrected | not_applicable | missing | unclear>"
        recommendation_status: "<read_MIP_yaml | no_MIP_continue | scan_only_note | revise_stack_before_MIP | downgrade_claim_before_MIP | suspend_before_MIP | refuse_requested_MIP_use | redirect_to_rival_or_domain_review | human_review_before_MIP | unclear | not_applicable>"
        integrated_role: "MIP source-reading decision context"
      mip_source:
        artifact_present: "<present | missing | not_applicable | unclear>"
        read_status: "<read_completely | not_applicable | missing | unclear>"
        integrated_role: "MIP source availability where gate allowed reading"
      mip_case_application:
        artifact_present: "<present | missing | not_applicable | unclear>"
        output_check_status: "<checked | corrected | not_applicable | missing | unclear>"
        digest_available_from_stage_2: "<present | not_applicable | missing | unclear>"
        integrated_role: "MIP contribution if applied"
      ahp_gate:
        artifact_present: "<present | missing | not_applicable | unclear>"
        output_check_status: "<checked | corrected | not_applicable | missing | unclear>"
        recommendation_status: "<ahp_source_reading_recommended | ahp_not_recommended | scan_only | revise_mip_output_before_ahp | downgrade_before_ahp | suspend_before_ahp | refuse_ahp_use | redirect_before_ahp | human_review_required | unclear | not_applicable>"
        integrated_role: "AHP source-reading decision context"
      ahp_source:
        artifact_present: "<present | missing | not_applicable | unclear>"
        read_status: "<read_completely | not_applicable | missing | unclear>"
        integrated_role: "AHP source availability where gate allowed reading"
      ahp_module_output:
        artifact_present: "<present | missing | not_applicable | unclear>"
        output_check_status: "<checked | corrected | not_applicable | missing | unclear>"
        digest_available_from_stage_2: "<present | not_applicable | missing | unclear>"
        integrated_role: "second-order analysis-quality overlay if applied"
      stage_1_artifact_index:
        artifact_present: "present"
        output_check_status: "<checked | corrected | unclear>"
        integrated_role: "run manifest source for Stage 3"
      stage_2_layer_digest_extraction:
        artifact_present: "present"
        output_check_status: "<checked | corrected | unclear>"
        integrated_role: "digest source for Stage 3"

    path_selection_summary:
      pipeline_path_taken:
        pre_analysis: "<used | missing | unclear>"
        core: "<used | missing | unclear>"
        addon_gate: "<used | missing | unclear>"
        selected_addon: "<used | not_used | not_applicable | refused | unclear>"
        mip_gate: "<used | not_applicable | missing | unclear>"
        mip_application: "<used | not_used | not_applicable | refused | suspended | unclear>"
        ahp_gate: "<used | not_applicable | missing | unclear>"
        ahp_application: "<used | not_used | not_applicable | refused | suspended | unclear>"
        stage_1: "used"
        stage_2: "used"
        stage_3: "current_stage"
      path_selection_rationale: "<bounded digest of why this path was taken, from Stage 2>"
      explicit_non_use:
        unselected_addons: "<list or none or unknown>"
        skipped_mip: "<reason or not_applicable>"
        skipped_ahp: "<reason or not_applicable>"
        refused_paths: "<list or none>"
        suspended_paths: "<list or none>"
        redirected_paths: "<list or none>"
      path_risk_note: "<any risk created by the path itself, or none>"

    layer_digest_integration:
      pre_analysis_digest:
        integrated: "<yes | no | not_applicable | unclear>"
        contribution: "<case boundary, source inventory, initial risk pressure, or bounded marker>"
        limits: "<limits from Stage 2 digest>"
      core_digest:
        integrated: "<yes | no | unclear>"
        contribution: "<Core operators, claim ceiling, sufficiency, major risks>"
        limits: "<limits from Stage 2 digest>"
      addon_gate_digest:
        integrated: "<yes | no | unclear>"
        contribution: "<selected family or Core-only / non-use rationale>"
        limits: "<limits from Stage 2 digest>"
      selected_addon_digest:
        integrated: "<yes | no | not_applicable | unclear>"
        contribution: "<selected add-on lens contribution if used>"
        limits: "<limits and non-authority boundaries>"
      mip_gate_digest:
        integrated: "<yes | no | not_applicable | unclear>"
        contribution: "<MIP recommendation context and limits>"
        limits: "<gate limits>"
      mip_digest:
        integrated: "<yes | no | not_applicable | unclear>"
        contribution: "<A-C-R-P-D, A/M/IA/D handling, red zones, synthesis, or bounded marker>"
        limits: "<MIP output limits, non-use, non-authority boundaries>"
      ahp_gate_digest:
        integrated: "<yes | no | not_applicable | unclear>"
        contribution: "<AHP recommendation context and limits>"
        limits: "<gate limits>"
      ahp_digest:
        integrated: "<yes | no | not_applicable | unclear>"
        contribution: "<Precision Heuristic, Attack Points, Hardening Backlog, or bounded marker>"
