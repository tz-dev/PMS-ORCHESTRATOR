# ==============================================================================
# PMS-DISCIPLINE — CONFLICT ADD-ON CASE APPLICATION TEMPLATE
# Template version: CLEAN_v0.2.1
# Role: selected CONFLICT add-on case application after checked Core and checked Add-on Gate
# ==============================================================================
pms_conflict_addon_case_application:
  schema_version: PMS-DISCIPLINE_CONFLICT_ADDON_CASE_TEMPLATE_CLEAN_v0.2.1
  schema_role: conflict_addon_case_application_template
  analysis_mode: selected_conflict_addon_case_application_after_checked_core
  template_status: clean_pms_discipline_addon_case_application_template
  discipline_template_name: pms_addon_conflict_case_application_template_CLEAN_v0_2_1.yaml
  selected_addon_family: CONFLICT
  template_purpose: Apply the selected PMS-CONFLICT source to a bounded case after PMS.yaml, checked Pre-Analysis YAML, checked Core Case 
    Application YAML, checked Add-on Recommendation Gate YAML, and PMS-CONFLICT.yaml have already been read or produced in prior steps. The 
    output is a CONFLICT add-on case application YAML only.
  template_boundary: This template applies CONFLICT without replacing PMS.yaml, re-running Core, re-deciding the Add-on Gate, reading 
    additional sources, applying other add-ons, producing external-facing prose, applying MIP/AHP, generating a Case Record, rendering 
    Markdown, or executing an action/decision-state execution.
  repository_reference:
    pms_base_reference_file: PMS.yaml
    pms_base_reference_status: already_read_base_reference
    selected_addon_source_file: PMS-CONFLICT.yaml
    selected_addon_source_status: already_read_selected_addon_source
    template_role: conflict_addon_case_application_template
    reference_note: PMS.yaml supplies PMS Base grammar. PMS-CONFLICT.yaml supplies the selected add-on source. Checked Pre-Analysis, checked
      Core, and checked Add-on Gate outputs constrain this application. No additional discipline reference file, MIP output, AHP output, 
      Case Record, Markdown article, or unprovided file is available inside this step.
  source_priority:
    pms_yaml:
      priority: 1
      role: PMS Base reference already read before this step
      may_define:
        - PMS operator inventory
        - PMS operator order
        - PMS dependencies
        - PMS derived structures
        - PMS application guardrails
      must_not_be_overridden_by:
        - CONFLICT add-on output
        - case_packet
        - checked_pre_analysis_yaml
        - checked_core_case_application_yaml
        - checked_addon_recommendation_gate_yaml
        - PMS-CONFLICT.yaml
        - model_output
    case_packet:
      priority: 2
      role: bounded case material supplied for this run
      may_supply:
        - case_title
        - case_material
        - source_status
        - intended_use
      must_not_supply:
        - PMS Base revision
        - CONFLICT source content
        - case verdict
        - final decision execution
    checked_pre_analysis_yaml:
      priority: 3
      role: checked boundary, source-status, burden, and claim-ceiling record
      may_supply:
        - case boundary
        - source status
        - intended use
        - claim ceiling
        - person-nearness, publicness, and irreversibility burden
        - rival pressure
        - non-capture zones
        - correctability and reopening conditions
      must_not_supply:
        - CONFLICT application result
        - add-on authorization
        - final decision execution
    checked_core_case_application_yaml:
      priority: 4
      role: checked PMS Core case basis
      may_supply:
        - Core operator analysis
        - Core dependency analysis
        - derived structure status
        - non-capture and rival pressure record
        - falsifier and weakening conditions
        - Core quality control
        - Core synthesis
      must_not_authorize:
        - CONFLICT use by itself
        - claim strengthening
        - person ranking
        - case closure
    checked_addon_recommendation_gate_yaml:
      priority: 5
      role: checked add-on family selection record
      may_supply:
        - selected_addon_family
        - recommendation limits
        - trigger-basis summary
        - false-trigger and non-use record
      must_not_authorize:
        - CONFLICT application as proof
        - stronger claim type
        - case closure
        - downstream MIP/AHP use
    selected_pms_conflict_yaml:
      priority: 6
      role: already-read selected CONFLICT add-on source
      may_supply:
        - CONFLICT role and scope
        - CONFLICT trigger logic
        - CONFLICT non-trigger conditions
        - CONFLICT constructs and signatures
        - CONFLICT-specific guardrails
      must_not_override:
        - PMS Base
        - checked Pre-Analysis
        - checked Core
        - checked Add-on Gate
        - claim ceiling
    this_conflict_case_template:
      priority: 7
      role: CONFLICT add-on case application output structure only
  workflow_position:
    phase: selected_addon_case_application
    step_id: pms_conflict_addon_case_application
    preceded_by_required_steps:
      - read_pms_yaml
      - checked_pre_analysis_yaml
      - checked_core_case_application_yaml
      - checked_addon_recommendation_gate_yaml
      - read_selected_pms_conflict_yaml
    next_required_step:
      - conflict_addon_output_check
    step_boundary: This step applies exactly the selected CONFLICT add-on source to the bounded case. It does not re-run Core, re-decide the
      Add-on Gate, read other add-ons, apply MIP/AHP, generate a Case Record, render Markdown, or execute a final decision state.
  template_io_contract:
    required_inputs:
      - PMS.yaml_read_completely
      - case_packet
      - checked_pre_analysis_yaml
      - checked_core_case_application_yaml
      - checked_addon_recommendation_gate_yaml
      - PMS-CONFLICT.yaml_read_completely
      - pms_addon_conflict_case_application_template
    optional_inputs:
      - explicit_user_constraint_on_CONFLICT_use
      - human_reviewer_notes_marked_as_notes_not_authority
    excluded_inputs_for_this_step:
      - unprovided_files
      - other_addon_source_yaml
      - other_addon_case_application_template
      - MIP_output
      - AHP_output
      - case_record
      - markdown_article
      - final_decision_execution
    produced_outputs:
      - completed_PMS_CONFLICT_addon_case_application_yaml
      - conflict_trigger_review
      - conflict_non_trigger_and_false_trigger_review
      - conflict_construct_application
      - conflict_synthesis
      - conflict_addon_handoff
    not_produced_outputs:
      - PMS_Base_revision
      - Core_case_application_yaml
      - Add-on_Gate_output
      - other_addon_output
      - MIP_case_application_yaml
      - AHP_output
      - case_record
      - markdown_article
      - final_decision_execution
  non_authority_boundary:
    template_completion_is_not_certification: true
    addon_relevance_is_not_authorization: true
    conflict_visibility_is_not_conflict_verdict: true
    ordinary_disagreement_is_not_conflict_trigger: true
    hostility_or_tension_is_not_conflict_trigger: true
    solution_need_is_not_CONFLICT_authorization: true
    governance_or_intervention_authorized_here: false
    person_ranking_authorized_here: false
    diagnostic_or_legal_conclusion_authorized_here: false
    downstream_MIP_AHP_authorized_here: false
  checked_prior_outputs_import:
    checked_pre_analysis_yaml:
      status: <available | available_with_limits | missing | unclear>
      claim_ceiling: <imported | missing | unclear>
      source_status: <preserved | weak | missing | unclear>
      person_nearness_publicness_irreversibility_burden: <low | moderate | high | severe | unclear>
      rival_and_non_capture_status: <preserved | weak | missing | unclear>
      correctability_and_reopening_status: <preserved | weak | missing | unclear>
    checked_core_case_application_yaml:
      status: <available | available_with_limits | missing | unclear>
      core_sufficiency_status: <sufficient | sufficient_with_limits | unstable | insufficient | unclear>
      relevant_core_signals:
        - <signal or none>
      operator_dependency_status: <preserved | weak | missing | unclear>
      claim_ceiling_effect: <no_change | lowered | exceeded | unclear>
    checked_addon_recommendation_gate_yaml:
      status: <available | available_with_limits | missing | unclear>
      selected_addon: <CONFLICT | other | none | unclear>
      selected_addon_matches_this_template: <true | false | unclear>
      recommendation_limits_preserved: <yes | partial | no | unclear>
  checked_addon_gate_import:
    gate_status: <selected_addon_recommended | scan_only | no_addon_recommended | rejected_as_over_application | revise_before_addon | 
      downgrade_before_addon | suspend_before_addon | refuse_before_addon | redirect_before_addon | unclear>
    selected_addon: <CONFLICT | other | none | unclear>
    selected_addon_matches_this_template: <true | false | unclear>
    recommendation_strength: <none | weak | moderate | strong | unclear>
    selection_consistency_status: <consistent | inconsistent | unclear>
    gate_limits_preserved:
      recommendation_not_authorization: <true | false | unclear>
      no_addon_source_read_inside_gate: <true | false | unclear>
      no_addon_application_inside_gate: <true | false | unclear>
      claim_ceiling_preserved: <true | false | unclear>
    import_quality:
      status: <usable | usable_with_limits | not_usable | unclear>
      required_response: <continue_addon_application | revise_gate_output | suspend_addon_application | refuse_addon_application | unclear>
  selected_conflict_source_import:
    source_status: <already_read | missing | mismatch | unclear>
    source_matches_selected_addon: <yes | no | unclear>
    source_role: selected CONFLICT source reference only
    source_constraints_to_preserve:
      - CONFLICT is subordinate to PMS Base
      - CONFLICT does not redefine PMS operators
      - CONFLICT does not turn disagreement into conflict by topic cue
      - CONFLICT does not authorize intervention, governance, or downstream MIP/AHP use
  overlays:
    P:
      name: Publicness Overlay
      is_operator: false
      amplifies:
        - Ω
        - Θ
        - Α
        - Φ
      note: 'Amplification only. Higher publicness increases exposure coupling and raises the cost of revision. It introduces no new operators.'
      case_application: '<State whether publicness amplifies the conflict configuration in this case.>'
    MG:
      name: Misuse Gradient (Transmission Risk)
      is_operator: false
      amplifies:
        - Ω
        - Θ
      note: 'Classification of predictable misuse risk when operator language travels through excerpt dynamics, audience coupling, or enforcement
        affordances. Not an operator.'
      case_application: '<State the misuse-gradient relevance for this case.>'
  no_gate_redecision_boundary:
    gate_redecision_performed_here: false
    selected_addon_changed_here: false
    allowed_response_if_mismatch: stop_and_return_selected_addon_mismatch
  conflict_not_solution_boundary:
    conflict_reading_is_not_solution_procedure: true
    terminality_is_not_finality: true
    downstream_docking_is_mode_shift_not_continuation: true
    intervention_or_governance_authorized_here: false
    prohibited_drift:
      - conflict_visibility_to_verdict
      - terminality_to_finality
      - publicness_to_enforcement_warrant
      - dignity_collapse_to_person_judgment
      - downstream_docking_to_governance_authority
  conflict_trigger_review:
    ordinary_disagreement_present: <yes | no | unclear>
    hostility_or_tension_present: <yes | no | unclear>
    structural_conflict_trigger_met: <yes | no | partial | unclear>
    stabilized_incompatibility_pressure: <none | weak | moderate | strong | unclear>
    binding_collision_pressure: <none | weak | moderate | strong | unclear>
    asymmetry_lock_in_pressure: <none | weak | moderate | strong | unclear>
    priced_or_asymmetric_distance_pressure: <none | weak | moderate | strong | unclear>
    exposure_capture_pressure: <none | weak | moderate | strong | unclear>
    terminal_positioning_pressure: <none | weak | moderate | strong | unclear>
    non_trigger_conditions:
      - ordinary_disagreement_not_conflict_trigger
      - hostility_or_tension_not_conflict_trigger
      - public_controversy_not_conflict_trigger
      - incompatibility_language_not_stabilized_conflict_proof
      - solution_need_not_CONFLICT_authorization
    false_trigger_risk: <none | low | medium | high | unclear>
  core_and_claim_boundary_preservation:
    core_findings_preserved: <yes | partial | no | unclear>
    core_findings_strengthened_by_addon: false
    claim_ceiling_from_checked_pre_analysis: <imported | missing | unclear>
    claim_ceiling_from_checked_core: <imported | missing | unclear>
    addon_claim_ceiling: <same_as_core | lower_than_core | unclear>
    if_addon_pressure_exceeds_claim_ceiling:
      required_action: <weaken | downgrade | suspend | refuse | redirect | unclear>
      note: CONFLICT fit may not raise the claim ceiling.
  addon_metadata:
    model_name: PMS–CONFLICT Application Profile
    model_short: PMS-CONFLICT
    status: selected_addon_case_application_profile
    repository_role: pms_discipline_selected_addon_case_application_profile
    depends_on:
      model_name: Praxeological Meta-Structure
      model_short: PMS
      schema_version: PMS_1.3
      repository_role: current_base_schema
    source_file: PMS-CONFLICT.yaml
    description: 'PMS-CONFLICT is an application profile for PMS that formalizes the conflict lens: how incompatibility stabilizes once binding
      persists, trajectories accumulate, distance/exit becomes priced or asymmetric, and exposure converts description into pressure. The profile
      expresses the CONFLICT source strictly in the canonical PMS operator grammar Δ–Ψ, without redefining operators or altering dependencies.
      It provides reduced signatures, core drift classes, scale/cost overlays, non-operator constructs, and reusable safety interfaces for application-bound
      contexts.'
    methodological_restraint: CONFLICT sharpens stabilized-incompatibility visibility only. It does not authorize classification, solution 
      procedure, downstream MIP/AHP use, person judgment, governance action, publication permission, or PMS Base revision.
  addon_relationship_to_core:
    status: subordinate_to_checked_pms_core_case
    core_case_status: <checked | checked_with_limits | missing | unclear>
    core_case_source: <checked PMS Core Case Application YAML>
    rule: 'This CONFLICT add-on block is appended to or integrated with an already completed PMS Core case artefact. It does not rewrite the core
      pass, redefine PMS operators, alter PMS dependencies, change derived structures, or treat CONFLICT constructs as PMS Base.'
    preserved_core_elements:
      - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
      - PMS operator order and dependency hygiene
      - PMS derived structures as derived, not primitive
      - PMS application guardrails
      - PMS non-diagnostic and non-person-ranking discipline
      - PMS non-capture and rival-openness discipline
    integration_rule: 'The CONFLICT add-on may add visibility for stabilized incompatibility, binding collision, asymmetry lock-in, exposure capture,
      dignity collapse, priced or asymmetric distance, terminal regime positioning, publicness, misuse gradients, and downstream docking. It must
      not modify the completed PMS Core case except where a direct PMS.yaml inconsistency has been separately identified.'
  checked_addon_gate_import_detail:
    source_record: checked pms_discipline_addon_recommendation_gate_template.yaml output
    source_status: <checked | checked_with_limits | missing | unclear>
    import_rule: The checked Add-on Recommendation Gate constrains this CONFLICT add-on application but does not authorize claim 
      strengthening. If the checked gate is missing, unclear, or rejects CONFLICT as over-application, this template may not be filled 
      except to mark why CONFLICT should not proceed.
    selected_addon:
      expected: CONFLICT
      actual: <CONFLICT | other | none | unclear>
      matches_this_template: <true | false | unclear>
    recommendation_status:
      gate_status: <selected_addon_recommended | scan_only | no_addon_recommended | rejected_as_over_application | revise_before_addon | 
        downgrade_before_addon | suspend_before_addon | refuse_before_addon | redirect_before_addon | unclear>
      recommendation_strength: <none | weak | moderate | strong | unclear>
    non_trigger_conditions_checked:
      - ordinary_disagreement_not_conflict_trigger
      - hostility_or_tension_not_conflict_trigger
      - public_controversy_not_conflict_trigger
      - incompatibility_language_not_stabilized_conflict_proof
      - solution_need_not_CONFLICT_authorization
    required_action_before_addon: <proceed_with_limits | revise_core | downgrade_claim | suspend | refuse | redirect | human_review | 
      unclear>
    trigger_basis_import: <Import operator-load, risk-shape, or claim-shape reason for CONFLICT review. Do not use topic label alone.>
    doubts_and_limits_import:
      doubts:
        - <doubt or none>
      limits:
        - <limit or none>
  nested_overlay_policy:
    no_base_extension: true
    rule: 'PMS-CONFLICT introduces overlay-level constructs only: reduced signatures, drift classes, scale matrices, publicness/misuse overlays,
      and non-operator conflict constructs. These organize existing PMS operators. They never replace PMS generativity with explanation, never
      bypass Ω, Θ, or Χ, and never become PMS operators or dependencies.'
  validity_gate:
    status: <valid | valid_with_limits | invalid | requires_revision | unclear>
    gate_type: selected_conflict_addon_case_application_gate
    note: 'This gate checks whether CONFLICT can be applied as the selected add-on without re-running Core, changing the selected add-on, or raising
      the claim ceiling.'
    requires:
      Distance_Chi:
        id: Χ
        name: Distance
        status: <maintained | compromised | needs_review>
        meaning: 'Reflective distance is maintained. The CONFLICT add-on does not fuse the case into verdict, urgency, enforcement, or person-level
          attribution.'
      reversibility:
        id: reversibility
        status: <maintained | compromised | needs_review>
        meaning: 'Readings remain scene-bound, revisable, and non-final. The overlay does not produce global person labels, irreversible labels,
          or final judgments.'
      Dignity_in_Practice_D:
        id: D
        name: Dignity-in-Practice
        status: <maintained | compromised | needs_review>
        meaning: 'Enacted restraint under asymmetry is preserved. The overlay does not shame, rank, humiliate, or ontologically evaluate persons
          or groups.'
    gate_result: <valid_as_conflict_addon_case_application | invalid_as_conflict_addon_case_application | requires_revision | suspend | 
      unclear>
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
      - Δ
      - ∇
      - □
      - Λ
      - Α
      - Ω
      - Θ
      - Φ
      - Χ
      - Σ
      - Ψ
    dependency_hygiene_note: 'Any use of Χ in reduced signatures is shorthand only. In PMS, Χ depends on Φ, Θ, and □. Reduced signatures do not
      negate prerequisites or alter the default dependency path recorded in PMS.yaml.'
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  conflict_addon_scope:
    scope_guardrails:
      - Non-metaphysical, non-clinical, non-diagnostic.
      - No person-level judgment, no ranking, no sanction logic.
      - Describes structural regimes and operator drift under load.
      - 'No procedure manual: no intervention scripts, no solutions section.'
      - Bounded to this grammar; no monopoly claim over conflict intelligibility as such.
    may_add_visibility_to:
      - stabilized incompatibility
      - binding collisions under Ψ
      - Σ-failure or Σ-incompatibility under load
      - asymmetry gradients under Ω
      - temporal hardening under Θ
      - priced or asymmetric distance under Χ
      - conflict attractor stabilization under Α
      - exposure capture under Ω/Θ/Φ with publicness amplification
      - dignity collapse under Ω/Θ/Χ/Ψ pressure
      - young Α-field dynamics
      - institutionalized distance regimes
      - application-boundary and misuse-gradient red zones
      - terminal regime positioning
      - downstream docking into governance or evaluation layers
    must_not_do:
      - treat conflict as personal essence
      - treat incompatibility as diagnosis
      - translate conflict legibility into verdict
      - produce intervention scripts or solution procedures
      - convert Σ-failure into moral failure
      - convert Ω-gradient into authority claim
      - convert publicness into enforcement warrant
      - convert terminality into finality
      - treat downstream governance as continuation of PMS-CONFLICT
      - claim PMS Base output check
      - treat ordinary disagreement, hostility, or tension as CONFLICT trigger
      - convert CONFLICT visibility into downstream MIP or AHP authorization
      - raise the Core claim ceiling through overlay fit
      - treat examples or article readability as evidence
  source_and_claim_burden_discipline:
    claim_ceiling_import:
      from_checked_pre_analysis: <orientation | structural_sketch | hypothesis | bounded_reconstruction | evaluation | recommendation | 
        intervention | public_synthesis | unclear>
      from_checked_core: <imported | missing | unclear>
      addon_ceiling: <same_or_lower_than_checked_core | lowered | unclear>
      rule: CONFLICT may not raise the claim ceiling by add-on fit, conflict fluency, or source readability.
    conflict_specific_claims_allowed_only_with_limits:
      - stabilized incompatibility as case-bound structural reading
      - binding collision as overlay construct
      - priced or asymmetric distance as overlay reading
      - terminal regime positioning as PMS-CONFLICT-internal regime description
    claims_not_licensed:
      - empirical proof of conflict
      - diagnosis
      - personality typing
      - moral verdict
      - legal or forensic conclusion
      - solution procedure
      - sanction logic
      - governance authority
      - PMS Base output check
      - downstream MIP authorization
      - downstream AHP authorization
      - article publication permission
    statistics_or_dataset_use:
      method_status_required_for_stronger_claims: true
      downgrade_rule: If statistics or datasets lack method, population/sample, timeframe, or source status, use them only as weak context 
        or require suspension for stronger empirical claims.
    source_conflict_rule: Conflicting materials must remain rival pressure or source conflict. Do not resolve source conflict by forcing PMS
      or CONFLICT coherence.
    source_material_import:
      source_status_from_case_packet: <from CASE PACKET>
      source_status_from_checked_pre_analysis: <imported | missing | unclear>
      source_material_status: <none | marked | partial | underdescribed | required_but_missing | unclear>
      source_use_rule: Documents, reports, statistics, datasets, transcripts, public materials, or institutional records remain marked 
        inputs. They do not become proof, CONFLICT authorization, PMS output check, or person-level warrant merely because they exist.
  conflict_lens:
    methodological_boundedness:
      status: <active | weak | not_applicable | needs_review>
      note: 'PMS-CONFLICT develops a structural grammar of stabilized incompatibility under binding, asymmetry, and temporality. It does not claim
        to exhaust everything conflict is or could become under other analytical grammars.'
      constraints:
        - Conflict legibility here is internal to the PMS grammar.
        - Terminality here names the end of reintegration resources within this grammar.
        - Where classification and attractor logic preserve coherence, non-capture remains open.
      case_application: '<State how the case remains bounded to the PMS-CONFLICT grammar and where rival conflict grammars remain open.>'
    scope_limit_of_tragic_legibility:
      status: <active | weak | not_applicable | needs_review>
      note: 'The tragedy clause should not be read as an inflationary claim that mature conflict is always or finally tragic. Its narrower claim
        is that tragedy remains structurally possible even under maintained distance, reflexivity, and responsibility constraints, and that some
        conflicts become more legible without becoming more integrable.'
      openings:
        - Not every hard conflict is tragic in the strong sense developed here.
        - Tragic legibility does not eliminate rival conflict grammars.
      case_application: '<State whether the case is conflict-legible, tragically legible, or not tragic in the strong CONFLICT sense.>'
    core_definition:
      conflict_domain_layer:
        is_operator: false
        applicability: <active | weak | not_applicable | needs_review>
        definition: 'Within this descriptive architecture, CONFLICT names a terminal descriptive regime in which incompatibility is stabilized
          under binding, temporality, asymmetry, and costly or asymmetric distance. The model increases legibility of this regime but does not
          generate an additional internal operator that restores integrability once Σ no longer carries under Θ/Ω with priced or asymmetric Χ.'
        minimal_operator_touchpoints:
          - Σ
          - Ψ
          - Ω
          - Θ
          - Χ
        case_application: '<State whether the case reaches the conflict-domain layer and how Σ, Ψ, Ω, Θ, and Χ are involved.>'
    terminal_positioning:
      applicability: <active | weak | not_applicable | needs_review>
      terminal_stack_claim: 'Within the PMS-domain stack developed here, CONFLICT functions as the terminal domain layer: beyond maximal Δ–Ψ load
        under Θ/Ω/Χ, the model yields no further internal reintegration grammar — only downstream governance, institutionalization, decision,
        or evaluation.'
      structural_full_stop_sentence: 'The CONFLICT source does not continue into solutions. It ends where praxis becomes tragically legible but
        no longer integrable within this descriptive pathway.'
      terminality_without_finality: 'Terminality here is stack-internal and grammar-internal. It does not claim that conflict as such admits no
        further analysis, only that this operator grammar does not generate an additional internal reintegration layer once Σ has failed under
        sustained Θ/Ω/Ψ with costly or asymmetric Χ.'
      case_application: '<State whether terminal positioning is active, weak, or not applicable in this case.>'
    downstream_docking:
      status: <not_triggered | triggered | needs_review>
      note: 'Within this stack architecture, CONFLICT terminates the PMS domain grammar. Any continuation constitutes a mode shift into downstream
        governance, institutionalization, decision, or evaluation layers, not a further descriptive extension of PMS-CONFLICT itself.'
      allowed_continuations:
        - governance frameworks
        - institutional rule-setting
        - decision procedures
        - evaluation overlays
      disallowed_continuations:
        - implicit solution derivation
        - hidden intervention logic
        - operator extension beyond Δ–Ψ
      case_application: '<State whether the case remains descriptive or triggers explicit downstream docking.>'
  non_operator_constructs:
    conflict_attractor_A_conflict:
      is_operator: false
      applicability: <active | weak | not_applicable | needs_review>
      definition: 'Stabilized conflict pattern Α_conflict in which incompatibility itself becomes a repeatable orientation field under asymmetric
        cost and temporal pressure; distance or exit remains formally available but priced or asymmetric.'
      operator_touchpoints:
        - Α
        - Ω
        - Θ
        - Ψ
        - Χ
      case_application: '<State whether conflict itself stabilizes as an attractor in this case.>'
    binding_collision:
      is_operator: false
      applicability: <active | weak | not_applicable | needs_review>
      definition: 'Two or more bindings Ψ collide and remain jointly non-viable under the same frame and time trajectory; integration Σ cannot
        produce a shared spine at acceptable cost.'
      operator_touchpoints:
        - Ψ
        - Ω
        - Θ
        - Σ
      case_application: '<State whether incompatible bindings collide in this case and whether Σ can carry a shared spine.>'
    asymmetry_lock_in:
      is_operator: false
