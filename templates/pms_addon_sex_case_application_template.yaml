      direct otherness, withdrawal, and possible drifts. Where relevant, show how after-scene effects grow out of the scene
      grammar, recurrence, symbolic handling, publicness, documentation, role structure, or cost layout. Do not over-narrate
      inner motives, fantasies, pathology, or moral quality.>
