        position only if relevant>
    - id: field_or_medium
      label: >-
        <optional medium, platform, audience, institution, category system, tone, documentation layer, shared narrative,
        or non-human scene factor>
    surface_description: <how the scene may initially appear before cost topology and Θ carryover are mapped>
    pms_sex_question: <what PMS-SEX is testing in this case; formulate as structural test, not advice request>
