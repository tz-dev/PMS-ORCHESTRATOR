# ==============================================================================
# PMS-DISCIPLINE — SEX ADD-ON CASE APPLICATION TEMPLATE
# Template version: CLEAN_v0.2.1
# Role: selected SEX add-on case application after checked Core and checked Add-on Gate
# Source-aligned against PMS-SEX.yaml
# ==============================================================================
pms_sex_addon_case_application:
  schema_version: PMS-DISCIPLINE_SEX_ADDON_CASE_TEMPLATE_CLEAN_v0.2.1
  case_schema_version: PMS-SEX_CASE_TEMPLATE
  schema_role: sex_addon_case_application_template
  overlay_status: application_profile_only
  overlay_model: PMS-SEX
  overlay_schema_version: PMS-SEX_PROFILE
  sex_case_template_source: PMS-SEX_CASE_TEMPLATE
  base_model: PMS
  base_schema_version: PMS_1.3
  discipline_status: selected_addon_layer_only_over_checked_core_case
  template_status: clean_pms_discipline_addon_case_application_template
  discipline_template_name: pms_addon_sex_case_application_template_CLEAN_v0_2.yaml
  analysis_mode: selected_sex_addon_case_application_after_checked_core
  template_purpose: >-
    Apply the selected PMS-SEX source to a bounded case after PMS.yaml, checked Pre-Analysis YAML, checked Core Case Application
    YAML, checked Add-on Recommendation Gate YAML, and PMS-SEX.yaml have already been read or produced in prior steps. The
    output is a SEX add-on case application YAML only. It preserves PMS-SEX scene-bound structural mechanics while preventing
    diagnosis, person verdict, sexual truth, practice guidance, legal/clinical/forensic conclusion, maturity/adultness verdict,
    access entitlement, exposure license, MIP/AHP authorization, PMS Base revision, or final decision execution.
  template_boundary: This template applies SEX without replacing PMS.yaml, re-running Core, re-deciding the Add-on Gate,
    reading additional sources, applying other add-ons, producing external-facing prose, applying MIP/AHP, generating a 
    Case Record, rendering Markdown, or executing an action/decision-state execution.
  repository_reference:
    pms_base_reference_file: PMS.yaml
    pms_base_reference_status: already_read_base_reference
    selected_addon_source_file: PMS-SEX.yaml
    selected_addon_source_status: already_read_selected_addon_source
    template_role: sex_addon_case_application_template
    supported_addon_family: SEX
    reference_note: PMS.yaml supplies PMS Base grammar. PMS-SEX.yaml supplies the selected add-on source. Checked 
      Pre-Analysis, checked Core, and checked Add-on Gate outputs constrain this application. No additional discipline 
      reference file, MIP output, AHP output, Case Record, Markdown article, or unprovided file is available inside this
      step.
  source_priority:
    pms_yaml:
      priority: 1
      role: PMS Base reference already read before this step
      may_define:
      - PMS operator inventory
      - PMS operator order
      - PMS dependencies
      - PMS derived structures
      - PMS application guardrails
      must_not_be_overridden_by:
      - SEX add-on output
      - case_packet
      - checked_pre_analysis_yaml
      - checked_core_case_application_yaml
      - checked_addon_recommendation_gate_yaml
      - PMS-SEX.yaml
      - model_output
    case_packet:
      priority: 2
      role: bounded case material supplied for this run
      may_supply:
      - case_title
      - case_material
      - source_status
      - intended_use
      must_not_supply:
      - PMS Base revision
      - SEX source content
      - case verdict
      - final decision execution
    checked_pre_analysis_yaml:
      priority: 3
      role: >-
        checked boundary, source-status, burden, person-nearness, publicness/irreversibility, non-capture, and claim-ceiling
        record
      may_supply:
      - source material limits
      - person-nearness burden
      - publicness / irreversibility burden
      - MIP/AHP downstream pressure markings
      must_not_supply:
      - SEX application result
      - add-on authorization
      - MIP authorization
      - AHP authorization
      - person ranking
      - sexual truth
      - maturity verdict
      - final decision execution
    checked_core_case_application_yaml:
      priority: 4
      role: checked PMS Core case basis for this selected add-on application
      may_supply:
      - case boundary
      - operator assignments
      - dependency status
      - derived structure status
      - claim ceiling
      - source status
      - non-capture zones
      - rival readings
      - falsifier and weakening conditions
      must_not_be_rewritten_by:
      - SEX overlay
      - sexual vocabulary
      - sexual cost topology vocabulary
      - adult reciprocity language
      - body / genital meaning language
      - withdrawal / binding language
      - publicness or outer-legibility language
      - MIP or AHP outputs
      must_not_authorize:
      - SEX use by itself
      - MIP use
      - AHP use
      - case closure
      - final decision execution
    checked_addon_recommendation_gate_yaml:
      priority: 5
      role: >-
        checked gate output confirming SEX as the selected add-on family for this step
      may_supply:
      - SEX recommended / scan-only / not recommended / unsafe / unclear status
      - doubts and non-trigger conditions
      - over-application warnings
      must_not_supply:
      - authorization
      - final decision state
      - action authority
      - case verdict
      - sexual classification
      - MIP authorization
      - AHP authorization
    selected_pms_sex_yaml:
      priority: 6
      role: selected SEX add-on source read in the previous step
      may_define:
      - SEX constructs
      - SEX overlay fields
      - SEX-specific guardrails
      - SEX viability / drift / cost-topology checks
      - SEX MIP-docking guards
      must_not_define:
      - PMS Base
      - PMS operator inventory
      - Core case findings
      - diagnosis
      - sexual truth
      - person status
      - practice instruction
      - action authorization
      - MIP authorization
      - AHP authorization
    this_sex_case_template:
      priority: 7
      role: SEX case application output structure
      must_not_authorize:
      - Core rewrite
      - PMS Base revision
      - MIP use
      - AHP use
      - publication
      - intervention
      - exposure
      - final decision execution
  workflow_position:
    phase: selected_addon_case_application
    step_id: pms_sex_addon_case_application
    step_role: >-
      This template applies only the selected SEX add-on after checked Pre-Analysis, checked PMS Core, checked Add-on Recommendation
      Gate, and source reading of PMS-SEX.yaml. It produces a SEX add-on case application YAML that must itself be checked
      before any later MIP Gate, Case Record, Markdown, or publication-facing use.
    preceded_by_required_steps:
    - read_pms_yaml
    - checked_pre_analysis_yaml
    - checked_core_case_application_yaml
    - checked_addon_recommendation_gate_yaml
    - read_selected_pms_sex_yaml
    not_permitted_before_this_step:
    - using_SEX_before_checked_core
    - using_SEX_from_topic_label_alone
    - MIP_application
    - AHP_application
    - case_record_integration
    - article_generation
    not_permitted_inside_this_step:
    - rewriting_core_case_yaml
    - redefining_PMS_operators_or_dependencies
    - treating_SEX_constructs_as_PMS_Base
    - treating_sexual_vocabulary_as_SEX_trigger
    - treating_sexual_cost_topology_as_score_or_ranking
    - treating_adult_reciprocity_language_as_maturity_or_adultness_verdict
    - treating_body_or_genital_meaning_as_person_truth
    - treating_direct_otherness_as_access_entitlement
    - treating_outer_legibility_as_exposure_or_punishment_license
    - treating_withdrawal_as_automatic_guilt_or_exculpation
    - treating_viability_as_normality
    - treating_SEX_output_as_MIP_or_AHP_authorization
    - setting_final_decision_state_as_executed
    - reading_unselected_addons_as_authority
    - applying_MIP_or_AHP
    - creating_maturity_or_adultness_verdict
    - exporting_SEX_as_publication_permission
    - using_SEX_output_as_final_decision_execution
    next_required_step:
    - sex_addon_output_check
    step_boundary: SEX case application only; later steps must be opened by their own templates, gates, checks, and 
      human route confirmation where required.
  template_io_contract:
    required_inputs:
    - PMS.yaml_read_completely
    - case_packet
    - checked_pre_analysis_yaml
    - checked_core_case_application_yaml
    - checked_addon_recommendation_gate_yaml
    - PMS-SEX.yaml_read_completely
    - pms_sex_addon_case_application_template
    optional_inputs_allowed_only_if_marked:
    - prior_human_notes
    - prior_model_output_as_input_not_evidence
    - source_documents_full_or_excerpted
    - statistical_material_or_tables
    - transcripts_or_correspondence
    - reports_or_institutional_records
    - counter_reading_material
    - affected_role_contestation_material
    forbidden_inputs_at_addon_stage:
    - unchecked_core_case_as_anchor
    - SEX_vocabulary_as_trigger_without_checked_gate_record
    - MIP_or_AHP_result_as_SEX_authority
    - article_draft_as_case_evidence
    - sexual_vocabulary_as_evidence
    - body_or_genital_terms_as_person_truth
    - source_presence_as_proof
    - document_authority_as_action_authorization
    produced_outputs:
    - completed_SEX_addon_case_yaml
    - SEX_overlay_scope_and_core_anchor_record
    - layer_separation_record
    - sexual_cost_topology_record
    - direct_otherness_and_boundary_record
    - withdrawal_binding_and_viability_record
    - D_readout_and_downstream_pressure_record
    - source_and_claim_burden_record
    - sex_addon_quality_control
    - downstream_mip_pressure_review
    - addon_handoff
    output_must_not_claim:
    - SEX_authorization
    - sexual_truth
    - sexual_classification
    - orientation_taxonomy
    - person_ranking
    - diagnosis
    - practice_guidance
    - action_authority
    - exposure_permission
    - maturity_or_adultness_verdict
    - MIP_authorization
    - AHP_authorization
    - publication_readiness
  discipline_addon_recommendation_gate_import:
    required_record: pms_discipline_addon_recommendation_gate_output
    acceptable_recommendation_statuses_for_application:
    - recommended
    - recommended_with_limits
    - scan_only_with_explicit_human_continuation
    - human_review_required_then_recommended
    non_application_statuses:
    - not_recommended
    - rejected_as_over_application
    - unsafe
    - revise_core_recommended
    - downgrade_recommended
    - suspend_recommended
    - refuse_recommended
    - redirect_recommended
    - unclear
    import_fields:
    - recommended_addon
    - recommendation_status
    - reason_for_recommendation
    - non_trigger_conditions_reviewed
    - over_application_warnings
    - claim_ceiling
    - person_nearness_burden
    - source_status_limits
    SEX_specific_non_trigger_checks:
    - sexual_vocabulary_alone_is_not_SEX_trigger
    - sexual_metaphor_alone_is_not_SEX_trigger
    - body_or_genital_reference_alone_is_not_SEX_trigger
    - relationship_or_desire_topic_alone_is_not_SEX_trigger
    - adultness_or_maturity_language_alone_is_not_SEX_trigger
    - publicness_or_exposure_language_alone_is_not_SEX_trigger
    - withdrawal_or_non_binding_alone_is_not_SEX_trigger
    if_gate_missing: >-
      do_not_apply_SEX_overlay; return to add-on recommendation gate or mark as invalid workflow order
  source_and_claim_burden_discipline:
    general_rule: >-
      SEX overlay may organize sexual-praxeological structure but may not upgrade source status or claim strength.
    source_status_rules:
    - reports remain reports
    - interpretations remain interpretations
    - model outputs remain model outputs not evidence
    - statistics remain contextual inputs unless method and relevance are established
    - sexual vocabulary in a source does not prove sexual-praxeological structure
    - public documentation does not authorize exposure or punishment
    claim_ceiling_rules:
    - scene-bound structural reading only unless stronger source basis is explicitly present
    - no person-level sexual truth
    - no orientation taxonomy
    - no diagnosis
    - no moral ranking
    - no access entitlement
    - no practice advice
    - no legal clinical forensic HR or policy conclusion
    - no maturity/adultness verdict from PMS-SEX alone
    required_weakening_when:
    - input is thin, partial, fictional, synthetic, or model-generated
    - person-nearness is high
    - publicness or irreversibility risk is high
    - rival explanations discriminate better
    - sexual cost topology would be treated as score or ranking
    - MIP-docking pressure appears but MIP has not yet been gated
    additional_source_guardrails_from_PMS_SEX_yaml:
    - no_moralism
    - no_visibility_totalization
    - no_boundary_aggression_authorization
    - no_impulse_malice_default
    - no_lack_of_malice_exculpation
    - no_unlearned_handling_exculpation
    - mip_no_back_projection
  addon_validation_expectations:
    validation_scope: >-
      validate completed SEX overlay case YAML against PMS.yaml, PMS-SEX reference, this template, and PMS-DISCIPLINE constraints
    must_check:
    - YAML_parse_ok
    - no_unfilled_placeholders_in_final_output
    - checked_Core_anchor_present
    - add_on_recommendation_gate_import_present
    - Core_not_rewritten
    - PMS_Base_not_redefined
    - SEX_constructs_not_treated_as_PMS_Base
    - sexual_vocabulary_not_used_as_trigger_by_itself
    - sexual_cost_topology_not_scored_or_ranked
    - direct_otherness_not_converted_into_access_entitlement
    - outer_legibility_not_converted_into_exposure_license
    - withdrawal_not_converted_into_guilt_or_exculpation
    - viability_not_converted_into_normality
    - adultness_or_maturity_not_concluded_without_MIP_gate
    - source_status_preserved
    - claim_ceiling_preserved
    - rival_pressure_preserved
    - MIP_AHP_not_authorized_by_SEX_output
    patch_policy: >-
      conservative_patch_only; fix surface/schema/workflow/guardrail errors without rewriting SEX theory or Core findings
  downstream_mip_pressure_review:
    status: <not_indicated | scan_only | downstream_review_pressure | needs_review | unsafe>
    role: Record whether the completed SEX add-on creates later MIP Gate review pressure. This block does not apply MIP,
      does not authorize MIP, does not authorize AHP, and does not create a maturity, adultness, dignity, or 
      person-status verdict.
    pressure_may_arise_from:
    - person_nearness_burden
    - publicness_or_transmission_burden
    - maturity_or_adultness_language_pressure
    - D_readout_sensitivity
    - viability_and_governability_pressure
    - sexual_cost_topology_misuse_surface
    - artifact_hardening_or_public_transmission_pressure
    must_not_export_as:
    - MIP_authorization
    - AHP_authorization
    - maturity_score
    - adultness_verdict
    - dignity_score
    - person_rank
    - case_verdict
    - publication_permission
    recommended_next_gate_status: <not_recommended | scan_only | recommend_MIP_gate_review | unsafe | 
      human_review_required | unclear>
    reason: <State why the SEX add-on does or does not create later MIP Gate pressure. Do not convert sexuality, 
      adultness, reciprocity, viability, or dignity vocabulary into MIP authorization.>
  addon_handoff:
    handoff_role: Make the checked SEX add-on output available to the next routed step without converting it into a Case
      Record, Markdown article, MIP output, AHP output, or final verdict.
    handoff_status: <ready | ready_with_limits | incomplete | blocked | not_applicable>
    fields_to_preserve:
    - selected_addon_family
    - source_status_limits
    - claim_ceiling
    - Core anchor
    - SEX scope
    - non-trigger checks
    - layer readout
    - operator profile
    - sexual cost topology
    - direct otherness and access
    - embodiment/body/genital boundary
    - withdrawal and binding
    - drift scan
    - viability readout
    - Dignity-in-Practice readout
    - minimal psychology gate
    - MIP docking gate result
    - non-capture and rival pressure
    - final claim boundary
    must_not_claim:
    - case verdict
    - truth certification
    - person status
    - sexual truth
    - maturity verdict
    - adultness verdict
    - MIP authorization
    - AHP authorization
    - publication readiness
    - final decision execution
  source_alignment:
    pms_base:
      source_file: PMS.yaml
      schema_version: PMS_1.3
      role: base operator grammar and application guardrails
    sex_profile:
      source_file: PMS-SEX.yaml
      schema_version: PMS-SEX_PROFILE
      profile_format: compact_machine_profile
      role: current paper-repository SEX application overlay
    sex_repo_case_template:
      source_file: PMS-SEX_CASE_TEMPLATE / example template.yaml
      case_schema_version: PMS-SEX_CASE_TEMPLATE
      role: full field structure for scene-bound PMS-SEX example cases
    discipline_policy: >-
      DISCIPLINE uses PMS-SEX as a selected add-on layer over an already checked PMS-Core case. It does not generate a standalone
      PMS-SEX example-suite artefact, Case Record, Markdown article, MIP output, or AHP output inside this step unless a later
      routed step explicitly does so.
  overlay_relationship_to_core:
    status: subordinate_to_checked_pms_core_case
    core_case_status: already_checked
    core_case_source: <checked PMS-Core case YAML>
    rule: >-
      The SEX overlay is appended to or integrated after the already checked PMS-Core case. It may refer to Core operators,
      Core scene framing, and Core boundary discipline as anchors, but it must not modify the PMS-Core pass, redefine PMS
      operators, alter PMS dependencies, replace derived PMS axes, or treat PMS-SEX constructs as PMS Base.
    preserved_core_elements:
    - PMS operator inventory Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ
    - PMS operator order and dependency hygiene
    - PMS derived structures A, C, R, E, D as derived, not primitive
    - PMS application guardrails
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    integration_rule: >-
      The SEX overlay may add visibility for scene framing, inner/outer/public layer separation, sexual cost topology, body
      remainder, publicness, direct otherness, access logic, withdrawal/binding, path-cost, drift corridors, asymmetry-switch
      drift, parity-to-exit, responsibility-to-authority, adult sexual reciprocity, dignity-in-practice constraints, and MIP
      docking guards. It must not modify the completed PMS-Core case except where a direct PMS.yaml inconsistency has been
      separately identified.
    core_case_identifier: <DISCIPLINE case id>
    core_case_title: <DISCIPLINE case title>
    core_layer_handling:
      read_core_for_anchor: true
      rewrite_core: false
      revise_core_findings: false
      overwrite_core_formulas: false
      alter_core_qc: false
  pms_v13_and_sex_conformity:
    status: conformant_overlay_required
    base_schema_version: PMS_1.3
    canonical_operator_spine: Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ
    repository_dependency_order_preserved: true
    no_new_meta_operators: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    no_direct_adultness_verdict: true
    overlay_only: true
    reduced_signatures_are_shorthand_only: true
    sex_constructs_are_not_pms_base: true
    mip_docking_required_for_adultness_or_maturity_language: true
    notes:
    - >-
      PMS-SEX uses the default PMS repository dependency path as reference spine for domain-specific application. Reduced
      formulas are shorthand, not alternative dependency graphs.
    - >-
      Publicness, outer legibility, body remainder, direct otherness, sexual cost topology, withdrawal/binding profiles,
      drift profiles, viability conditions, and MIP docking are PMS-SEX overlay constructs, not PMS operators.
    - >-
      Suspended self-binding means Ψ is present as a deliberately suspended attribution condition. It is not absent, replaced,
      removed, or transformed into a new operator.
    - >-
      Sexual cost topology is a scene-bound Ω/Θ cost layout. It is not a score, person measure, dignity measure, maturity
      measure, sex truth, or genital truth.
    - >-
      Dignity-in-Practice remains the PMS-derived construct with canonical derivation [Ψ, Χ, Ω]; PMS-SEX adds application-side
      D checks without revising PMS-D.
  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: >-
      PMS-SEX introduces no PMS operators or dependencies. Its reduced signatures, publicness/documentation overlays, path-cost
      language, sexual cost topology, EDEN/PFO switch references, asymmetry-switch drift, parity-to-exit, responsibility-to-authority,
      adult sexual reciprocity, modulators, warning signals, and MIP docking guards remain application-level constructs only.
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    canonical_order:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    dependencies:
      Δ: []
      ∇:
      - Δ
      □:
      - Δ
      - ∇
      Λ:
      - □
      Α:
      - Δ
      - ∇
      - □
      - Λ
      Ω:
      - Α
      Θ:
      - Ω
      - Α
      Φ:
      - Θ
      - Ω
      - □
      Χ:
      - Φ
      - Θ
      - □
      Σ:
      - Χ
      - Φ
      Ψ:
      - Σ
      - Θ
      - Χ
    dependency_hygiene:
      reduced_signatures_are_shorthand: true
      reduced_signatures_do_not_change_dependencies: true
      chi_presupposes:
      - Φ
      - Θ
      - □
      sigma_presupposes:
      - Χ
      - Φ
      psi_presupposes:
      - Σ
      - Θ
      - Χ
      overlay_concepts_are_not_operators: true
      drift_profiles_are_not_operators: true
      axis_refs_are_not_operators: true
      axis_refs_do_not_modify_pms_axes: true
      mip_axes_do_not_modify_pms_axes: true
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  references:
    pms_base: PMS.yaml / PMS_1.3
    pms_sex_profile: PMS-SEX.yaml / PMS-SEX_PROFILE
    pms_sex_case_template: PMS-SEX_CASE_TEMPLATE
    checked_core_case: <checked PMS-Core case artefact>
  sex_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-clinical, non-diagnostic, non-therapeutic.
    - No person-level judgment, no person-ranking, no orientation taxonomy, no identity verdict.
    - No maturity hierarchy, dignity hierarchy, humiliation, or moral pathology.
    - >-
      No direct adultness verdict; maturity-relevant evaluation belongs only to explicit downstream MIP docking.
    - >-
      No how-to guidance, no risk-management manual, no optimization logic, no legal or forensic authority.
    - Sexual cost topology is scene-bound cost layout, not score or ranking.
    - Outer legibility is not public-punishment license.
    - Internal framing is real but not total.
    - Publicness is overlay, not necessary origin of consequence.
    - >-
      Asymmetry-switch drift, parity-to-exit, and responsibility-to-authority are configuration markers, not person labels.
    - Direct otherness is reality-correction without access entitlement.
    - Genital meaning must not be converted into genital sovereignty or person truth.
    - Withdrawal is neither automatic guilt nor automatic exculpation.
    - Viability means governability, not normality.
    may_add_visibility_to:
    - sexuality as recurring praxis pressure
    - scene/frame grammar
    - internal framing
    - outer legibility
    - pre-reflective scene readability
    - publicness as □ extension
    - path-cost / stabilization burden
    - body as non-operator remainder
    - sexual cost topology
    - EDEN/PFO asymmetry-switch sexual instantiation
    - asymmetry-switch drift
    - parity-to-exit
    - responsibility-to-authority
    - adult sexual reciprocity
    - asymmetry-specific responsibility
    - cost-topology mismatch
    - functional minimum conditions
    - warning signals
    - minimal psychology adapter
    - Dignity-in-Practice module
    - MIP docking guards
    must_not_do:
    - treat sexuality as person essence
    - treat structural readability as diagnosis
    - treat path-cost as person value
    - treat sexual cost topology as maturity or dignity score
    - treat body remainder as biological taxonomy
    - treat publicness as accusation license
    - treat asymmetry activation as automatic drift
    - treat parity as automatic reciprocity
    - treat responsibility as authority
    - treat operator profile as adultness verdict
    - claim PMS Base validation
  case_meta:
    id: <DISCIPLINE-sex-overlay-case-id>
    title: <DISCIPLINE case title>
    subtitle: <optional_short_subtitle>
    status: <draft_overlay | final_overlay | needs_review>
    model: PMS-SEX
    model_schema_version: PMS-SEX_PROFILE
    base_schema: PMS_1.3
    file_name: <DISCIPLINE case file or overlay output file>
    authorship:
      originator: T. Zöller
      formalization_assistant: ChatGPT 5.5 (Thinking)
    purpose: >-
      Demonstrate a bounded PMS-SEX structural overlay for a specified DISCIPLINE case scene while preserving the already
      completed PMS-Core pass.
    case_type: >-
