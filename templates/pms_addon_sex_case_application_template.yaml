        □: >-
          <what frame, scene grammar, label, publicness, safety language, parity claim, or permission structure constrains
          the scene and possibly protects the drift>
        Λ: >-
          <what non-event, silence, delay, refusal, absence, non-binding, avoided re-reading, unnamed cost, or withdrawal
