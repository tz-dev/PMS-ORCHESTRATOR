        Α: >-
          <what repetition, category, script, attractor, continuity demand, or stabilization path makes the pattern easier
          to reproduce than to revise>
        Ω: >-
          <what asymmetry of access, exposure, cost, power, body, exit, responsibility, interpretation, language, publicness,
          or correction-capacity is active>
        Θ: >-
          <what temporal accumulation, irreversibility, after-cost, documentation residue, reputational sediment, symbolic
          continuity, or trajectory matters>
        Φ: >-
          <what recontextualization, narration, relabeling, justification, safety story, parity story, or later story changes
          reading without necessarily changing costs>
        Χ: >-
          <what distance, stop-capability, meta-commentability, interruption, refusal, pause, re-reading, or correction remains
