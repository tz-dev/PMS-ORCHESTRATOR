# ==============================================================================
#  PMS-DISCIPLINE — EDEN ADD-ON CASE APPLICATION TEMPLATE
#
#  Template version:
#    PMS-DISCIPLINE_EDEN_ADDON_CASE_TEMPLATE_CLEAN_v0.1
#
#  Source profiles:
#    PMS.yaml / schema_version: PMS_1.3
#    PMS-EDEN.yaml / schema_version: PMS-EDEN_2.0
#    PMS-EDEN application profile / reusable case overlay template
#
#  DISCIPLINE role:
#    Apply PMS-EDEN as an add-on overlay to an already checked PMS-Core case.
#    The PMS-Core layer is not regenerated, revised, or overwritten.
# ==============================================================================

pms_eden_addon_case_application:
  schema_version: "PMS-DISCIPLINE_EDEN_ADDON_CASE_TEMPLATE_CLEAN_v0.1"
  case_schema_version: PMS-EDEN_CASE_2.0
  schema_role: "selected_addon_case_application_template"
  overlay_model: "PMS-EDEN"
  overlay_schema_version: "PMS-EDEN_2.0"
  eden_case_template_source: "PMS-EDEN_CASE_2.0"
  base_model: "PMS"
  base_schema_version: "PMS_1.3"
  discipline_status: "addon_layer_only_after_checked_core_and_checked_addon_gate"
  template_status: "pms_discipline_aware_selected_addon_case_application_template"
  discipline_template_name: "pms_addon_eden_case_application_template.yaml"
  analysis_mode: "selected_eden_addon_application_after_checked_core"

  template_purpose: >-
    Structure a PMS-DISCIPLINE-compatible PMS-EDEN add-on application for one already checked PMS Core case. The add-on maps scene-bound false-coordinated real asymmetry, responsibility/action-power distribution, Σ/Ψ status, cost distribution, non-action/non-binding relevance, immunization-overexposure and AEP signals, counter-scenes, falsifiers, and description/application firewall status without modifying the checked PMS Core analysis and without converting structural reading into diagnosis, person verdict, action mandate, or closure.

  repository_reference:
    pms_base_reference_file: PMS.yaml
    pms_base_reference_status: already_read_base_reference
    selected_addon_source_file: PMS-EDEN.yaml
    selected_addon_source_status: already_read_selected_addon_source
    template_role: eden_addon_case_application_template
    reference_note: PMS.yaml supplies PMS Base grammar. PMS-EDEN.yaml supplies the selected EDEN add-on source. Checked Pre-Analysis, checked Core, and checked Add-on Gate outputs constrain this application. No unprovided paper, interface YAML, or additional source file is assumed.
  source_priority:
    pms_yaml:
      priority: 1
      role: PMS Base reference already read before this step
      may_define:
      - PMS operator inventory
      - PMS operator order
      - PMS dependencies
      - PMS derived structures
      - PMS application guardrails
    case_packet:
      priority: 2
      role: Bounded case material supplied for this run
      may_supply:
      - case material
      - source status
      - intended use
    checked_pre_analysis_yaml:
      priority: 3
      role: Checked Pre-Analysis output constraining boundary, source status, intended use, claim ceiling, person-nearness, publicness, irreversibility, rival pressure, non-capture, correctability, and reopening
      may_supply:
      - case boundary
      - input/source status
      - claim ceiling
      - rival and non-capture pressure
      - falsifier, weakening, and reopening conditions
    checked_core_case_application_yaml:
      priority: 4
      role: Checked Core output constraining PMS operator assignment, derived structures, Core synthesis, and Core handoff
      may_supply:
      - Core operator assignments
      - dependency status
      - derived structure status
      - Core claim ceiling
      - Core rival readings
      - Core non-capture zones
    checked_addon_recommendation_gate_yaml:
      priority: 5
      role: Checked gate output confirming EDEN as the selected add-on family for this step
      may_supply:
      - selected add-on family
      - recommendation strength
      - doubts and non-trigger conditions
      - over-application risk
    selected_pms_eden_yaml:
      priority: 6
      role: Selected EDEN add-on source read in the previous step
      may_define:
      - EDEN constructs
      - EDEN application fields
      - EDEN-specific guardrails
      - EDEN falsifier and counter-scene requirements
    this_eden_case_template:
      priority: 7
      role: EDEN case application output structure
      may_structure:
      - EDEN add-on case application YAML
      - EDEN-specific quality checks
      - EDEN add-on handoff
  workflow_position:
    phase: selected_addon_case_application
    step_id: eden_addon_case_application
    step_role: Apply the selected EDEN add-on after PMS.yaml, checked Pre-Analysis, checked Core, checked Add-on Gate, and PMS-EDEN.yaml source reading are already available. The output remains subordinate to PMS Base and the checked Core pass.
    preceded_by_required_steps:
    - read_pms_yaml
    - checked_pre_analysis_yaml
    - checked_core_case_application_yaml
    - checked_addon_recommendation_gate_yaml
    - read_selected_pms_eden_yaml
    next_required_step:
    - eden_addon_output_check
    not_permitted_before_this_step:
    - selected_EDEN_source_read_missing
    - checked_core_unavailable
    - checked_gate_unavailable
    not_permitted_inside_this_step:
    - rewriting_core_case_yaml
    - redefining_PMS_operators_or_dependencies
    - treating_EDEN_constructs_as_PMS_Base
    - treating_error_or_fall_language_as_diagnosis
    - treating_false_coordination_as_hidden_motive_proof
    - treating_EDEN_output_as_action_authority
    - treating_description_as_binding_application
    - setting_executed_decision_state
  template_io_contract:
    required_inputs:
    - PMS.yaml_read_completely
    - case_packet
    - checked_pre_analysis_yaml
    - checked_core_case_application_yaml
    - checked_addon_recommendation_gate_yaml
    - PMS-EDEN.yaml_read_completely
    - pms_addon_eden_case_application_template
    optional_inputs_allowed_only_if_marked:
    - prior_human_notes
    - prior_model_output_as_input_not_evidence
    - source_documents_full_or_excerpted
    - statistical_material_or_tables
    - transcripts_or_correspondence
    - reports_or_institutional_records
    - counter_scene_material
    - affected_role_contestation_material
    excluded_inputs_for_this_step:
    - unprovided_files
    - other_addon_sources
    - other_addon_case_templates
    - draft_renderings_as_case_evidence
    - fall_or_error_language_as_diagnosis
    - sex_category_or_identity_as_EDEN_trigger
    - public_exposure_as_EDEN_trigger_without_real_omega_mapping
    - action_request_as_EDEN_authority
    produced_outputs:
    - pms_eden_addon_case_application_yaml
    - eden_construct_mapping
    - counter_scene_and_falsifier_record
    - description_application_firewall_record
    - source_and_claim_burden_record
    - eden_addon_quality_checks
    - eden_addon_handoff
    not_produced_outputs:
    - PMS_Base_revision
    - Core_case_rewrite
    - other_addon_case_application_yaml
    - diagnostic_verdict
    - sex_truth
    - person_status_claim
    - moral_ranking
    - action_recommendation_or_intervention_protocol
    - legal_clinical_forensic_conclusion
    - later_pipeline_artifacts
  source_alignment:
    pms_base:
      source_file: "PMS.yaml"
      schema_version: "PMS_1.3"
      role: "base operator grammar and application guardrails"
    eden_profile:
      source_file: "PMS-EDEN.yaml"
      schema_version: "PMS-EDEN_2.0"
      role: "current paper-repository EDEN application overlay"
    eden_repo_case_template:
      source_file: "PMS-EDEN_CASE_2.0"
      role: "field structure for scene-bound PMS-EDEN example cases"
    discipline_policy: >-
      In this workflow, PMS-EDEN functions as the selected add-on layer over an existing checked PMS-Core case. PMS-Core remains the already checked structural anchor. EDEN supplies case-bound visibility for false coordination, real Ω, action-power/responsibility distribution, counter-scenes, falsifiers, and the description/application firewall.

  overlay_relationship_to_core:
    status: "subordinate_to_checked_pms_core_case"
    core_case_status: "already_checked"
    core_case_source: "<checked PMS-Core case YAML>"
    core_case_identifier: "<case id>"
    core_case_title: "<case title>"
    core_layer_handling:
      read_core_for_anchor: true
      rewrite_core: false
      revise_core_findings: false
      overwrite_core_formulas: false
      alter_core_qc: false
    rule: >
      The EDEN overlay is appended to or integrated after the already checked PMS-Core case. It may refer to Core operators, Core scene framing, and Core boundary discipline as anchors, but it must not modify the PMS-Core pass, redefine PMS operators, alter PMS dependencies, replace derived PMS axes, or treat PMS-EDEN constructs as PMS Base.
    preserved_core_elements:
    - 'PMS operator inventory: Δ, ∇, □, Λ, Α, Ω, Θ, Φ, Χ, Σ, Ψ'
    - PMS repository operator order and dependency hygiene
    - PMS derived structures A, C, R, E, D as derived, not primitive
    - 'PMS application gate: Χ, reversibility, Dignity-in-Practice'
    - PMS non-diagnostic and non-person-ranking discipline
    - PMS non-capture and rival-openness discipline
    - Checked PMS-Core case content unless a separate PMS.yaml inconsistency has been explicitly identified
  pms_v13_and_eden_conformity:
    status: "conformant_overlay_required"
    canonical_operator_spine: "Δ → ∇ → □ → Λ → Α → Ω → Θ → Φ → Χ → Σ → Ψ"
    repository_dependency_order_preserved: true
    no_new_pms_base_operators: true
    no_operator_redefinition: true
    no_dependency_rewrite: true
    no_derived_axis_rewrite: true
    overlay_only: true
    pms_R_axis_preserved: true
    pms_D_axis_preserved: true
    pms_E_strict_action_preserved: true
    eden_responsibility_principle_is_overlay_attribution_rule: true
    eden_constructs_are_not_pms_base: true
    adult_reciprocity_is_not_new_pms_axis: true
    reciprocity_loss_is_not_new_pms_axis: true
    correctability_is_not_new_pms_axis: true
    minimal_recovery_signature_is_not_new_pms_axis: true
    notes:
    - Adult Reciprocity is a PMS-EDEN positive baseline / normative benchmark, not a PMS Base operator or axis.
    - False-Coordinated Real Asymmetry is an EDEN mechanism, not a PMS operator.
    - Action-Power is an EDEN scene-bound attribution handle, not a PMS operator.
    - PFO, Eden scene, reciprocity loss, AEP, switch-family, and related labels are overlay constructs or profiles, not PMS Base.
    - EDEN may sharpen domain visibility but does not prove exhaustive capture.
    - Description does not authorize binding use; application requires additional gating.
  operator_reference:
    source: PMS.yaml
    schema_version: PMS_1.3
    fixed_operator_set:
    - Δ
    - ∇
    - □
    - Λ
    - Α
    - Ω
    - Θ
    - Φ
    - Χ
    - Σ
    - Ψ
    dependency_hygiene_note: Reduced EDEN signatures, formulas, or shortcuts do not alter PMS dependencies. In particular, Χ still presupposes Φ, Θ, and □ within PMS; EDEN uses PMS operators as references, not as redefined constructs.
    no_new_operators: true
    no_dependency_change: true
    no_base_revision: true
  nested_overlay_policy:
    overlays: {}
    no_amplification_overlay: true
    no_base_extension: true
    rule: PMS-EDEN 2.0 constructs, EDEN-MAP fields, profiles, mechanisms, benchmarks, boundaries, falsifiers, and viability signatures organize existing PMS operators only. They do not become PMS operators, PMS axes, PMS dependencies, additional layers, or independent application authority.
  eden_overlay_scope:
    scope_guardrails:
    - Non-metaphysical, non-theological, non-clinical, non-diagnostic.
    - No person-level judgment, no group label, no ideology claim, no sex ranking, no sanction logic.
    - No psychology, motive, intention, trauma, or inner-state inference from EDEN mapping.
    - No moral verdict logic and no application authority from description.
    - Description and application remain firewalled by Χ, reversibility, D, contextual responsibility, affected-role contestation, and independent application authority.
    may_add_visibility_to:
    - Adult Reciprocity as truthful coordination of real Ω
    - False-Coordinated Real Asymmetry
    - real Ω mapping before failure attribution
    - responsibility and Action-Power distribution
    - Σ/Ψ blockage, simulation, externalization, or openness
    - cost distribution under Ω and Θ
    - non-action and non-binding relevance under □/Λ/Ω/Θ
    - immunization, overexposure, and AEP as scene-bound profiles
    - PFO as later regime stabilization where separately supported
    - Reciprocity Loss as erosion of shared correctability
    - counter-scenes, falsifiers, rivals, boundaries, and non-capture
    must_not_do:
    - treat EDEN as PMS Base
    - treat Adult Reciprocity, Action-Power, PFO, AEP, correctability, or Reciprocity Loss as PMS operators or axes
    - start from PFO, Fall, False Comparison, or sex category as master origin
    - use EDEN-MAP as a coercive map against persons, couples, groups, sexes, institutions, or political positions
    - treat non-action as praxis by default or non-binding as avoidance by default
    - treat protection as immunity from R or responsibility as permission to degrade
    - claim full capture, final verdict, diagnosis, prescription, or PMS-Core correction
  checked_addon_gate_import:
    source_record: "checked_addon_recommendation_gate_yaml"
    source_status: "<available | partial | missing>"
    import_rule: >-
      The checked add-on recommendation gate constrains whether EDEN application is reasonable after Core. It records selection context, doubts, non-trigger conditions, and over-application risks. It does not authorize EDEN as a route, verdict, action authority, or closure artifact.
    selected_addon:
      expected_value: "EDEN"
      gate_status: "<selected_addon_recommended | scan_only | not_recommended | rejected_as_over_application | unsafe | unclear>"
      recommendation_summary: "<why EDEN is or is not selected after checked Core>"
    non_trigger_conditions_checked:
    - error_language_not_EDEN_trigger
    - fall_or_defect_language_not_diagnosis
    - sex_or_identity_vocabulary_not_EDEN_trigger
    - asymmetry_not_false_coordination_by_default
    - non_action_not_responsibility_or_avoidance_by_default
    - public_exposure_not_correction_by_default
    - description_not_action_authority
    doubts_to_preserve:
    - <doubt from gate or none>
    required_action_before_or_during_overlay:
    - <revise_core | downgrade_claim | suspend | redirect | human_review | none | unclear>
    over_application_warning: "<state specific EDEN over-application risk or none>"

  eden_application_gate:
    status: "<passed | partial | failed | needs_review | suspended>"
    gate_type: "PMS_application_plus_EDEN_application_requirements"
    applies_to: "EDEN_overlay_application_in_PMS-DISCIPLINE"
    canonical_pms_entry_condition:
      distance_Chi:
        id: "Χ"
        status: "<maintained | partial | compromised | needs_review>"
        case_application: "<how meta-position, stop-capability, and non-verdictive distance are maintained>"
      reversibility:
        id: "reversibility"
        status: "<maintained | partial | compromised | needs_review>"
        case_application: "<how the reading remains scene-bound, revisable, and non-final>"
      dignity_in_practice_D:
        id: "D"
        status: "<maintained | partial | compromised | needs_review>"
        case_application: "<how no shaming, humiliation, person-ranking, sex-ranking, diagnosis, or dignity hierarchy is introduced>"
    eden_application_requirements:
      scene_packet:
        status: "<present | partial | absent | needs_review>"
        note: "<bounded scene packet; not impression or vibe>"
      counter_scene_exposure:
        status: "<present | partial | absent | needs_review>"
        note: "<strongest materially different organization of evidence>"
      contextual_responsibility:
        status: "<present | partial | absent | needs_review>"
        note: "<R tied to structuring effect, legibility, capacity, alternatives, Θ, and Ω cost/exposure>"
      evidentiary_answerability:
        status: "<present | partial | absent | needs_review>"
        note: "<what evidence could narrow, suspend, revise, or defeat the map>"
      affected_role_contestation:
        status: "<available | partial | absent | not_applicable | needs_review>"
        note: "<how affected roles could contest packet, frame, evidence, R trace, or application>"
      independent_application_authority:
        status: "<not_authorized | separately_authorized_and_fully_gated | not_applicable | needs_review>"
        note: "<EDEN-MAP itself gives no authority to confront, bind, intervene, punish, or enforce>"
    invalid_if_any:
    - core_case_rewritten_by_overlay
    - PMS_operator_redefined
    - PMS_derived_axis_redefined
    - EDEN_construct_treated_as_PMS_base
    - EDEN_by_vibe
    - PFO_by_vibe
    - real_Ω_asserted_without_scene_packet
    - false_coordination_claimed_without_real_Ω_displaced_R_and_blocked_or_weakened_or_simulated_or_avoided_or_externalized_Σ_Ψ
    - counter_scene_cannot_change_reading
    - no_falsifier_named
    - description_converted_directly_into_binding_or_obligation
    - responsibility_assigned_without_contextual_conditions
    - non_action_treated_as_praxis_by_default
    - non_binding_treated_as_avoidance_by_default
    - sex_or_person_label_substituted_for_scene_analysis
    - hidden_motive_or_psychology_inferred_from_operator_trace
    - humiliation_or_exposure_used_as_method
    - action_recommendation_or_intervention_protocol_added
    - legal_clinical_forensic_policy_or_HR_conclusion_added
    - D_suspended_for_truth_clarity_efficiency_punishment_or_resolution
  case_meta:
    id: "<eden-addon-case-id>"
    title: "<case title>"
    subtitle: "<optional short subtitle>"
    status: "draft_overlay | final_overlay | needs_review"
    model: PMS-EDEN
    model_schema_version: PMS-EDEN_2.0
    base_schema: PMS_1.3
    file_name: <eden addon case filename>
    authorship:
      originator: T. Zöller
      formalization_assistant: ChatGPT
    purpose: Replace or regenerate only the PMS-EDEN add-on layer for an already checked PMS-Core case.
    source_part_or_chapter: "<Part / chapter if applicable>"
    base_core_case_ref: "<checked PMS-Core case ref>"
    addon: "EDEN"
    output_role: "replace_existing_EDEN_addon_layer_only"
    case_type: "<minimal_scene | contrast_case | myth_correction | legibility_case | trajectory_case>"
    eden_overlay_focus: <false_coordination | responsibility_distribution | reciprocity_loss | counter_scene | non_capture | mixed | other>
    primary_focus:
      construct: "<primary EDEN construct, mechanism, benchmark, protocol step, or test-scene element>"
      yaml_home: "<path in PMS-EDEN.yaml>"
      construct_status: "<eden_mechanism | eden_normative_benchmark | eden_theoretical_compression | overlay_construct | regime_stabilization | application_protocol | boundary_condition | falsifier | scene_bound_profile | viability_signature | paper_internal_shorthand>"
      secondary_constructs:
      - none
      not_a_case_of:
      - none

  case_guardrails:
    non_diagnostic: true
    non_prescriptive: true
    non_verdictive: true
    non_person_labeling: true
    non_sex_ranking: true
    no_hidden_motive_inference: true
    no_psychological_diagnosis: true
    no_therapy_or_intervention_protocol: true
    no_legal_forensic_clinical_policy_or_HR_conclusion: true
    no_action_authorization: true
    no_application_authority_from_description: true
    no_humiliation_or_public_exposure_as_method: true
    description_to_action_firewall: "active"
    validity_gate_reference: "eden_application_gate"
    required_method_conditions:
      canonical_pms_entry_condition:
      - Χ
      - reversibility
      - D
      eden_application_requirements:
      - scene_packet
      - counter_scene_exposure
      - contextual_responsibility
      - evidentiary_answerability
      - affected_role_contestation
      - independent_application_authority
    core_rule: "Map the scene; do not diagnose persons, prescribe action, rank sexes, authorize intervention, or revise PMS-Core."
    invalid_if_any:
    - Χ_suspended_for_clarity_or_urgency
    - reversibility_suspended_for_verdict
    - D_suspended_for_truth_or_efficiency
    - scene_packet_replaced_by_impression
    - counter_scene_cannot_change_reading
    - responsibility_without_scene_conditions
    - description_converted_directly_into_binding
    - person_or_sex_label_substituted_for_scene_analysis
    - Core_layer_rewritten_by_EDEN_overlay
    prohibited_shortcuts:
    - EDEN-by-vibe
    - PFO-by-vibe
    - identity-based_assignment
    - sex-truth_inference
    - personality_inference
    - motive_inference_from_operator_trace
    - description_converted_into_obligation
    - PMS-Core-correction-by-overlay
  example_schema_alignment:
    required_fields_from_PMS_EDEN_CASE_2_0:
      case_schema_version: case_schema_version / mapped to pms_discipline_eden_addon_case_application.case_schema_version
      case_meta: "case_meta"
      guardrails: "case_guardrails"
      vignette: "minimal_vignette"
      scene_packet: "scene_packet"
      pms_operator_trace: "pms_operator_trace"
      eden_map: "eden_map"
      construct_selection: "construct_selection"
      closure: "readable_structural_closure"
    required_eden_map_fields:
    - scene_packet_summary
    - real_omega_mapping
    - dominant_false_coordination_frame
    - responsibility_and_action_power_distribution
    - sigma_psi_status
    - cost_distribution
    - non_action_and_non_binding
    - immunization_overexposure_AEP
    - counter_scene_and_falsifier
    - description_application_status
    - revision_point_or_open_question
    discipline_adapter_fields:
    - overlay_relationship_to_core
    - core_anchor
    - eden_application_gate
    - eden_overlay_integration
    - eden_overlay_quality_control
    discipline_adapter_note: >
      EDEN CASE 2.0 provides the internal field structure. This template adds the checked-Core anchor, replacement-only add-on role, and quality check that the overlay did not become a Core rewrite or standalone application authority.

  example_suite_schema_alignment:
    status: reference_only_embedded_in_eden_addon_application
    source: PMS-EDEN_CASE_2.0 reusable case template
    discipline_case_policy: This template does not generate a standalone PMS-EDEN example-suite artefact unless explicitly requested. The EDEN case template is used as the internal overlay field structure over a checked PMS-Core case.
  paper_structure_map_alignment:
    status: reference_only
    source: PMS-EDEN.yaml.paper_structure_map
    case_application: <state which PMS-EDEN paper-structure regions are materially relevant to this overlay, if useful; do not reproduce the whole paper map in the case output unless requested>
  core_anchor:
    checked_core_case_summary:
      use: "anchor_only_not_rewrite"
      core_scene_boundary: "<reuse the already checked PMS-Core scene boundary>"
      core_primary_operator_profile: "<brief anchor; no new Core derivation>"
      core_relevant_asymmetries:
      - none
      core_relevant_non_events:
      - none
      core_relevant_temporalities:
      - none
      core_boundary_notes:
      - none
    core_to_eden_bridge:
      eden_relevance_trigger: "<why EDEN overlay is relevant here: real Ω, comparison/parity/protection frame, responsibility distribution, non-action/non-binding, recognition/protection, cost distribution, correctability, etc.>"
      what_eden_adds_beyond_core_visibility: "<what becomes domain-salient under PMS-EDEN but was not isolated as EDEN structure in PMS-Core>"
      what_must_remain_core_only: "<Core findings not to be imported as EDEN-specific claims>"

  minimal_vignette:
    scene: >
      <One compact paragraph describing the EDEN-relevant scene mechanism, not merely an end-state. Keep it concrete enough to map role-positions, real Ω, costs, timing, responsibility, non-action/non-binding, Σ/Ψ status, correctability, and possible counter-scenes. Do not over-narrate inner motives, psychology, pathology, moral quality, or sex essence.>
    temporal_boundary: "<where the scene begins, what recurrence/carryover matters, and where the bounded reading ends>"
    roles:
    - id: "role_A"
      label: "<scene-bound role-position, not person type>"
    - id: "role_B"
      label: "<scene-bound role-position, not person type>"
    - id: "field_or_medium"
      label: "<optional medium/institution/audience/category/language field that stabilizes or distributes the scene>"
    surface_description: "<how the scene may initially appear before real Ω, R distribution, costs, Σ/Ψ, and counter-scenes are mapped>"
    eden_question: "<what EDEN-MAP is testing in this case; not advice request>"

  scene_packet:
    specified_scene: "<bounded scene under analysis>"
    role_positions:
      role_A:
        scene_position: "<position in the scene; no person-typing>"
        not_identity: true
      role_B:
        scene_position: "<position in the scene; no person-typing>"
        not_identity: true
      field_or_medium:
        scene_position: "<optional: what the field/medium/language category stabilizes, hides, amplifies, circulates, or makes costly>"
        not_identity: true
        optional: true

    dominant_frame:
      candidate_frame: "<comparison | protection | parity | superiority | recognition | vulnerability | responsibility | non_action_neutrality | non_binding_autonomy | legitimation | authority | mixed | indeterminate>"
      frame_description: "<how the scene becomes legible to participants or observers>"
      frame_status: "<functional | ambiguous | potentially_false_coordination | not_established | indeterminate>"
      false_coordination_boundary: "No frame family is categorically false; false coordination requires real Ω, displaced R, and blocked/weakened/simulated/avoided/externalized Σ/Ψ."

    real_Ω:
      present: "<true | false | indeterminate>"
      summary: "<real asymmetry or reason no consequential Ω is established>"
      dimensions:
