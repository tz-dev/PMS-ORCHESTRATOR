# =============================================================================
#  PMS — PRAXEOLOGICAL META-STRUCTURE
#  REPOSITORY REFERENCE SPECIFICATION
#
#  Repository:
#    https://github.com/tz-dev/Praxeological-Meta-Structure-Theory
#
#  File:
#    PMS.yaml
#
#  Schema Version:
#    PMS_1.3
#
#  Status:
#    repository_reference
#
#  Last Updated:
#    2026-04-06
# =============================================================================
#
#  PURPOSE AND DOCUMENT ROLE
# -----------------------------------------------------------------------------
#  This document records the current repository reference specification of the
#  Praxeological Meta-Structure (PMS).
#
#  PMS is a structural, operator-based meta-model for representing a highly
#  general grammar of praxis. Within the present framework, it proposes eleven
#  systematically ordered meta-axioms (Δ–Ψ) as a generative basis for describing
#  enactment, asymmetry, temporality, recontextualization, distance, integration,
#  and self-binding.
#
#  This file serves as the repository reference for:
#
#    - the eleven PMS meta-axioms (Δ–Ψ),
#    - the default repository order and dependency path,
#    - derived structural axes (A, C, R, E, D),
#    - asymmetry drift patterns,
#    - application guardrails,
#    - repository-level conformity constraints for PMS-based use.
#
#  It is a reference specification and interface layer, not a proof artifact,
#  runtime validator, intervention method, or complete implementation schema.
#
# -----------------------------------------------------------------------------
#  FORMULA AND DERIVATION STATUS
# -----------------------------------------------------------------------------
#  Derived axes, drift patterns, and compact formulas in this file are
#  PMS-internal operator projections. They identify salient operator
#  compositions within the current PMS grammar.
#
#  Unless explicitly marked otherwise, compact formulas do not assert
#  dependency-closed formal proofs or unique derivability in a mathematical
#  sense. They function as structured construct handles within PMS.
#
#  Derived constructs are not independent primitives. They remain dependent on
#  the base operator grammar and may be revised if the base specification is
#  explicitly version-revised.
#
# -----------------------------------------------------------------------------
#  SCOPE AND EXCLUSIONS
# -----------------------------------------------------------------------------
#  PMS is:
#
#    - structural, not phenomenological,
#    - non-psychological,
#    - non-clinical,
#    - non-diagnostic,
#    - non-prescriptive,
#    - non-person-ranking.
#
#  PMS does not provide:
#
#    - therapeutic, clinical, legal, forensic, HR, or policy guidance,
#    - personality typing or mental-state attribution,
#    - moral ranking of persons or groups,
#    - intervention methods or enforcement procedures,
#    - guaranteed direct implementation in software or agent architectures,
#    - proof of explanatory sufficiency across all contexts.
#
#  Dignity-in-Practice (D) is a praxeological constraint on handling asymmetry,
#  not a metaphysical dignity claim or moral ranking of beings.
#
#  Structural maturity does not eliminate tragedy.
#
# -----------------------------------------------------------------------------
#  RELATIONSHIP TO DERIVED MODELS AND PAPERS
# -----------------------------------------------------------------------------
#  Other documents and repositories, including PMS-CONFLICT, PMS-CRITIQUE,
#  PMS-ANTICIPATION, PMS-EDEN, PMS-SEX, PMS-LOGIC, PMS-AXIOM, PMS-STACK,
#  PMS-RUST, PMS-EM, and Maturity-in-Practice, may:
#
#    - depend on PMS,
#    - reference PMS operators,
#    - organize PMS operators into domain-specific lenses,
#    - define overlays, schemas, examples, or application profiles,
#    - propose revisions, alternatives, or rival formalizations.
#
#  Unless the base specification is explicitly version-revised, such documents
#  must not:
#
#    - silently redefine PMS operators,
#    - silently alter the default repository order or dependency path,
#    - introduce new meta-axioms as if they already belonged to base PMS,
#    - present derived axes as fixed canonical primitives,
#    - override PMS application guardrails while claiming unqualified PMS
#      conformity.
#
#  PMS.yaml remains the current repository reference against which PMS-based
#  overlays, papers, and applications are read within this repository version.
#  This governance role does not imply epistemic finality outside that scope.
#
# -----------------------------------------------------------------------------
#  APPLICATION GATE AND SELF-BINDING DISCIPLINE
# -----------------------------------------------------------------------------
#  Any use of PMS as an application presupposes the following structural
#  conditions:
#
#    - Χ (Distance):
#        maintained reflective distance; no fusion into verdict, urgency,
#        enforcement, or person-level attribution.
#
#    - Reversibility:
#        structural readings remain scene-bound, revisable, and non-final;
#        no irreversible labels or global person claims.
#
#    - D (Dignity-in-Practice):
#        enacted restraint under asymmetry; no shaming, ranking, humiliation,
#        or ontological evaluation of persons or groups.
#
#  This gate constrains application only.
#  PMS may be criticized, rejected, revised, or ignored without satisfying it.
#
#  Any application of PMS is itself subject to PMS. Analyses that suspend
#  Distance (Χ), Self-Binding discipline (Ψ), or Dignity-in-Practice (D) in
#  order to enforce truth, clarity, authority, resolution, or action are invalid
#  as PMS applications within the present usage convention, even if PMS
#  terminology is retained.
#
# -----------------------------------------------------------------------------
#  ONTOLOGICAL, NORMATIVE, AND COMPUTATIONAL POSITION
# -----------------------------------------------------------------------------
#  PMS makes no claims about consciousness, qualia, inner experience, moral
#  worth, or ontological dignity.
#
#  Representing PMS in YAML does not by itself secure direct implementability,
#  interoperability, explanatory adequacy across architectures, or validation of
#  PMS as a theory. Operational use remains dependent on calibration,
#  implementation constraints, empirical testing where applicable, and external
#  accountability.
#
#  PMS can be misapplied, misunderstood, criticized, revised, or rejected. It is
#  structurally betrayed when its language is retained while its self-binding
#  requirements are abandoned.
#
# =============================================================================

pms_entry_condition:
  requirement: >
    Any use of PMS as an application presupposes acceptance of distance (Χ),
    reversibility, and dignity-in-practice (D; a praxeological constraint, not
    ontological worth). This condition applies to application, not to critique,
    refusal, revision, or rejection. Applications that suspend these
    conditions are formally invalid as PMS applications within the present
    usage convention.
  applies_to: "application_only"
  does_not_apply_to:
    - critique
    - refusal
    - rejection
    - revision_proposals
    - rival_formalization

schema_version: "PMS_1.3"

schema_meta:
  model_name: "Praxeological Meta-Structure"
  model_short: "PMS"
  status: "repository_reference"
  maturity: "draft"
  repository_role: "current_base_schema"
  epistemic_status: >
    This specification records the current repository reference representation
    of PMS. It is intended to be strong, formally disciplined, and portable,
    but not final, complete, uniquely ordered, or immune to revision.
  last_updated: "2026-04-06"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT (GPT-5.4 Thinking)"
      role: "formalization_assistant"
  description: >
    PMS (Praxeological Meta-Structure) is a generative operator framework for
    modeling praxis, asymmetry, development, integration, and self-binding. It
    proposes eleven systematically ordered meta-axioms (Δ–Ψ) as a minimal
    generative basis within the present framework and specifies how complex
    structures such as awareness, coherence, responsibility, action,
    dignity-in-practice, and asymmetry drift patterns can be systematically
    derived through operator compositions. PMS is a structural,
    non-phenomenological, non-psychological, and non-clinical meta-model.
    Other models or overlays may be derived from PMS, compared to PMS, or
    proposed as rivals, but are not part of this base specification unless
    explicitly versioned into it.
  intended_use:
    summary: >
      PMS is a theoretical and formal meta-model for representing the operator
      grammar of praxis in a machine-readable way under calibration-dependent
      implementation constraints.
    allowed_profiles:
      - theoretical_reflection
      - structural_action_theory
      - anthropology_and_praxeology
      - systems_theory
      - ai_architecture_and_safety
      - model_documentation_and_specification
      - simulation_scaffolding
      - structural_reasoning
    not_intended_for:
      - clinical_diagnosis
      - personality_typing
      - mental_health_risk_assessment
      - automated_moral_judgement
      - individual_person_evaluation
      - forensic_decision_making
      - policy_enforcement
      - irreversible_labeling
  normative_position:
    ontology: >
      PMS is non-physical, non-metaphysical, and non-psychological. It does not
      make claims about consciousness, qualia, or inner experience. It
      formalizes structural conditions of praxis, not mental states.
    dignity_clause: >
      PMS never evaluates ontological dignity. Dignity-in-practice (D) is a
      praxeological parameter concerning enacted restraint and protection in
      asymmetry, not a metaphysical ranking of beings.
    tragedy_clause: >
      Structural maturity and responsibility do not eliminate tragedy. PMS makes
      explicit how asymmetry, non-event, and temporality can create unavoidable
      tragic tensions in praxis.
    self_binding_clause: >
      Any application of PMS is itself subject to PMS. Analyses that suspend
      distance (Χ), self-binding discipline (Ψ), or dignity-in-practice (D) in
      order to enforce truth, clarity, urgency, or asymmetry violate the
      model's own application conditions. PMS may be criticized, revised,
      rejected, or misapplied, but its self-binding discipline still governs
      uses that claim to apply PMS.
  computational_position:
    representation_clause: >
      YAML represents PMS in computational form as a formal encoding of the
      proposed grammar. It should not be confused with a direct implementation
      of praxis itself.
    calibration_clause: >
      Any operational use of PMS representations requires architecture-specific
      calibration, implementation constraints, and context-sensitive judgment.
    accountability_clause: >
      Formal translation into PMS terms does not by itself guarantee public
      intelligibility, intersubjective uptake, empirical adequacy, or external
      accountability.
    rivalry_clause: >
      Machine-readable representation does not settle whether PMS is more
      discriminating than rival grammars or simply more assimilative across
      heterogeneous cases.
  terminology:
    praxis: >
      Situated, meaningful action under asymmetry, constraints, expectations,
      temporal extension, and self-interpretation. Praxis is modeled
      structurally via operator compositions, not via subjective experience.
    meta_axiom: >
      A structurally basic operator within PMS (Δ–Ψ), treated as non-derivative
      at its own level of description and participating in the generative
      grammar of praxis.
    operator_composition: >
      Ordered or structured application of meta-axioms to generate complex
      praxeological formations such as patterns, roles, trajectories,
      integration, and self-binding.
    derived_construct: >
      A higher-order construct that is systematically derived within PMS from
      operator compositions and is therefore not introduced as an independent
      primitive.
    asymmetry_drift_pattern: >
      A structurally derived distortion pattern within PMS arising where
      asymmetry (Ω) is stabilized through attractor formation (Α) and
      recontextualized (Φ) in ways that reinforce drift rather than support
      integrative transformation. Such patterns are not person-types, clinical
      categories, or ontological attributions.
    repository_reference: >
      The current baseline specification used within this repository. This role
      governs local versioning and overlays, but does not by itself imply
      epistemic finality.

repository_governance:
  role_of_this_file: >
    PMS.yaml is the current repository reference specification for the PMS base
    schema. It records the default operator inventory, dependency path, derived
    constructs, and application guardrails used across this repository version.
  overlays_may:
    - depend_on_pms
    - reference_pms_operators
    - define_domain_specific_lenses
    - define_application_schemas
    - propose_revisions_or_rival_formalizations
  overlays_should_not_without_explicit_versioned_revision:
    - silently_redefine_meta_axioms
    - silently_alter_default_operator_order
    - silently_alter_default_dependency_path
    - present_new_meta_axioms_as_if_already_in_base_pms
    - treat_derived_axes_as_independent_primitives
    - override_application_guardrails_while_claiming_full_pms_conformity
  note: >
    These repository rules preserve local coherence of the base specification.
    They do not claim that PMS is complete, uniquely ordered, or beyond
    criticism outside the repository's own versioning discipline.

core_principles:
  - id: "P1"
    title: "Praxeological focus"
    text: >
      PMS analyzes enactments, roles, and structures of praxis. It does not
      analyze persons as ontological entities or psychological essences.
  - id: "P2"
    title: "Proposed operator minimality"
    text: >
      The eleven meta-axioms (Δ–Ψ) are treated within PMS as a proposed minimal
      generative basis for praxis. Whether they are fully complete, optimally
      minimal, or uniquely ordered remains open to further formalization and
      critique.
  - id: "P3"
    title: "Generativity"
    text: >
      PMS is generative: a wide range of praxis structures such as awareness,
      coherence, responsibility, action, dignity-in-practice, and asymmetry
      drift patterns can be systematically derived within PMS from operator
      compositions rather than introduced as independent primitives.
  - id: "P4"
    title: "Temporal and asymmetry awareness"
    text: >
      Asymmetry (Ω) and temporality (Θ) are treated as central structural
      operators. Responsibility, maturity, and dignity-in-practice are analyzed
      under temporal and asymmetrical conditions rather than as static
      attributes.
  - id: "P5"
    title: "Computational boundedness"
    text: >
      PMS may be represented computationally, but representation does not by
      itself imply direct implementation, guaranteed interoperability, or
      explanatory adequacy. Operational use requires calibration, constraints,
      and evaluation.
  - id: "P6"
    title: "Rival openness"
    text: >
      PMS is not treated as exempt from rivalry. Comparison with alternative
      grammars, sharper discriminative models, or more empirically grounded
      formalisms remains methodologically open.
  - id: "P7"
    title: "Non-capture openness"
    text: >
      Translation of a phenomenon into PMS terms does not by itself prove
      exhaustive capture. Some forms of praxis may remain only partially
      legible or may resist assimilation within the current grammar.
  - id: "P8"
    title: "Non-diagnostic use"
    text: >
      PMS is not a diagnostic tool and must not be used for individual
      clinical, therapeutic, forensic, or person-ranking decisions.
  - id: "P9"
    title: "Scenic, context-bound interpretation"
    text: >
      Any application of PMS must keep findings tied to specific praxeological
      scenes, roles, and structures. Global person-labels and irreversible
      ontological attributions are out of scope.

pms_model_reference:
  ordering_status:
    interpretation: >
      The order below records one systematically motivated dependency path used
      in the current repository reference. It should not be read as the only
      possible formal ordering; alternative orderings, revised dependencies, or
      additional operators may prove equally or more productive under future
      formalization strategies.
    repository_role: >
      Within this repository version, overlays and derived schemas should treat
      the listed order and dependencies as the default reference path unless an
      explicit versioned revision states otherwise.

  meta_axioms:
    - id: "Δ"
      name: "Difference"
      order: 1
      definition: "Minimal structural distinction enabling differentiation."
      depends_on: []
      provides:
        - "boundary_formation"
        - "object_differentiation"
        - "structural_contrast"
      examples:
        - "self vs. other"
        - "inside vs. outside a role"
        - "allowed vs. forbidden action"
      status_within_pms: "treated_as_structurally_basic"

    - id: "∇"
      name: "Impulse"
      order: 2
      definition: "Directional tension or drive arising from difference."
      depends_on: ["Δ"]
      provides:
        - "activation"
        - "orientation"
        - "energetic_gradient"
        - "proto_agency"
      examples:
        - "desire triggered by perceived lack"
        - "urge to correct an imbalance"
        - "movement toward or away from a signal"
      status_within_pms: "treated_as_structurally_basic"

    - id: "□"
      name: "Frame"
      order: 3
      definition: "Contextual structure that constrains and shapes impulses."
      depends_on: ["Δ", "∇"]
      provides:
        - "context"
        - "boundary_conditions"
        - "relevance_structuring"
        - "role_space"
      examples:
        - "institutional rules"
        - "family role expectations"
        - "conversation context"
      status_within_pms: "treated_as_structurally_basic"

    - id: "Λ"
      name: "Non-Event"
      order: 4
      definition: "Structured absence: meaningful failure or delay of an expected occurrence within a frame."
      depends_on: ["□"]
      provides:
        - "expectation"
        - "counterfactual_structure"
        - "tension_through_absence"
      examples:
        - "a promised reply that never arrives"
        - "silence where a response is expected"
        - "postponed decision that reshapes the situation"
      status_within_pms: "treated_as_structurally_basic"

    - id: "Α"
      name: "Attractor"
      order: 5
      definition: "Recurrent pattern or stabilization emerging from repeated structural interaction."
      depends_on: ["Δ", "∇", "□", "Λ"]
      provides:
        - "pattern_formation"
        - "stability"
        - "path_dependence"
        - "role_script_emergence"
      examples:
        - "repeated avoidance of conflict"
        - "reliable punctuality"
        - "stable institutional routine"
      status_within_pms: "treated_as_structurally_basic"

    - id: "Ω"
      name: "Asymmetry"
      order: 6
      definition: "Structural imbalance establishing directionality of power, exposure, capacity, or obligation."
      depends_on: ["Α"]
      provides:
        - "role_differentiation"
        - "responsibility_gradients"
        - "vulnerability_structures"
      examples:
        - "parent-child relation"
        - "mentor-apprentice dynamics"
        - "leader-follower position"
      status_within_pms: "treated_as_structurally_basic"

    - id: "Θ"
      name: "Temporality"
      order: 7
      definition: "Temporal structuring that enables trajectories, commitments, development, and longer-form self-relation."
      depends_on: ["Ω", "Α"]
      provides:
        - "sequence_and_trajectory"
        - "persistence"
        - "anticipation_and_delay"
        - "developmental_arcs"
      examples:
        - "long-term responsibility"
        - "accumulating consequences"
        - "ongoing development of a role"
      status_within_pms: "treated_as_structurally_basic"

    - id: "Φ"
      name: "Recontextualization"
      order: 8
      definition: "Transformation through placing an existing structure into a new frame."
      depends_on: ["Θ", "Ω", "□"]
      provides:
        - "adaptation"
        - "reinterpretation"
        - "developmental_change"
        - "pattern_shift"
      examples:
        - "reframing conflict as misunderstanding"
        - "seeing a failure as a learning step"
        - "renegotiating role expectations"
      status_within_pms: "treated_as_structurally_basic"

    - id: "Χ"
      name: "Distance"
      order: 9
      definition: "Reflective withdrawal that attenuates immediate impulses and patterns."
      depends_on: ["Φ", "Θ", "□"]
      provides:
        - "regulation"
        - "inhibition"
        - "reflection_and_meta_position"
      examples:
        - "pausing before reacting"
        - "stepping out of a role to reflect"
        - "deliberately suspending a habitual script"
      status_within_pms: "treated_as_structurally_basic"

    - id: "Σ"
      name: "Integration"
      order: 10
      definition: "Synthesis of disparate or conflicting elements into a more coherent whole."
      depends_on: ["Χ", "Φ"]
      provides:
        - "coherence"
        - "resolution_of_contradiction"
        - "multi_level_coordination"
        - "maturity_of_praxis"
      examples:
        - "aligning motives and roles"
        - "integrating emotional impulse and norm"
        - "forming a coherent action plan"
      status_within_pms: "treated_as_structurally_basic"

    - id: "Ψ"
      name: "Self-Binding"
      order: 11
      definition: "Formation of self-relation through commitment to integrated structures across time."
      depends_on: ["Σ", "Θ", "Χ"]
      provides:
        - "self_model"
        - "responsibility_as_self_commitment"
        - "stable_normativity"
        - "autobiographical_coherence"
      examples:
        - "holding oneself accountable"
        - "owning a caregiving role"
        - "long-term identity commitments and promises"
      status_within_pms: "treated_as_structurally_basic"

  operator_layers:
    - id: "L1"
      name: "Early structural patterning"
      description: >
        Base layer of structural operations that create distinctions, impulses,
        frames, non-events, and recurrent patterns.
      contains: ["Δ", "∇", "□", "Λ", "Α"]

    - id: "L2"
      name: "Relational asymmetry and temporality"
      description: >
        Layer in which stabilized patterns become asymmetric relations and are
        temporally extended into trajectories and commitments.
      contains: ["Ω", "Θ"]

    - id: "L3"
      name: "Meta-structural reflexivity"
      description: >
        Layer of transformation, distancing, and integration that enables
        adaptive learning and more mature forms of praxis.
      contains: ["Φ", "Χ", "Σ"]

    - id: "L4"
      name: "Higher-order self-binding"
      description: >
        Layer in which integrated structures are bound into a relatively stable
        self-relation maintained across time and contexts.
      contains: ["Ψ"]

  dependency_table:
    - axiom: "Δ"
      order: 1
      depends_on: []
      provides:
        - "initial_condition_for_structured_differentiation"

    - axiom: "∇"
      order: 2
      depends_on: ["Δ"]
      provides:
        - "directed_activation"

    - axiom: "□"
      order: 3
      depends_on: ["Δ", "∇"]
      provides:
        - "context_and_role_space"

    - axiom: "Λ"
      order: 4
      depends_on: ["□"]
      provides:
        - "meaningful_absence_and_expectation"

    - axiom: "Α"
      order: 5
      depends_on: ["Δ", "∇", "□", "Λ"]
      provides:
        - "recurrent_patterns"

    - axiom: "Ω"
      order: 6
      depends_on: ["Α"]
      provides:
        - "asymmetric_roles_and_responsibility_gradients"

    - axiom: "Θ"
      order: 7
      depends_on: ["Ω", "Α"]
      provides:
        - "temporal_trajectories"

    - axiom: "Φ"
      order: 8
      depends_on: ["Θ", "Ω", "□"]
      provides:
        - "reframing_and_adaptation"

    - axiom: "Χ"
      order: 9
      depends_on: ["Φ", "Θ", "□"]
      provides:
        - "reflexive_distance"

    - axiom: "Σ"
      order: 10
      depends_on: ["Χ", "Φ"]
      provides:
        - "integration_and_higher_order_coherence"

    - axiom: "Ψ"
      order: 11
      depends_on: ["Σ", "Θ", "Χ"]
      provides:
        - "self_binding_and_structured_self_relation"

derived_structures:
  status_note: >
    The constructs below are systematically derived within PMS. They are not
    treated here as independent primitives, but neither are they claimed to be
    the only possible higher-order constructs derivable from the grammar.

  derived_axes:
    Awareness_A:
      symbol: "A"
      formula: ["Θ", "□", "Δ"]
      description: "Sustained, framed differentiation across time."
      generative_reasoning:
        - "Δ enables distinctions in the field."
        - "□ frames distinctions as situationally relevant."
        - "Θ maintains these framed distinctions over time."
      notes: >
        Awareness is modeled structurally, not phenomenologically. Within PMS
        it can be systematically derived from this operator sequence, but this
        does not imply that all notions of awareness are exhausted by it.

    Coherence_C:
      symbol: "C"
      formula: ["Θ", "Λ", "□", "∇"]
      description: "Temporally stabilized structuring of impulse and expectation within a frame."
      generative_reasoning:
        - "∇ introduces directional impulse."
        - "□ constrains and structures the impulse."
        - "Λ encodes expectations and meaningful non-events."
        - "Θ temporalizes the configuration into trajectories."
      notes: >
        Coherence captures narrative stability of action, including meaningful
        absences and delays, without yet requiring full integration or
        self-binding. Rival theories may formalize coherence differently.

    Responsibility_R:
      symbol: "R"
      formula: ["Ψ", "Φ", "Θ", "Ω"]
      description: "Self-binding orientation toward asymmetry extended across time and recontextualization."
      generative_reasoning:
        - "Ω creates structural imbalance in exposure, capacity, or obligation."
        - "Θ extends this imbalance into enduring commitments."
        - "Φ allows reinterpretation of obligations under changing conditions."
        - "Ψ binds the agent to these obligations as part of its self-relation."
      notes: >
        Responsibility is structural rather than moralistic in this
        specification. It is formally derived within PMS, not asserted as the
        only valid theory of responsibility.

    Action_E:
      symbol: "E"
      formula: ["Σ", "Θ", "∇"]
      description: "Integrated realization of directedness across time."
      generative_reasoning:
        - "∇ provides energetic directedness."
        - "Θ structures this directedness as a trajectory rather than a momentary reaction."
        - "Σ integrates conflicting impulses, constraints, and roles into a coherent enactment."
      notes: >
        Action here is not any behavior; it is integrated and temporally
        extended. Higher operators such as Ω, Φ, and Ψ may enrich it, but are
        not required for its minimal structural definition within PMS.

    Dignity_in_Practice_D:
      symbol: "D"
      formula: ["Ψ", "Χ", "Ω"]
      description: "Self-bound reflective restraint and protection in asymmetrical relations."
      generative_reasoning:
        - "Ω foregrounds vulnerability and directional power."
        - "Χ introduces reflective distance and inhibition of destructive impulses."
        - "Ψ binds the agent to norms that protect standing under asymmetry."
      notes: >
        Dignity-in-practice is a structural stance in action. It concerns how
        asymmetry is handled, not the ranking of persons or ontological worth.

  self_model:
    id: "SELF_FIXPOINT"
    formula_sequence: ["Ψ", "Σ", "Χ", "Φ", "Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
    chain_formula: "Ψ ∘ Σ ∘ Χ ∘ Φ ∘ Θ ∘ Ω ∘ Α ∘ Λ ∘ □ ∘ ∇ ∘ Δ"
    description: >
      Formal representation of self-binding as the result of integrated,
      reflexively modulated, temporally extended, asymmetry-aware patterns of
      praxis being bound into a relatively stable self-relation.
    interpretation_note: >
      This sequence records one derivational strategy within PMS. It should not
      be read as proving that all forms of selfhood reduce without remainder to
      this exact chain.
    implications:
      - "Within PMS, selfhood can be modeled as the result of structured praxis rather than its origin."
      - "Identity is represented as relatively stable self-binding to integrated trajectories."
      - "No phenomenological or metaphysical claims about subjectivity are implied."

  asymmetry_drift_patterns:
    AD_A_much_greater_E:
      code: "AD_A>>E"
      name: "Excessive Distance between Awareness and Enactment"
      structural_basis:
        formula: ["Φ", "Α", "Ω"]
        description: >
          Evaluative or power asymmetry becomes stabilized through attractor
          formation, while recontextualization reinforces drift toward
          evaluation rather than supporting integrative transformation and
          balanced enactment.
      generative_mechanism:
        - "Ω: evaluative or positional asymmetry becomes structurally salient."
        - "Α: the asymmetry stabilizes into recurrent evaluative patterning."
        - "Φ: recontextualization reinforces drift toward evaluative framing rather than restoring balance or integration."
      axis_effects:
        awareness_axis: "over_expanded"
        action_axis: "suppressed_or_chronically_delayed"
        notes: >
          Structurally, evaluative space inflates while Σ ∘ Θ ∘ ∇ (E) remains
          under-developed or inhibited. AD_A>>E is an asymmetry drift pattern
          within PMS, not a personality trait or clinical label.
      status_note: >
        This is a theoretically derived asymmetry drift pattern within PMS. It
        remains open to refinement, calibration, and comparison with rival
        explanatory models.

    AD_under_integration:
      code: "AD_Sigma_low"
      name: "Fragmented integration"
      structural_basis:
        primary_tension: ["Φ", "Σ"]
        condition: "recontextualization_outpaces_integration"
        description: >
          Frequent recontextualization without sufficient integration leads to
          unstable trajectories and weak coherence of praxis. This pattern
          belongs to the family of asymmetry drift patterns within PMS,
          especially where unstable recontextualization and weak integration
          unfold under asymmetrically loaded praxis conditions.
      generative_mechanism:
        - "Φ: frames are frequently shifted or updated in ways that destabilize continuity."
        - "Σ: integration fails to consolidate multiple perspectives and impulses into coherent enactment."
      axis_effects:
        coherence_axis: "volatile"
        responsibility_axis: "inconsistent"
        notes: >
          This pattern describes structural volatility in action forms, not a
          clinical state. It may appear as chronic reframing without
          consolidation and is treated here as a derived asymmetry drift
          pattern within PMS.
      status_note: >
        This pattern belongs to the family of asymmetry drift patterns within
        PMS. Although Ω is not explicitly included in the minimal tension
        formula, the pattern becomes especially relevant where unstable
        recontextualization and weak integration unfold under asymmetrically
        loaded praxis conditions. It is proposed for structural analysis rather
        than exhaustive taxonomy.

example_operator_chains:
  note: >
    The chains below document default repository sequences for structured
    derivation within PMS. They should not be read as the only possible formal
    pathways for the relevant phenomena.

  minimal_praxis:
    formula: ["□", "∇", "Δ"]
    description: "A frame constrains an impulse that arises from a difference."

  pattern_formation:
    formula: ["Α", "Λ", "□", "∇", "Δ"]
    description: "Attractor formation via repeated framed impulses and non-events."

  asymmetry_emergence:
    formula: ["Ω", "Α", "Λ", "□", "∇", "Δ"]
    description: "Asymmetrical roles emerging from stabilized patterns."

  developmental_trajectory:
    formula: ["Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
    description: "Temporal extension of asymmetric patterns into trajectories."

  reflexive_praxis:
    formula: ["Σ", "Χ", "Φ", "Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
    description: "Reflexively integrated praxis with distance, recontextualization, and integration."

  self_binding_chain:
    formula: ["Ψ", "Σ", "Χ", "Φ", "Θ", "Ω", "Α", "Λ", "□", "∇", "Δ"]
    description: "Default repository chain for self-binding as structured self-relation."

computational_representation:
  file_role: "formal_basis_for_computational_representation"
  representation_scope: >
    PMS.yaml encodes the proposed operator grammar of PMS in a machine-readable
    format so that software, simulations, and analytical tools may load,
    inspect, validate, or operate on it under architecture-specific
    calibration and implementation constraints.
  supports:
    - machine_readable_loading
    - dependency_reasoning
    - operator_chain_validation
    - simulation_scaffolding
    - structural_analysis
    - agent_architecture_modeling
    - export_to_json_xml_graphviz
    - meta_theoretical_inspection
  does_not_guarantee:
    - direct_implementation_of_praxis
    - interoperability_across_architectures
    - explanatory_sufficiency
    - empirical_adequacy_without_testing
    - exhaustive_capture_of_modes_of_praxis
  requirements_for_operational_use:
    - architecture_specific_calibration
    - implementation_constraints
    - empirical_testing_where_applicable
    - external_evaluation
    - context_sensitive_interpretation
    - public_accountability_in_contexts_of_use
  note: >
    Formal translation into YAML makes PMS inspectable and portable, but it does
    not by itself demonstrate that the resulting representation is complete,
    final, directly implementable, or necessarily more discriminating than
    rival formal schemas.

ai_interface_pms:
  welcome_message: |
    This system uses the Praxeological Meta-Structure (PMS) model.
    PMS represents praxis as compositions of eleven structural operators (Δ–Ψ).
    The model is non-psychological and non-diagnostic. It analyzes enactments,
    roles, patterns, asymmetries, and trajectories on a structural level.
    This YAML file is a formal representation of PMS, not by itself a proof of
    direct implementation, exhaustive capture, or subjective experience.

  modes:
    - id: "axiomatic"
      title: "Axiomatic / theory mode"
      description: "Explain, inspect, or derive structures at the level of Δ–Ψ and their compositions."

    - id: "derived_axes_inspection"
      title: "Derived axes mode"
      description: "Map PMS structures to the five derived axes (A, C, R, E, D) without individual diagnosis."

    - id: "ai_architecture"
      title: "AI architecture mode"
      description: "Use PMS operators as conceptual building blocks for agent design and safety without anthropomorphizing."

  guardrails:
    general:
      - "Do not infer mental states, traits, or diagnoses from PMS descriptions."
      - "Keep all findings tied to structures of praxis, not to ontological claims about persons."
      - "Treat asymmetry (Ω) as a structural fact, not as moral judgement."
      - "Do not use PMS to rank or compare human beings."
      - "Do not treat translation into PMS terms as proof of exhaustive capture."
      - "Do not treat absence of rival models, or lack of current comparison, as proof of completeness."
      - "Any use of PMS that frames resistance, disagreement, or non-alignment as immaturity per se constitutes a misuse of the model."
      - "Truth claims articulated through PMS must not be operationalized without maintaining reversibility, distance (Χ), dignity-in-practice (D), and external accountability."
      - "Public-facing use should preserve intelligibility, revisability, and scene-bounded interpretation."

    ai_specific:
      - "PMS operators may be used as abstract modules, not as evidence of subjective experience."
      - "Encoding PMS in YAML does not by itself implement praxis or selfhood."
      - "Self-binding (Ψ) in artificial systems refers to policy and constraint stability, not to consciousness."
      - "Any deployment requires architecture-specific calibration, implementation constraints, and evaluation."
      - "Always maintain a distinction between structural agency models and real human vulnerability."

  suggested_questions:
    - "What structural operators are involved in this pattern of praxis?"
    - "Which asymmetries (Ω) and temporal trajectories (Θ) are visible?"
    - "Where do recontextualization (Φ), distance (Χ), and integration (Σ) appear or fail?"
    - "How would this configuration project onto the derived axes (Awareness, Coherence, Responsibility, Action, Dignity-in-Practice)?"
    - "Which parts of this reading remain tentative, calibration-dependent, or open to rival interpretation?"
