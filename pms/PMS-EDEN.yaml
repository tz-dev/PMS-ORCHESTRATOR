# =============================================================================
#  PMS-EDEN — PAPER-SPECIFIC APPLICATION SCHEMA (OVERLAY)
#
#  Repository:
#    https://github.com/tz-dev/PMS-EDEN
#
#  File:
#    PMS-EDEN.yaml
#
#  Schema Version:
#    PMS-EDEN_2.0
#
#  Status:
#    working production version
#
#  Last Updated:
#    2026-06-24
# -----------------------------------------------------------------------------
#  PURPOSE AND STATUS
# -----------------------------------------------------------------------------
#  This document defines the paper-specific APPLICATION SCHEMA for
#  PMS-EDEN V2. It formalizes the theoretical arguments of the accompanying
#  paper
#
#    "PMS-EDEN — A Praxeological Grammar of Adult Reciprocity and Its Loss
#     through False-Coordinated Real Asymmetry"
#
#  in a machine-readable, structurally constrained form.
#
#  This schema is an OVERLAY, not a fork, replacement, or extension of PMS.
#  It remains strictly subordinate to the canonical PMS repository reference
#  specification (schema_version: PMS_1.3).
#
#  PMS-EDEN introduces no operator, meta-axiom, dependency relation, or
#  derived PMS axis. EDEN-specific mechanisms, benchmarks, profiles, regime
#  labels, shorthand terms, viability signatures, and mapping protocols remain
#  overlay-level constructs.
# -----------------------------------------------------------------------------
#  RELATIONSHIP TO PMS (NON-NEGOTIABLE CONSTRAINTS)
# -----------------------------------------------------------------------------
#  - All PMS operators (Δ–Ψ) retain exactly the meanings defined in PMS.yaml.
#  - Canonical operator order and dependency hygiene remain unchanged.
#  - Canonical derived axes A, C, R, E, and D remain unchanged.
#  - R remains the PMS-derived Responsibility axis; EDEN's Responsibility
#    Principle is a separate paper-level attribution rule.
#  - D remains the PMS-derived Dignity-in-Practice axis; EDEN explicitly adopts
#    preservation of D as a normative benchmark and application condition.
#  - Strict Action / Enactment remains E = Σ ∘ Θ ∘ ∇.
#  - Paper-internal shorthand such as NRK is not a PMS operator or axis.
#  - Theoretical compressions such as Adult Reciprocity, Reciprocity Loss,
#    Correctability, and the Minimal Recovery Signature are not new PMS axes.
# -----------------------------------------------------------------------------
#  APPLICATION STATUS
# -----------------------------------------------------------------------------
#  EDEN is structural, scene-bound, non-psychological, non-clinical,
#  non-diagnostic, non-prescriptive, and non-person-evaluative.
#
#  EDEN may describe structural configurations sharply. Description alone does
#  not authorize binding use. Any use that steers, obligates, confronts,
#  accuses, prescribes, intervenes, punishes, or enforces is an APPLICATION and
#  must satisfy the canonical PMS entry condition plus EDEN's additional
#  scene, counter-scene, evidentiary, and contextual-responsibility conditions.
# =============================================================================

schema_version: "PMS-EDEN_2.0"

schema_meta:
  model_name: "PMS-EDEN V2"
  model_short: "PMS-EDEN"
  status: "working_production"
  repository_role: "paper_specific_overlay"
  last_updated: "2026-06-24"
  authors:
    - {name: "T. Zöller", role: "originator"}
    - {name: "ChatGPT (GPT-5.5 Thinking)", role: "formalization_assistant"}
  paper:
    title: "PMS-EDEN"
    subtitle: "A Praxeological Grammar of Adult Reciprocity and Its Loss through False-Coordinated Real Asymmetry"
    version_family: "V2"
    source_status: "complete"
  depends_on:
    model_name: "Praxeological Meta-Structure"
    model_short: "PMS"
    schema_version: "PMS_1.3"
    canonical_file: "PMS.yaml"
    repository_relative_path: "PMS.yaml"
    pinning: {schema_version: "PMS_1.3", commit: null}
  description: >
    Paper-specific PMS overlay for Adult Reciprocity as truthful coordination
    of real Ω and Reciprocity Loss as false coordination of real Ω. It maps
    scene-bound responsibility, integration, self-binding, distance, dignity,
    non-events, temporality, drift, and correctability without redefining PMS
    or enabling diagnosis, sex ranking, prescription, or verdict.
  epistemic_status: >
    Theoretical praxeological reconstruction; no independent prevalence,
    recurrence, population, causal-universality, natural-law, or sex-truth
    claim. Scene application remains evidential, revisable, and falsifiable.
  methodological_restraint: >
    Translation into EDEN terms does not prove exhaustive capture. Genuine
    vulnerability, protection, hierarchy, local superiority, non-action,
    openness, neutrality, coercion, institutional/material pressure,
    psychological or trauma conditions, and stronger rivals remain possible.

operator_reference:
  source: "PMS.yaml"
  schema_version: "PMS_1.3"
  status: "pms_operator_reference"
  fixed_set: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
  fixed_order: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
  dependencies:
    "Δ": []
    "∇": ["Δ"]
    "□": ["Δ", "∇"]
    "Λ": ["□"]
    "Α": ["Δ", "∇", "□", "Λ"]
    "Ω": ["Α"]
    "Θ": ["Ω", "Α"]
    "Φ": ["Θ", "Ω", "□"]
    "Χ": ["Φ", "Θ", "□"]
    "Σ": ["Χ", "Φ"]
    "Ψ": ["Σ", "Θ", "Χ"]
  semantic_invariants:
    "Δ": "Difference; not rank."
    "∇": "Directional impulse; not completed action."
    "□": "Contextual frame; not proof of falsehood."
    "Λ": "Structured absence within □; not mere absence."
    "Α": "Recurrent attractor/stabilization; not an EDEN protocol."
    "Ω": "Structural asymmetry; not inferiority, guilt, or domination by definition."
    "Θ": "Temporal trajectory; not unsupported chronology."
    "Φ": "Recontextualization; not inferred motive or deception."
    "Χ": "Reflective distance/inhibition; not truth authority."
    "Σ": "Integration; not agreement, peace, legitimation, or continuation."
    "Ψ": "Self-binding; not obedience, confession, guilt, or imposed binding."
  overlay_rule: "EDEN formulas and traces are overlay shorthand, never alternative PMS dependencies."
  prohibited_changes: [redefine_any_pms_operator, add_meta_axioms, alter_canonical_operator_order, alter_canonical_dependencies, promote_overlay_constructs_to_pms_operators, promote_eden_benchmarks_to_pms_derived_axes, treat_reduced_signatures_as_alternative_dependency_paths]

derived_axes_reference:
  source: "PMS.yaml"
  status: "canonical_pms_derived_constructs"
  fixed_axes:
    A: {name: "Awareness", formula: ["Θ", "□", "Δ"], chain_formula: "Θ ∘ □ ∘ Δ"}
    C: {name: "Coherence", formula: ["Θ", "Λ", "□", "∇"], chain_formula: "Θ ∘ Λ ∘ □ ∘ ∇"}
    R:
      name: "Responsibility"
      formula: ["Ψ", "Φ", "Θ", "Ω"]
      chain_formula: "Ψ ∘ Φ ∘ Θ ∘ Ω"
      eden_note: "EDEN's normative Responsibility Principle does not redefine or follow automatically from R."
    E:
      name: "Strict Action / Enactment"
      formula: ["Σ", "Θ", "∇"]
      chain_formula: "Σ ∘ Θ ∘ ∇"
      eden_note: "Praxis is broader; scene relevance does not automatically establish E."
    D:
      name: "Dignity-in-Practice"
      formula: ["Ψ", "Χ", "Ω"]
      chain_formula: "Ψ ∘ Χ ∘ Ω"
      eden_note: "EDEN adopts preservation of D as benchmark/application condition without redefining D."
  mutation_policy: "forbidden_without_versioned_revision_of_base_pms"

construct_status_registry:
  purpose: "Keep PMS primitives/axes distinct from EDEN benchmarks, compressions, mechanisms, profiles, labels, boundaries, and protocols."
  aliases: {normative_benchmark: "eden_normative_benchmark"}
  statuses:
    pms_operator_reference: {meaning: "Fixed PMS operator reference.", may_modify_pms: false}
    pms_derived_axis_reference: {meaning: "Canonical PMS-derived axis reference.", may_modify_pms: false}
    eden_normative_benchmark: {meaning: "Explicit EDEN standard; not PMS-derived natural law.", may_modify_pms: false}
    eden_theoretical_compression: {meaning: "Paper compression; not operator or axis.", may_modify_pms: false}
    eden_mechanism: {meaning: "Conditional scene mechanism using PMS vocabulary.", may_modify_pms: false}
    overlay_construct: {meaning: "Paper construct subordinate to PMS.", may_modify_pms: false}
    paper_internal_shorthand: {meaning: "Local abbreviation without operator/axis/diagnostic status.", may_modify_pms: false}
    scene_bound_profile: {meaning: "Conditional scene drift; not identity or sex truth.", may_modify_pms: false}
    regime_stabilization: {meaning: "Repeatable stabilization; not belief/person/ideology label.", may_modify_pms: false}
    boundary_condition: {meaning: "Condition narrowing, suspending, or defeating a reading.", may_modify_pms: false}
    falsifier: {meaning: "Condition under which a claim weakens or fails.", may_modify_pms: false}
    application_protocol: {meaning: "Mapping order without mechanism or independent authority.", may_modify_pms: false}
    viability_signature: {meaning: "Structural possibility; not repair protocol.", may_modify_pms: false}
  unknown_status_policy: "reject"

validity_gate:
  scope: "application_only"
  canonical_pms_entry_condition:
    source: "PMS.yaml"
    required_all:
      - {id: "Χ", name: "Distance", meaning: "Reflective stop-capability; no fusion into urgency, verdict, enforcement, ideology, or person attribution."}
      - {id: "reversibility", name: "Reversibility", meaning: "Reading remains scene-bound, revisable, narrowable, suspendable, and defeasible."}
      - {id: "D", name: "Dignity-in-Practice", meaning: "No shaming, ranking, humiliation, ontological evaluation, sex ranking, or degradation."}
  eden_application_requirements:
    required_all:
      - {id: "scene_packet", meaning: "Specified scene, role-positions, real Ω, effects, costs, Θ, and Σ/Ψ relevance."}
      - {id: "counter_scene_exposure", meaning: "A plausible materially different scene can change the reading."}
      - {id: "contextual_responsibility", meaning: "R attribution tracks effect under legibility, capacity, alternatives, Θ, and Ω cost/exposure."}
      - {id: "evidentiary_answerability", meaning: "No concept, pattern, frame, role code, or label replaces evidence."}
      - {id: "affected_role_contestation", meaning: "Affected roles may contest packet, evidence, frame, R trace, or application without confirming EDEN by disagreement."}
      - {id: "independent_application_authority", meaning: "EDEN-MAP supplies no authority to confront, accuse, prescribe, intervene, punish, or enforce."}
  does_not_apply_to: [critique_of_pms_or_eden, refusal, rejection, revision_proposals, rival_formalization]
  invalid_if_any: [Χ_suspended_for_clarity_or_urgency, reversibility_suspended_for_verdict, D_suspended_for_truth_or_efficiency, scene_packet_replaced_by_impression, counter_scene_cannot_change_reading, responsibility_without_scene_conditions, description_converted_directly_into_binding, person_or_sex_label_substituted_for_scene_analysis]
  consequence: "Any invalid trigger makes claimed PMS-EDEN application methodologically invalid."

description_to_action_firewall:
  status: "non_negotiable_application_constraint"
  description:
    definition: "Operator-traceable scene mapping without obligation."
    permitted_outputs: [name_real_asymmetry, trace_structuring_effect, identify_possible_responsibility_displacement, identify_possible_integration_or_self_binding_blockage, record_counter_scenes_and_falsifiers]
    forbidden_conversions: [binding, obligation, confrontation, accusation, prescription, intervention, punishment, enforcement]
  application:
    definition: "Mapping used to steer, bind, obligate, prescribe, confront, accuse, intervene, punish, or enforce."
    trigger_operations: [steer, bind, obligate, prescribe, confront, accuse, intervene, punish, enforce]
    required_conditions_all: [scene_packet, counter_scene_exposure, "Χ", reversibility, "D", contextual_responsibility, affected_role_contestation, independent_application_authority]
    deny_if_any_missing: true
  core_formulas: ["Description may name structure.", "Application requires Χ, reversibility, D, and contextual responsibility.", "Description does not authorize binding."]

paper_lens:
  name: "Adult Reciprocity and Reciprocity Loss"
  definition: "Tests whether real Ω is truthfully coordinated through R, Σ, Ψ, Χ, D, and correctability or falsely coordinated through displaced R and blocked Σ/Ψ."
  unit_of_analysis: "specified_praxeological_scene"
  positive_starting_point: "Adult Reciprocity"
  central_mechanism: "False-Coordinated Real Asymmetry"
  culminating_loss: "Reciprocity Loss as erosion of shared correctability under real Ω"
  non_goals: [comprehensive_social_theory, psychology_or_personality_theory, clinical_or_therapeutic_model, theology_or_exegesis, sex_metaphysics, sex_truth_claims, culture_war_framework, general_ideology_diagnosis, empirical_prevalence_study, relationship_manual, intervention_protocol, political_program, verdict_or_recommendation_engine]
  prohibited_inferences: [operator_configuration_to_mental_state, scene_pattern_to_personality, role_position_to_ontological_worth, sexed_scene_to_sex_essence, structuring_effect_to_malice, vulnerability_to_immunity, capacity_to_total_guilt, difference_to_rank, non_action_to_automatic_praxis, description_to_action_authority]

