core_thesis:
  thesis_statement: "Adult Reciprocity is truthful coordination of real Ω; Reciprocity Loss begins where real Ω is falsely coordinated, R displaced, Σ/Ψ blocked, and shared correctability eroded."
  positive_baseline:
    id: "adult_reciprocity"
    status: "eden_normative_benchmark"
    full_development_home: "method_and_positive_baseline.adult_reciprocity"
    formulas: ["Adult Reciprocity ≠ symmetry.", "Adult Reciprocity = truthful coordination of real Ω."]
    not_equivalent_to: [symmetry, sameness, harmony, equal_burden, formal_equality, abolition_of_asymmetry]
    status_note: "Explicit EDEN benchmark; not total access, metaphysical truth, empirical universal, or automatic application."
  negative_counterpart:
    id: "reciprocity_loss"
    status: "eden_theoretical_compression"
    full_development_home: "regime_test_scene_and_loss_architecture.reciprocity_loss"
    formulas: ["Reciprocity Loss = false coordination of real Ω.", "Reciprocity Loss is the erosion of shared correctability under real asymmetry."]
    not_equivalent_to: [conflict, disagreement, inequality, asymmetry, hurt, lack_of_harmony, failed_communication, unequal_burden, guilt]
  governing_distinction:
    formulas: ["Asymmetry is not the failure.", "False coordination of asymmetry is the failure."]
    implications: ["Real Ω remains visible.", "Power, vulnerability, protection, dependency, hierarchy, local superiority, and unequal R may be genuine.", "Reality does not justify asymmetry.", "Inequality alone does not establish failure."]
  master_trace:
    status: "eden_theoretical_compression"
    sequence: ["coordinated Ω", "false-coordinated real Ω", "displaced R", "blocked Σ/Ψ", "reciprocity loss"]
    chain_formula: "coordinated Ω → false-coordinated real Ω → displaced R → blocked Σ/Ψ → reciprocity loss"
    status_note: "Structural trace; not chronology, deterministic cause, PMS dependency, or universal sequence."
  central_mechanism_preview:
    id: "false_coordinated_real_asymmetry"
    status: "eden_mechanism"
    full_development_home: "mechanism_architecture.false_coordinated_real_asymmetry"
    components: {real_asymmetry: "real Ω", coordination_frame: "false frame", responsibility: "displaced R", integration_and_self_binding: "blocked/weakened/simulated/avoided/externalized Σ/Ψ"}
    formula: "real Ω + false coordination frame + displaced R + blocked Σ/Ψ = false-coordinated real Ω"
    boundaries: ["The asymmetry need not be false; the coordination is false.", "Partial framing alone is insufficient.", "Scene evidence must establish effect, displaced R, and Σ/Ψ relevance."]
  responsibility_invariant:
    pms_axis: "R"
    eden_rule_status: "eden_normative_benchmark"
    full_development_home: "responsibility_and_praxis_architecture.responsibility_principle"
    formula: "R follows real structuring effect under available legibility, capacity, alternative possibility, Θ trajectory, and Ω cost/exposure conditions."
    boundaries: ["R is not blame.", "R is not guilt.", "R is not moral worth.", "R is not person condemnation.", "R is not mere causality.", "R is not outcome-liability alone.", "R does not require malice.", "R remains scene-limited."]
  correctability_invariant:
    id: "shared_correctability"
    status: "eden_normative_benchmark"
    full_development_home: "regime_test_scene_and_loss_architecture.reciprocity_loss.correctability"
    definition: "Capacity to receive, test, revise, and integrate proportionate correction while R tracks effect and D remains preserved."
    boundaries: ["Not agreement.", "Not peace.", "Not reconciliation.", "Not compulsory engagement.", "Not acceptance of every criticism.", "Not a PMS operator or axis."]
  architecture_demotions:
    false_comparison: {status: "eden_mechanism", rule: "Attractor/amplifier/stabilizer, not first cause.", forbidden_role: "origin_or_master_mechanism", full_development_home: "method_and_positive_baseline.false_comparison"}
    pseudo_symmetry: {status: "overlay_construct", rule: "One Switch Family form.", forbidden_role: "master_mechanism", full_development_home: "mechanism_architecture.switch_family.members.pseudo_symmetry"}
    pfo:
      status: "regime_stabilization"
      formulas: ["PFO is not the origin of reciprocity loss.", "PFO is one regime form in which reciprocity loss stabilizes."]
      forbidden_roles: [origin, center, person_type, sex_truth, ideology_diagnosis, political_insult, all_modern_gender_order]
      full_development_home: "regime_test_scene_and_loss_architecture.pfo"
    eden_scene:
      status: "overlay_construct"
      formulas: ["Eden is not the paper's origin.", "Eden is a test scene for the paper's grammar.", "Eden is not foundation; Eden is demonstration."]
      forbidden_roles: [paper_origin, proof_path, sex_truth_source, theological_dependency, master_history_of_reciprocity_loss]
      full_development_home: "regime_test_scene_and_loss_architecture.eden_scene"
  core_scope_guardrails: ["Bidirectionality is not symmetry.", "Non-symmetry is not one-sidedness.", "Profiles are scene-bound drift patterns, not sex truths.", "Praxis ≠ strict E.", "No Passive Praxis ≠ every non-action is action.", "Low Ψ may shift Ψ-load only with traceable scene effect.", "Structure critique ≠ person threat.", "Protection from degradation ≠ protection from responsibility.", "No concept, pattern, frame, or label replaces scene evidence."]

architecture_invariants:
  positive_first: "PMS-EDEN begins from Adult Reciprocity, not Eden, Fall, False Comparison, PFO, or Pseudo-Symmetry."
  mechanism_center: "False-Coordinated Real Asymmetry is the central coordination mechanism."
  culmination: "Reciprocity Loss as Tragedy culminates in loss of shared correctability."
  application_after_boundaries: "Boundaries, counter-scenes, and falsifiers precede EDEN-MAP."
  reflexive_self_binding: ["EDEN is not outside the garden.", "A theory about immunization must not immunize itself.", "A theory of reciprocity loss remains answerable to reciprocity in its own use.", "EDEN must release scenes that do not belong to it."]
  forbidden_master_chains: ["Eden → Fall → comparison → PFO → reciprocity loss", "False Comparison as first cause", "PFO as origin or center", "Pseudo-Symmetry as master mechanism"]

method_and_positive_baseline:
  paper_scope:
    chapters: [2, 3, 4, 5, 6]
    function: "Method, Adult Reciprocity, learned legibility-field, Limited Legibility, comparison susceptibility, and demoted False Comparison."

  method_and_pms_discipline:
    status: "overlay_construct"
    structural_not_psychological_primary:
      primary_rule: "Structure first."
      definition: "Begin with scene organization: □, Λ, Ω, Θ, Φ, Α, Σ, Ψ, costs, protection, recognition, and correction access; do not infer motive, personality, affect, diagnosis, or hidden state."
      psychological_appearances:
        evidence_status: "independently_evidenced_scene_data_only"
        rule: "Fear, shame, aggression, resentment, hurt, withdrawal, avoidance, guilt, or control enter only as evidenced scene data, never as PMS derivations."
      preferred_question: "What does the role-position structure in this scene?"
      prohibited_shortcuts: [motive_inference_from_effect, mental_state_inference_from_operator_mapping, personality_inference_from_scene_pattern, moral_character_inference_from_responsibility, sex_essence_inference_from_role_position]

    description_and_application:
      firewall_reference: "description_to_action_firewall"
      structural_description_status: "May name a possible scene configuration without binding use."
      application_status: "Steering, obligation, confrontation, accusation, prescription, intervention, punishment, or enforcement remains validity-gated."
      formulas: ["Description may name structure.", "Application requires Χ, reversibility, D, and contextual responsibility.", "Description does not authorize binding."]

    scene_packet_method:
      status: "application_protocol"
      purpose: "Minimum admissible input; entry threshold, not finding or verdict."
      minimum_fields: [specified_scene, role_positions, real_Ω, traceable_structuring_effect, responsibility_recognition_protection_cost_or_legibility_shift, Σ_Ψ_relevance, possible_counter_scene]
      role_position_rule: "Scene role, never person essence, psychology, identity, sex truth, or moral worth."
      real_omega_rule: "Requires consequential unevenness in capacity, exposure, cost, protection, recognition, access, timing, dependency, vulnerability, Action-Power, or legibility; disagreement, irritation, identity, or affiliation is insufficient."
      structuring_effect_rule: "Trace what changes what can be said, done, withheld, carried, corrected, recognized, protected, exposed, or made costly."
      sigma_psi_rule: "Test whether costs/effects enter Σ and consequential positions remain self-bound through Ψ."
      counter_scene_entry_rule: "Include at least one plausible reading capable of weakening, narrowing, suspending, or defeating EDEN."
      prohibited_inputs: [isolated_statement, decontextualized_action, identity_or_sex, political_affiliation, role_suspicion, atmospheric_resemblance, PFO_by_impression]

    method_validity_gate:
      status: "application_protocol"
      canonical_reference: "validity_gate"
      required_configuration: ["Χ", reversibility, "D", counter_scene_exposure, contextual_responsibility, affected_role_contestation, independent_application_authority]
      meanings:
        "Χ": "Reflective inhibition; no urgency, fusion, retaliation, humiliation, or verdict."
        reversibility: "Reading remains correctable, narrowable, suspendable, and abandonable."
        "D": "Critique preserves standing; no degradation or rank."
        counter_scene_exposure: "A materially different reading can change the result."
        contextual_responsibility: "R follows effect under actual scene conditions."
        affected_role_contestation: "Affected roles may contest without confirming EDEN by disagreement."
        independent_application_authority: "EDEN supplies no authority to bind or enforce."
      scope_rule: "Χ is not a description truth condition; it becomes mandatory when description guides or binds action."

    counter_scene_protocol:
      status: "application_protocol"
      core_rule: "Every EDEN reading must remain answerable to a counter-scene that could change it."
      required_tests:
        - {id: real_omega_test, question: "Is real Ω operative and consequential?"}
        - {id: responsibility_displacement_test, question: "Is R displaced from real structuring effect?"}
        - {id: sigma_psi_test, question: "Are Σ/Ψ blocked, weakened, simulated, or externalized?"}
        - {id: genuine_case_test, question: "Could genuine vulnerability, protection, hierarchy, superiority, non-action, openness, or non-capture explain the scene?"}
        - {id: rival_explanation_test, question: "Does a rival fit the decisive evidence better?"}
      contestation_rule: "Affected roles may contest packet, evidence, frame, R trace, or application; disagreement neither defeats nor confirms EDEN."
      unresolved_result_statuses: [contested, provisional, narrowed, indeterminate]
      prohibited_reclassification: "Do not recode unresolved disagreement as failed correctability, immunization, threat-coding, non-binding, or resistance to truth."

    analyst_guardrail:
      status: "boundary_condition"
      statements: ["The analyst is not outside Ω, □, Φ, Χ, Α, or Θ.", "The analyst remains subject to learned legibility, comparison susceptibility, partial knowledge, and R-displacement risk.", "A theory about immunization can immunize itself.", "A theory about False Comparison can become a superiority frame.", "A theory about R can become accusation.", "A theory about D can degrade if D is abandoned in use."]
      self_binding_requirement: "Analyst remains able to revise, narrow, suspend, or release the reading and answerable for the analysis's effects."

  adult_reciprocity:
    status: "eden_normative_benchmark"
    definition: "Truthful coordination of real Ω; 'Adult' stipulates structural answerability, not age, psychological maturity, moral superiority, advice, or typology."
    formulas: ["Adult Reciprocity ≠ symmetry.", "Adult Reciprocity = truthful coordination of real Ω."]

    full_positive_structure:
      chain_formula: "real Ω visible + D preserved + R follows real structuring effect + Σ integrates costs and effects + Ψ binds relevant actors to their own effect + Χ keeps revision possible"
      components:
        real_omega_visible: {meaning: "Ω remains nameable without denial, flattening, or rank conversion."}
